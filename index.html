<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOCOM GMAO</title>
<style>
:root{
  --c1:#1e293b; --c2:#0f172a; --acc:#3b82f6; --acc2:#2563eb;
  --acc-l:#dbeafe; --bg:#f8fafc; --white:#fff;
  --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
  --red:#ef4444; --red-l:#fee2e2; --orange:#f59e0b; --orange-l:#fef3c7;
  --green:#22c55e; --green-l:#dcfce7; --purple:#8b5cf6; --purple-l:#ede9fe;
  --teal:#14b8a6; --teal-l:#ccfbf1;
  --r:10px; --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 4px 24px rgba(0,0,0,.12); --sw:260px; --hh:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13.5px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ─── LOGIN ─────────────────────────────────────────────── */
#login{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,var(--c2) 0%,#1e3a5f 100%);position:fixed;inset:0;z-index:999}
.lbox{background:#fff;border-radius:18px;padding:40px 44px;width:400px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.lhead{text-align:center;margin-bottom:30px}
.lico{width:56px;height:56px;background:var(--acc);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;box-shadow:0 8px 20px rgba(59,130,246,.4)}
.lhead h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.lhead p{font-size:12px;color:var(--muted);margin-top:3px}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.lf input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;outline:none;transition:.2s;font-size:14px}
.lf input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.lf{margin-bottom:15px}
.lbtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
.lbtn:hover{background:var(--acc2)}.lbtn:disabled{opacity:.5}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px;font-weight:500}

/* ─── LAYOUT ─────────────────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}
.layout{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ────────────────────────────────────────────── */
.sb{width:var(--sw);background:var(--c1);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo h1{color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.sb-logo p{color:#64748b;font-size:10px;margin-top:2px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.un{color:#cbd5e1;font-size:12px;font-weight:600;line-height:1.2}
.ur{color:#64748b;font-size:10px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nsec{display:block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#334155;padding:8px 8px 4px;margin-top:8px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.ni.on{background:rgba(59,130,246,.2);color:#93c5fd}
.ni .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.ni .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 6px}
.sb-bot{padding:8px 8px 14px;border-top:1px solid rgba(255,255,255,.08)}

/* ─── MAIN ───────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mh{height:var(--hh);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.mht{font-size:17px;font-weight:800;flex:1}
.mha{display:flex;align-items:center;gap:8px}
.mc{flex:1;overflow-y:auto;padding:22px}

/* ─── BUTTONS ────────────────────────────────────────────── */
.btn{padding:7px 15px;border-radius:7px;font-weight:700;border:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.15s;font-size:12.5px}
.btn:active{transform:scale(.97)}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc2)}
.bs{background:var(--green);color:#fff}
.bd{background:var(--red);color:#fff}
.bw{background:var(--orange);color:#fff}
.bn{background:var(--bg);color:var(--text);border:1px solid var(--border)}.bn:hover{background:var(--border)}
.bo{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}
.sm{padding:5px 10px;font-size:12px}
.opill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);padding:5px 11px;border-radius:20px;background:var(--bg);border:1px solid var(--border)}
.odot{width:7px;height:7px;border-radius:50%;background:var(--green)}.odot.off{background:var(--orange)}

/* ─── BADGES ─────────────────────────────────────────────── */
.bx{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap}
.ok{background:var(--green-l);color:#166534}
.warn{background:var(--orange-l);color:#92400e}
.danger{background:var(--red-l);color:#991b1b}
.info{background:var(--acc-l);color:#1e40af}
.neutral{background:var(--border);color:var(--muted)}
.purple{background:var(--purple-l);color:#5b21b6}
.teal{background:var(--teal-l);color:#0f766e}

/* ─── STAT CARDS ─────────────────────────────────────────── */
.sg{display:grid;gap:14px;margin-bottom:22px}
.sg-3{grid-template-columns:repeat(3,1fr)}
.sg-4{grid-template-columns:repeat(4,1fr)}
.sg-2{grid-template-columns:repeat(2,1fr)}
.sc{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.c-blue::before{background:var(--acc)}.sc.c-green::before{background:var(--green)}
.sc.c-orange::before{background:var(--orange)}.sc.c-red::before{background:var(--red)}
.sc.c-purple::before{background:var(--purple)}.sc.c-teal::before{background:var(--teal)}
.sc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.sc-ico{font-size:22px;margin-bottom:10px}
.sc-val{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px}
.sc-lbl{font-size:11px;color:var(--muted);font-weight:600}

/* ─── DELAY STATS ────────────────────────────────────────── */
.dstat{background:#fff;border-radius:var(--r);padding:20px 24px;box-shadow:var(--sh);border:1px solid var(--border);text-align:center}
.dstat-ico{font-size:28px;margin-bottom:8px}
.dstat-val{font-size:44px;font-weight:800;line-height:1;margin-bottom:6px}
.dstat-lbl{font-size:12px;color:var(--muted)}
.dstat-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ─── TABLE ──────────────────────────────────────────────── */
.tc{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.tch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tct{font-size:14px;font-weight:800;flex:1}
.siw{position:relative}
.siw input{border:1.5px solid var(--border);border-radius:7px;padding:7px 12px 7px 32px;outline:none;transition:.2s;background:var(--bg);width:210px;font-size:12.5px}
.siw input:focus{border-color:var(--acc);background:#fff}
.siw .sic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.fbar{display:flex;gap:5px;flex-wrap:wrap;padding:9px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.fc{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:.15s}
.fc:hover{border-color:var(--acc);color:var(--acc)}.fc.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.ts{overflow-x:auto;max-height:calc(100vh - 290px)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;position:sticky;top:0;z-index:1}
tbody tr{transition:.1s;cursor:pointer}tbody tr:hover{background:#f8fafc}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}

/* ─── PANEL ──────────────────────────────────────────────── */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;display:none}
.pov.on{display:block}
.sp{position:fixed;right:0;top:0;bottom:0;width:520px;background:#fff;box-shadow:-4px 0 40px rgba(0,0,0,.13);z-index:100;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border)}
.sp.on{transform:translateX(0)}
.sph{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.spc{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:15px;cursor:pointer;color:var(--muted);transition:.15s}
.spc:hover{background:var(--border)}
.spt{font-size:15px;font-weight:800;flex:1}
.spb{flex:1;overflow-y:auto;padding:20px 22px}
.spf{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.di{margin-bottom:14px}
.di .dl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.di .dv{font-size:13px;font-weight:600}
.sep{height:1px;background:var(--border);margin:16px 0}
.section-title{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* ─── MODAL ──────────────────────────────────────────────── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px 32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.mott{font-size:17px;font-weight:800;margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;outline:none;transition:.2s;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.fg textarea{min-height:80px;resize:vertical}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.fg2 .fg{margin-bottom:14px}
.full{grid-column:1/-1}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:14px;border-top:1px solid var(--border)}

/* ─── PLANNING CAL ───────────────────────────────────────── */
.pll{display:grid;grid-template-columns:290px 1fr;gap:18px;align-items:start}
.calw{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border)}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calm{font-size:13px;font-weight:800}
.calb{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 11px;cursor:pointer;color:var(--text);font-size:14px;transition:.15s}
.calb:hover{background:var(--border)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdh{text-align:center;font-size:9px;font-weight:800;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;position:relative;transition:.15s;font-weight:500}
.cd:hover{background:var(--bg)}.cd.tod{background:var(--acc);color:#fff;font-weight:700}
.cd.hev::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--orange);border-radius:50%}
.cd.tod.hev::after{background:#fff}.cd.om{opacity:.25}.cd.sel:not(.tod){background:var(--acc-l);color:var(--acc)}

/* ─── ALERTS ─────────────────────────────────────────────── */
.alert-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.alert-row:hover{background:var(--bg)}.alert-row:last-child{border-bottom:none}
.alert-ico{font-size:20px;flex-shrink:0}
.alert-main{flex:1;min-width:0}
.alert-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ─── COMPTE RENDU ───────────────────────────────────────── */
.cr-section{background:var(--bg);border-radius:var(--r);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.cr-section-title{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.intervenant-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;padding:10px;background:#fff;border-radius:7px;border:1px solid var(--border)}

/* ─── SETTINGS ───────────────────────────────────────────── */
.ss{background:#fff;border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--border)}
.sst{padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sr{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.sr:last-child{border-bottom:none}.sr:hover{background:var(--bg)}
.sri{font-size:19px;width:30px;text-align:center;flex-shrink:0}
.srl{flex:1;font-size:13px;font-weight:600}.srv{font-size:12px;color:var(--muted)}.sra{color:var(--muted)}

/* ─── MISC ───────────────────────────────────────────────── */
.ld{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted)}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:48px 20px;color:var(--muted)}
.es-ico{font-size:40px;display:block;margin-bottom:10px;opacity:.4}
.es p{font-size:14px;font-weight:600}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--acc-l);color:var(--acc2);border-radius:16px;padding:3px 10px;font-size:11px;font-weight:700;margin:2px}
.toast{position:fixed;bottom:22px;right:22px;background:#1e293b;color:#fff;border-radius:10px;padding:11px 18px;font-size:12px;font-weight:600;z-index:500;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:360px;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateY(0)}.toast.ok{background:#16a34a}.toast.err{background:var(--red)}.toast.warn{background:var(--orange)}
.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.crit-ok{background:var(--green)}.crit-att{background:var(--orange)}.crit-crit{background:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lhead">
      <div class="lico">&#128295;</div>
      <h1>SOCOM GMAO</h1>
      <p>Gestion de Maintenance Multi-Techniques</p>
    </div>
    <div class="lf"><label>Email</label><input type="email" id="lu" placeholder="admin@gmao.fr" autocomplete="email"></div>
    <div class="lf"><label>Mot de passe</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="lbtn" id="lbtn">Se connecter</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sb">
      <div class="sb-logo">
        <h1>&#128295; SOCOM GMAO</h1>
        <p>Maintenance Multi-Techniques</p>
      </div>
      <div class="sb-user">
        <div class="av" id="uav">A</div>
        <div><div class="un" id="unm">--</div><div class="ur" id="url">--</div></div>
      </div>
      <nav class="sb-nav">
        <span class="nsec">Vue g&#233;n&#233;rale</span>
        <button class="ni on" data-p="dashboard"><span class="ic">&#127968;</span>Tableau de bord</button>
        <button class="ni" data-p="planning"><span class="ic">&#128197;</span>Planning</button>
        <span class="nsec">Gestion</span>
        <button class="ni" data-p="projets"><span class="ic">&#128193;</span>Projets</button>
        <button class="ni" data-p="equipements"><span class="ic">&#9881;&#65039;</span>&#201;quipements</button>
        <button class="ni" data-p="pieces"><span class="ic">&#128297;</span>Pi&#232;ces critiques<span class="badge" id="badge-pieces" style="display:none">!</span></button>
        <button class="ni" data-p="interventions"><span class="ic">&#128203;</span>Interventions</button>
        <span class="nsec">R&#233;f&#233;rences</span>
        <button class="ni" data-p="clients"><span class="ic">&#127970;</span>Clients</button>
        <button class="ni" data-p="equipes"><span class="ic">&#128106;</span>&#201;quipes</button>
        <span class="nsec" id="nav-admin">Administration</span>
        <button class="ni" data-p="utilisateurs" id="nav-users"><span class="ic">&#128101;</span>Utilisateurs</button>
        <button class="ni" data-p="parametres"><span class="ic">&#9881;&#65039;</span>Param&#232;tres</button>
      </nav>
      <div class="sb-bot">
        <button class="ni" id="logout-btn"><span class="ic">&#128682;</span>D&#233;connexion</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="mh">
        <div class="mht" id="mht">Tableau de bord</div>
        <div class="mha">
          <div class="opill"><div class="odot" id="odot"></div><span id="olbl">En ligne</span></div>
          <button class="btn bn sm" id="sync-btn">&#8635; Actualiser</button>
          <button class="btn bp sm" id="add-btn" style="display:none">+ Ajouter</button>
        </div>
      </header>
      <div class="mc" id="mc"></div>
    </main>

  </div>
</div>

<!-- PANEL -->
<div class="pov" id="pov"></div>
<div class="sp" id="sp">
  <div class="sph"><button class="spc" id="sp-close">&#10005;</button><div class="spt" id="spt">D&#233;tail</div></div>
  <div class="spb" id="spb"></div>
  <div class="spf" id="spf"></div>
</div>

<!-- MODAL -->
<div class="mov" id="mov">
  <div class="modal" id="modal-inner">
    <div class="mott" id="mott">Formulaire</div>
    <div id="mbody"></div>
    <div class="ma">
      <button class="btn bn" id="m-cancel">Annuler</button>
      <button class="btn bp" id="m-save">&#128190; Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ══════════════════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════════════════
var API = window.location.origin;
var S = {
  user:null, token:null, online:navigator.onLine, page:'dashboard',
  clients:[], projets:[], equips:[], pieces:[], interventions:[],
  utilisateurs:[], equipes:[],
  flt:{}, formFn:null,
  calDate:new Date(), calSel:null
};

// ══════════════════════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().split('T')[0];}
function fdate(d){if(!d)return '--';try{var p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch(e){return d;}}
function diffJ(a,b){try{return Math.round((new Date(b)-new Date(a))/86400000);}catch(e){return null;}}

function bx(cls,txt){return '<span class="bx '+cls+'">'+esc(txt)+'</span>';}

var STATUT_MAP={
  'A_PLANIFIER':['info','À planifier'],
  'PLANIFIEE':['info','Planifiée'],
  'EN_COURS':['warn','En cours'],
  'TERMINEE':['ok','Terminée'],
  'ANNULEE':['neutral','Annulée'],
  'EN_SERVICE':['ok','En service'],
  'HORS_SERVICE':['danger','Hors service'],
  'OK':['ok','OK'],
  'A_SURVEILLER':['warn','À surveiller'],
  'A_REMPLACER':['danger','À remplacer'],
  'EN_COURS':['warn','En cours'],
  'TERMINE':['ok','Terminé'],
  'SUSPENDU':['warn','Suspendu']
};
function bstat(s){var m=STATUT_MAP[s];return m?bx(m[0],m[1]):bx('neutral',s||'--');}

var TYPE_MAP={
  'MAINTENANCE':['teal','Maintenance'],
  'DEPANNAGE':['purple','Dépannage'],
  'UPS':['info','UPS'],
  'STS':['info','STS'],
  'HAUTE_TENSION':['danger','HT'],
  'GROUPE_ELECTROGENE':['warn','GE'],
  'ECLAIRAGE_SECOURS':['warn','ES'],
  'DETECTION_INCENDIE':['danger','DI'],
  'DESENFUMAGE':['warn','DES']
};
function btype(t){var m=TYPE_MAP[t];return m?bx(m[0],m[1]):bx('neutral',t||'--');}

function bcrit(c){
  if(c==='CRITIQUE') return bx('danger','Critique');
  if(c==='ATTENTION') return bx('warn','Attention');
  return bx('ok','OK');
}

function role_label(r){var m={admin:'Administrateur',manager:'Manager',technicien:'Technicien'};return m[r]||r;}

function pjName(id){var p=S.projets.find(function(x){return x.id==id;});return p?p.nom:'--';}
function clName(id){var c=S.clients.find(function(x){return x.id==id;});return c?c.societe:'--';}
function userName(id){var u=S.utilisateurs.find(function(x){return x.id==id;});return u?u.nom:'--';}

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
function api(path,opts,cb){
  var h={'Content-Type':'application/json'};
  if(S.token) h['Authorization']='Bearer '+S.token;
  var fo=Object.assign({},opts||{},{headers:h});
  if(fo.body) fo.body=JSON.stringify(fo.body);
  fetch(API+path,fo)
    .then(function(r){if(!r.ok)return r.json().then(function(j){throw new Error(j.error||('HTTP '+r.status));});return r.json();})
    .then(function(d){if(cb)cb(null,d);})
    .catch(function(e){if(cb)cb(e);});
}

document.getElementById('lbtn').onclick=doLogin;
document.getElementById('lp').onkeydown=function(e){if(e.key==='Enter')doLogin();};

function doLogin(){
  var em=document.getElementById('lu').value.trim();
  var pw=document.getElementById('lp').value.trim();
  if(!em||!pw){document.getElementById('lerr').textContent='Email et mot de passe requis';return;}
  var btn=document.getElementById('lbtn');
  btn.disabled=true;btn.textContent='Connexion...';
  document.getElementById('lerr').textContent='';
  api('/api/login',{method:'POST',body:{email:em,password:pw}},function(err,user){
    btn.disabled=false;btn.textContent='Se connecter';
    if(err){document.getElementById('lerr').textContent=err.message||'Identifiants incorrects';return;}
    S.user=user;S.token=user.token;
    startApp();
  });
}

document.getElementById('logout-btn').onclick=function(){
  if(!confirm('Se déconnecter ?'))return;
  S.user=null;S.token=null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('login').style.display='flex';
};

function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  var nm=S.user.nom||S.user.email;
  document.getElementById('unm').textContent=nm;
  document.getElementById('url').textContent=role_label(S.user.role);
  document.getElementById('uav').textContent=nm.charAt(0).toUpperCase();
  // Masquer admin si pas admin
  if(S.user.role!=='admin'){
    document.getElementById('nav-admin').style.display='none';
    document.getElementById('nav-users').style.display='none';
  }
  updateOnlineUI();
  loadRef(function(){navTo('dashboard');});
}

function loadRef(done){
  var cnt=0,tot=4;
  function chk(){cnt++;if(cnt>=tot&&done)done();}
  api('/api/clients',{},function(e,d){if(!e)S.clients=d;chk();});
  api('/api/projets',{},function(e,d){if(!e)S.projets=d;chk();});
  api('/api/utilisateurs',{},function(e,d){if(!e)S.utilisateurs=d;chk();});
  api('/api/equipes',{},function(e,d){if(!e)S.equipes=d||[];chk();});
  // Alertes pièces
  api('/api/pieces?alertes=1',{},function(e,d){
    if(!e&&d.length>0){
      var b=document.getElementById('badge-pieces');
      b.textContent=d.length;b.style.display='inline';
    }
  });
}

document.getElementById('sync-btn').onclick=function(){
  toast('Actualisation...');
  loadRef(function(){renderPage();toast('Actualisé','ok');});
};

    var k=d.kpi||{};

    h+=sc('c-green','✅',k.terminees||0,'Terminées ce mois','');
    h+=sc('c-red','🔧',d.retards?d.retards.length:0,'En retard','cursor:pointer');
    h+='</div>';

    // Stats délai
    var st=d.stats||{};
    h+='<div class="sg sg-2" style="margin-bottom:22px">';
    h+='<div class="dstat"><div class="dstat-ico">⏱️</div><div class="dstat-val" style="color:var(--purple)">'+st.moy_jours_depannage+'</div><div class="dstat-lbl">jours moyen Dépannage</div><div class="dstat-sub">Création → Réalisation · '+st.nb_depannages+' BT</div></div>';

    h+='</div>';

    // 4 widgets
    h+='<div class="sg sg-4">';
    // Interventions du jour
    h+='<div class="tc"><div class="tch"><span class="tct">📅 Interventions du jour</span></div><div>';
    if(!d.today||!d.today.length)h+='<div class="es" style="padding:20px"><p>Aucune intervention</p></div>';
    else d.today.forEach(function(i){h+=alertRow('🔧',i.designation,i.projet+' · '+i.statut,null);});
    h+='</div></div>';

    if(!d.retards||!d.retards.length)h+='<div class="es" style="padding:20px"><p>Aucun retard</p></div>';
    else d.retards.forEach(function(i){h+=alertRow('⚠️',i.designation,i.projet+' · '+fdate(i.date_prevue),null);});
    h+='</div></div>';
    // Alertes pièces
    h+='<div class="tc"><div class="tch"><span class="tct">🔋 Alertes pièces</span></div><div>';
    if(!d.alertes||!d.alertes.length)h+='<div class="es" style="padding:20px"><p>Aucune alerte</p></div>';
    else d.alertes.slice(0,6).forEach(function(p){
      var ico=p.statut==='A_REMPLACER'?'🔴':'🟡';
      h+=alertRow(ico,p.type_piece.replace(/_/g,' '),p.equip_nom+' · '+p.projet,null);

    h+='</div></div>';

    if(!d.critiques||!d.critiques.length)h+='<div class="es" style="padding:20px"><p>Aucun équipement critique</p></div>';

function sc(cls,ico,val,lbl,extra){
  return '<div class="sc '+cls+'" '+(extra||'')+'><div class="sc-ico">'+ico+'</div><div class="sc-val">'+val+'</div><div class="sc-lbl">'+esc(lbl)+'</div></div>';
}
function alertRow(ico,title,sub,action){
  return '<div class="alert-row"'+(action?' onclick="'+action+'"':'')+'><div class="alert-ico">'+ico+'</div><div class="alert-main"><div class="alert-title">'+esc(title)+'</div><div class="alert-sub">'+esc(sub)+'</div></div></div>';
}

function renderPlanning(){
  api('/api/interventions',{},function(err,data){
    if(err){document.getElementById('mc').innerHTML='<div class="es"><p>Erreur</p></div>';return;}
    S.interventions=data;
    var h='<div class="pll">';
    h+='<div class="calw"><div class="calh"><button class="calb" id="cal-p">‹</button><span class="calm" id="cal-mo">--</span><button class="calb" id="cal-n">›</button></div><div class="cg" id="cal-grid"></div></div>';
    h+='<div class="tc"><div class="tch"><span class="tct" id="pl-title">Toutes les interventions</span></div>';
    h+='<div class="ts"><table><thead><tr><th>Référence</th><th>Type</th><th>Équipement</th><th>Projet</th><th>Technicien</th><th>Date prévue</th><th>Statut</th></tr></thead><tbody id="pl-body"></tbody></table></div></div>';
    h+='</div>';
    document.getElementById('mc').innerHTML=h;
    document.getElementById('cal-p').onclick=function(){S.calDate.setMonth(S.calDate.getMonth()-1);buildCal();};
    document.getElementById('cal-n').onclick=function(){S.calDate.setMonth(S.calDate.getMonth()+1);buildCal();};
    buildCal();renderPlanList(null);
  });
}

function buildCal(){
  var d=S.calDate,yr=d.getFullYear(),mo=d.getMonth();
  var mois=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('cal-mo').textContent=mois[mo]+' '+yr;
  var evDays={};
  S.interventions.forEach(function(i){if(i.date_prevue)evDays[i.date_prevue.split('T')[0]]=true;});
  var fd=new Date(yr,mo,1).getDay(),dm=new Date(yr,mo+1,0).getDate(),off=(fd+6)%7;
  var tn=new Date();
  var h=['L','M','M','J','V','S','D'].map(function(x){return '<div class="cdh">'+x+'</div>';}).join('');
  for(var i=0;i<off;i++){var pd=new Date(yr,mo,-off+i+1);h+='<div class="cd om">'+pd.getDate()+'</div>';}
  for(var d2=1;d2<=dm;d2++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d2).padStart(2,'0');
    var cls='cd';
    if(tn.getDate()===d2&&tn.getMonth()===mo&&tn.getFullYear()===yr)cls+=' tod';
    if(S.calSel===ds)cls+=' sel';
    if(evDays[ds])cls+=' hev';
    h+='<div class="'+cls+'" data-ds="'+ds+'">'+d2+'</div>';
  }
  var cg=document.getElementById('cal-grid');if(!cg)return;
  cg.innerHTML=h;
  cg.querySelectorAll('.cd[data-ds]').forEach(function(el){
    el.onclick=function(){S.calSel=el.dataset.ds;buildCal();renderPlanList(el.dataset.ds);};
  });
}

function renderPlanList(ds){
  var title=document.getElementById('pl-title'),body=document.getElementById('pl-body');
  if(!body)return;
  var items=S.interventions;
  if(ds){items=items.filter(function(i){return i.date_prevue&&i.date_prevue.startsWith(ds);});if(title)title.textContent='Interventions du '+fdate(ds);}
  else if(title)title.textContent='Toutes les interventions';
  if(!items.length){body.innerHTML='<tr><td colspan="7"><div class="es"><p>Aucune intervention</p></div></td></tr>';return;}
  body.innerHTML=items.map(function(i){
    return '<tr data-id="'+i.id+'"><td><code>'+esc(i.numero)+'</code></td><td>'+btype(i.type)+'</td><td style="font-weight:700">'+esc(i.equip_nom)+'</td><td style="color:var(--muted)">'+esc(i.projet_nom)+'</td><td style="color:var(--muted)">'+esc(i.technicien_nom||'--')+'</td><td style="color:var(--muted)">'+fdate(i.date_prevue)+'</td><td>'+bstat(i.statut)+'</td></tr>';
  }).join('');
  body.querySelectorAll('tr[data-id]').forEach(function(tr){tr.onclick=function(){openIntervPanel(parseInt(tr.dataset.id));};});
}

function renderProjets(){
  document.getElementById('mc').innerHTML='<div class="ld"><div class="spin"></div></div>';
  api('/api/projets',{},function(err,data){
    if(!err)S.projets=data;
    var h='<div class="tc"><div class="tch"><span class="tct">Projets ('+S.projets.length+')</span>';
    h+='<div class="siw"><span class="sic">🔍</span><input id="pj-q" placeholder="Rechercher..."></div></div>';
    h+='<div class="ts"><table><thead><tr><th>Numéro</th><th>Nom du projet</th><th>Client</th><th>Manager</th><th>Période</th><th>Statut</th><th></th></tr></thead><tbody id="pj-body">'+renderPjRows(S.projets)+'</tbody></table></div></div>';
    document.getElementById('mc').innerHTML=h;
    document.getElementById('pj-q').oninput=function(){
      var q=this.value.toLowerCase();
      var f=S.projets.filter(function(p){return [p.nom,p.numero_projet,p.client_nom].join(' ').toLowerCase().indexOf(q)>=0;});
      document.getElementById('pj-body').innerHTML=renderPjRows(f);
      attachPjEvents();
    };
    attachPjEvents();
  });
}

function renderPjRows(d){
  if(!d.length)return '<tr><td colspan="7"><div class="es"><p>Aucun projet</p></div></td></tr>';
  return d.map(function(p){
    return '<tr data-id="'+p.id+'"><td><code>'+esc(p.numero_projet)+'</code></td><td style="font-weight:700">'+esc(p.nom)+'</td><td style="color:var(--muted)">'+esc(p.client_nom||'--')+'</td><td style="color:var(--muted)">'+esc(p.manager_nom||'--')+'</td><td style="color:var(--muted);font-size:11px">'+fdate(p.date_debut)+' → '+fdate(p.date_fin)+'</td><td>'+bstat(p.statut)+'</td><td onclick="event.stopPropagation()"><button class="btn bn sm" data-edit="'+p.id+'">✏</button></td></tr>';
  }).join('');
}

function attachPjEvents(){
  document.querySelectorAll('#pj-body tr[data-id]').forEach(function(tr){tr.onclick=function(){openPjPanel(parseInt(tr.dataset.id));};});
  document.querySelectorAll('#pj-body button[data-edit]').forEach(function(btn){btn.onclick=function(e){e.stopPropagation();openPjEdit(parseInt(btn.dataset.edit));};});
}

function openPjPanel(id){
  openPanel('Chargement...');
  api('/api/projets/'+id,{},function(err,p){
    if(err){document.getElementById('spb').innerHTML='<div class="es"><p>Erreur</p></div>';return;}
    document.getElementById('spt').textContent=p.nom;
    var h='<div style="margin-bottom:14px">'+bstat(p.statut)+'</div>';
    h+='<div class="dg2">';
    h+=di('Numéro projet',p.numero_projet);h+=di('Client',p.client_nom);
    h+=di('Manager',p.manager_nom);h+=di('Date début',fdate(p.date_debut));
    h+=di('Date fin',fdate(p.date_fin));
    h+='</div>';
    if(p.description)h+='<div class="sep"></div><div class="section-title">Description</div><p style="font-size:13px;line-height:1.6">'+esc(p.description)+'</p>';
    h+='<div class="sep"></div><div class="section-title">Équipements ('+p.equipements.length+')</div>';
    if(!p.equipements.length)h+='<p style="color:var(--muted);font-size:12px">Aucun équipement</p>';
    else p.equipements.forEach(function(e){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">';
      h+='<div><div style="font-weight:700;font-size:12px">'+esc(e.designation)+'</div><div style="font-size:11px;color:var(--muted)">'+e.type_technique.replace(/_/g,' ')+'</div></div>';
      h+=bcrit(e.criticite);h+='</div>';
    });
    document.getElementById('spb').innerHTML=h;
    document.getElementById('spf').innerHTML='<button class="btn bn sm" data-edit="'+id+'">✏ Modifier</button><button class="btn bp sm" onclick="navTo(\'interventions\')">Voir interventions</button>';
    document.querySelector('#spf button[data-edit]').onclick=function(){openPjEdit(id);};
  });
}

function openNewProjet(){
  var h=buildPjForm({});
  openModal('Nouveau projet',h);
  S.formFn=function(){
    var body=getPjData();
    if(!body.nom||!body.client_id){toast('Nom et client requis','err');return;}
    api('/api/projets',{method:'POST',body:body},function(err){
      if(err){toast('Erreur : '+err.message,'err');return;}
      closeModal();toast('Projet créé ✓','ok');
      api('/api/projets',{},function(e,d){if(!e)S.projets=d;renderProjets();});
    });
  };
}

function openPjEdit(id){
  var p=S.projets.find(function(x){return x.id===id;})||{};
  openModal('Modifier projet',buildPjForm(p));
  S.formFn=function(){
    var body=getPjData();
    api('/api/projets/'+id,{method:'PATCH',body:body},function(err){
      if(err){toast('Erreur : '+err.message,'err');return;}
      closeModal();toast('Projet mis à jour ✓','ok');
      api('/api/projets',{},function(e,d){if(!e)S.projets=d;renderProjets();});
    });
  };
}

function buildPjForm(p){
  var managers=S.utilisateurs.filter(function(u){return u.role==='manager'||u.role==='admin';});
  var h='<div class="fg2">';
  h+='<div class="fg full"><label>Nom du projet *</label><input id="pf-nom" value="'+esc(p.nom||'')+'"></div>';
  h+='<div class="fg"><label>Numéro projet</label><input id="pf-num" value="'+esc(p.numero_projet||'')+'" placeholder="Auto-généré si vide"></div>';
  h+='<div class="fg"><label>Statut</label><select id="pf-stat">';
  ['EN_COURS','TERMINE','SUSPENDU'].forEach(function(v){h+='<option value="'+v+'"'+(p.statut===v?' selected':'')+'>'+v.replace('_',' ')+'</option>';});
  h+='</select></div>';
  h+='<div class="fg"><label>Client *</label><select id="pf-cl"><option value="">-- Sélectionner --</option>';
  S.clients.forEach(function(c){h+='<option value="'+c.id+'"'+(p.client_id==c.id?' selected':'')+'>'+esc(c.societe)+'</option>';});
  h+='</select></div>';
  h+='<div class="fg"><label>Manager</label><select id="pf-mgr"><option value="">-- Aucun --</option>';
  managers.forEach(function(u){h+='<option value="'+u.id+'"'+(p.manager_id==u.id?' selected':'')+'>'+esc(u.nom)+'</option>';});
  h+='</select></div>';
  h+='<div class="fg"><label>Date début</label><input type="date" id="pf-dd" value="'+(p.date_debut||'')+'"></div>';
  h+='<div class="fg"><label>Date fin</label><input type="date" id="pf-df" value="'+(p.date_fin||'')+'"></div>';
  h+='<div class="fg full"><label>Description</label><textarea id="pf-desc">'+esc(p.description||'')+'</textarea></div>';
  h+='</div>';
  return h;
}

function getPjData(){
  return {
    nom:document.getElementById('pf-nom').value.trim(),
    numero_projet:document.getElementById('pf-num').value||null,

function fchip(val,label,active){return '<span class="fc'+(active?' on':'')+'" data-flt="'+esc(val)+'">'+esc(label)+'</span>';}

function filterEq(){
  var q=document.getElementById('eq-q').value.toLowerCase();
  var f=S.equips.filter(function(e){
    if(S.flt.tech&&e.type_technique!==S.flt.tech)return false;
    return !q||[e.designation,e.type_technique,e.projet_nom,e.numero_serie].join(' ').toLowerCase().indexOf(q)>=0;
  });
  document.querySelectorAll('.fc').forEach(function(el){el.classList.toggle('on',el.dataset.flt===S.flt.tech);});
  document.getElementById('eq-body').innerHTML=renderEqRows(f);
  attachEqEvents();
}

function renderEqRows(d){
  if(!d.length)return '<tr><td colspan="8"><div class="es"><p>Aucun équipement</p></div></td></tr>';
  return d.map(function(e){
    return '<tr data-id="'+e.id+'"><td style="font-weight:700">'+esc(e.designation)+'</td><td>'+btype(e.type_technique)+'</td><td style="color:var(--muted)">'+esc(e.projet_nom||'--')+'</td><td style="color:var(--muted)">'+esc(e.localisation||'--')+'</td><td style="color:var(--muted);font-size:11px">'+esc(e.numero_serie||'--')+'</td><td>'+bstat(e.statut)+'</td><td>'+bcrit(e.criticite)+'</td><td onclick="event.stopPropagation()"><button class="btn bn sm" data-edit="'+e.id+'">✏</button></td></tr>';
  }).join('');
}

function attachEqEvents(){
  document.querySelectorAll('#eq-body tr[data-id]').forEach(function(tr){tr.onclick=function(){openEqPanel(parseInt(tr.dataset.id));};});
  document.querySelectorAll('#eq-body button[data-edit]').forEach(function(btn){btn.onclick=function(e){e.stopPropagation();openEqEdit(parseInt(btn.dataset.edit));};});
}

function openEqPanel(id){
  openPanel('Chargement...');
  api('/api/equipements/'+id,{},function(err,e){
    if(err){document.getElementById('spb').innerHTML='<div class="es"><p>Erreur</p></div>';return;}
    document.getElementById('spt').textContent=e.designation;

    h+='<div class="dg2">';
    h+=di('Projet',e.projet_nom);h+=di('Localisation',e.localisation);
    h+=di('Marque',e.marque);h+=di('Modèle',e.modele);
    h+=di('N° Série',e.numero_serie);h+=di('Puissance',e.puissance);

function renderInterventions(){
  document.getElementById('mc').innerHTML='<div class="ld"><div class="spin"></div></div>';
  api('/api/interventions',{},function(err,data){
    if(!err)S.interventions=data;
    var h='<div class="tc"><div class="tch"><span class="tct">Interventions ('+S.interventions.length+')</span>';
    h+='<div class="siw"><span class="sic">🔍</span><input id="iv-q" placeholder="Rechercher..."></div></div>';
    h+='<div class="fbar">';
    h+=fchip('','Toutes',!S.flt.ivstat);
    ['A_PLANIFIER','PLANIFIEE','EN_COURS','TERMINEE','ANNULEE'].forEach(function(s){h+=fchip(s,s.replace(/_/g,' '),S.flt.ivstat===s);});
    h+='<span style="margin:0 6px;color:var(--border)">|</span>';
    h+=fchip('t-MAINTENANCE','Maintenance',S.flt.ivtype==='MAINTENANCE');
    h+=fchip('t-DEPANNAGE','Dépannage',S.flt.ivtype==='DEPANNAGE');
    h+='</div>';
    h+='<div class="ts"><table><thead><tr><th>Référence</th><th>Type</th><th>Équipement</th><th>Projet</th><th>Technicien</th><th>Date prévue</th><th>Date réalis.</th><th>Statut</th><th></th></tr></thead><tbody id="iv-body">'+renderIvRows(S.interventions)+'</tbody></table></div></div>';
    document.getElementById('mc').innerHTML=h;
    document.getElementById('iv-q').oninput=function(){filterIv();};
    document.querySelectorAll('.fc[data-flt]').forEach(function(el){
      el.onclick=function(){
        var v=el.dataset.flt;
        if(!v){S.flt.ivstat='';S.flt.ivtype='';}
        else if(v.startsWith('t-')){S.flt.ivtype=v.slice(2);S.flt.ivstat='';}
        else{S.flt.ivstat=v;S.flt.ivtype='';}
        filterIv();
      };
    });
    attachIvEvents();
  });
}

function filterIv(){
  var q=document.getElementById('iv-q').value.toLowerCase();
  var f=S.interventions.filter(function(i){
    if(S.flt.ivstat&&i.statut!==S.flt.ivstat)return false;
    if(S.flt.ivtype&&i.type!==S.flt.ivtype)return false;
    return !q||[i.numero,i.equip_nom,i.projet_nom,i.technicien_nom].join(' ').toLowerCase().indexOf(q)>=0;
  });
  document.querySelectorAll('.fc').forEach(function(el){
    var v=el.dataset.flt;
    el.classList.toggle('on',(!v&&!S.flt.ivstat&&!S.flt.ivtype)||(v&&v.startsWith('t-')&&S.flt.ivtype===v.slice(2))||(v&&!v.startsWith('t-')&&S.flt.ivstat===v));
  });
  document.getElementById('iv-body').innerHTML=renderIvRows(f);
  attachIvEvents();
}

function renderIvRows(d){
  if(!d.length)return '<tr><td colspan="9"><div class="es"><p>Aucune intervention</p></div></td></tr>';
  return d.map(function(i){
    return '<tr data-id="'+i.id+'"><td><code>'+esc(i.numero)+'</code></td><td>'+btype(i.type)+'</td><td style="font-weight:700">'+esc(i.equip_nom||'--')+'</td><td style="color:var(--muted)">'+esc(i.projet_nom||'--')+'</td><td style="color:var(--muted)">'+esc(i.technicien_nom||'--')+'</td><td style="color:var(--muted)">'+fdate(i.date_prevue)+'</td><td style="color:var(--muted)">'+fdate(i.date_realisation)+'</td><td>'+bstat(i.statut)+'</td><td onclick="event.stopPropagation()"><button class="btn bn sm" data-edit="'+i.id+'">✏</button></td></tr>';
  }).join('');
}

function attachIvEvents(){
  document.querySelectorAll('#iv-body tr[data-id]').forEach(function(tr){tr.onclick=function(){openIntervPanel(parseInt(tr.dataset.id));};});
  document.querySelectorAll('#iv-body button[data-edit]').forEach(function(btn){btn.onclick=function(e){e.stopPropagation();openIvEdit(parseInt(btn.dataset.edit));};});
}

function openIntervPanel(id){
  openPanel('Chargement...');
  api('/api/interventions/'+id,{},function(err,i){
    if(err){document.getElementById('spb').innerHTML='<div class="es"><p>Erreur</p></div>';return;}
    document.getElementById('spt').textContent=i.numero;
    var h='<div style="display:flex;gap:6px;margin-bottom:14px">'+btype(i.type)+' '+bstat(i.statut)+'</div>';
    h+='<div class="dg2">';
    h+=di('Équipement',i.equip_nom);h+=di('Type technique',i.type_technique?i.type_technique.replace(/_/g,' '):'--');
    h+=di('Projet',i.projet_nom);h+=di('Localisation',i.localisation);
    h+=di('Technicien',i.technicien_nom);h+=di('Date prévue',fdate(i.date_prevue));
    h+=di('Date réalisation',fdate(i.date_realisation));
    h+='</div>';
    if(i.description)h+='<div class="sep"></div><div class="section-title">Description</div><p style="font-size:13px;line-height:1.6">'+esc(i.description)+'</p>';

    // COMPTES RENDUS (liste)
    var crs=i.comptes_rendus||[];
    h+='<div class="sep"></div><div class="section-title">Comptes rendus ('+crs.length+')</div>';
    if(!crs.length){
      h+='<p style="color:var(--muted);font-size:12px;margin-bottom:10px">Aucun compte rendu</p>';
    } else {
      var canEditCR=S.user&&(S.user.role==="admin"||S.user.role==="manager");
      crs.forEach(function(cr){
        h+='<div class="cr-section" style="margin-bottom:12px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h+='<div class="cr-section-title" style="margin-bottom:0">CR-'+String(cr.id).padStart(5,'0')+' — '+fdate(cr.date_intervention)+'</div>';
        h+='<div style="display:flex;gap:4px">';
        if(canEditCR)h+='<button class="btn bn sm" data-edit-cr="'+cr.id+'" data-iid="'+id+'">✏</button>';
        if(canEditCR)h+='<button class="btn bd sm" data-del-cr="'+cr.id+'">✕</button>';
        h+='</div></div>';
        if(cr.observations)h+='<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Observations :</strong> '+esc(cr.observations)+'</p>';
        if(cr.actions_realisees)h+='<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Actions :</strong> '+esc(cr.actions_realisees)+'</p>';
        if(cr.mesures)h+='<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Mesures :</strong> '+esc(cr.mesures)+'</p>';

function openCRForm(intervId, cr){
  cr=cr||null;
  var crData=cr||{};
  var intv=S.interventions.find(function(x){return x.id===intervId;})||{};
  var h='<div class="fg2">';
  h+='<div class="fg full"><label>Date d\'intervention</label><input type="date" id="crf-date" value="'+(crData.date_intervention||today())+'"></div>';
  h+='<div class="fg full"><label>Observations</label><textarea id="crf-obs">'+esc(crData.observations||'')+'</textarea></div>';
  h+='<div class="fg full"><label>Actions réalisées</label><textarea id="crf-act">'+esc(crData.actions_realisees||'')+'</textarea></div>';
  h+='<div class="fg full"><label>Mesures</label><textarea id="crf-mes">'+esc(crData.mesures||'')+'</textarea></div>';
  h+='<div class="fg full"><label>Recommandations</label><textarea id="crf-rec">'+esc(crData.recommandations||'')+'</textarea></div>';
  h+='<div class="fg full"><label>Conclusion</label><textarea id="crf-ccl">'+esc(crData.conclusion||'')+'</textarea></div>';
  h+='</div>';
  h+='<div class="sep"></div>';
  h+='<div class="section-title">Intervenants</div>';
  h+='<div id="crf-iv-list"></div>';
  h+='<button type="button" class="btn bp sm" id="crf-add-iv" style="margin-top:8px">+ Ajouter intervenant</button>';

  openModal((cr.id?'Modifier':'Créer')+' compte rendu',h);

  var ivList=crData.intervenants||[];
  function renderIvList(){
    var el=document.getElementById('crf-iv-list');if(!el)return;
    el.innerHTML=ivList.map(function(iv,i){
      return '<div class="intervenant-row"><div class="fg" style="flex:2;margin:0"><label>Technicien</label><select class="iv-user" data-idx="'+i+'"><option value="">--</option>'+S.utilisateurs.map(function(u){return '<option value="'+u.id+'"'+(iv.utilisateur_id==u.id?' selected':'')+'>'+esc(u.nom)+'</option>';}).join('')+'</select></div><div class="fg" style="flex:1;margin:0"><label>Date</label><input type="date" class="iv-date" data-idx="'+i+'" value="'+(iv.date||today())+'"></div><div class="fg" style="flex:1;margin:0"><label>Début</label><input type="time" class="iv-hd" data-idx="'+i+'" value="'+(iv.heure_debut||'')+'"></div><div class="fg" style="flex:1;margin:0"><label>Fin</label><input type="time" class="iv-hf" data-idx="'+i+'" value="'+(iv.heure_fin||'')+'"></div><button class="btn bd sm" data-del="'+i+'">✕</button></div>';
    }).join('');
    el.querySelectorAll('.iv-user').forEach(function(s){s.onchange=function(){ivList[parseInt(s.dataset.idx)].utilisateur_id=s.value;};});
    el.querySelectorAll('.iv-date').forEach(function(s){s.onchange=function(){ivList[parseInt(s.dataset.idx)].date=s.value;};});
    el.querySelectorAll('.iv-hd').forEach(function(s){s.onchange=function(){ivList[parseInt(s.dataset.idx)].heure_debut=s.value;};});
    el.querySelectorAll('.iv-hf').forEach(function(s){s.onchange=function(){ivList[parseInt(s.dataset.idx)].heure_fin=s.value;};});
    el.querySelectorAll('button[data-del]').forEach(function(btn){btn.onclick=function(){ivList.splice(parseInt(btn.dataset.del),1);renderIvList();};});
  }
  renderIvList();
  setTimeout(function(){
    var btn=document.getElementById('crf-add-iv');
    if(btn)btn.onclick=function(){ivList.push({utilisateur_id:'',date:today(),heure_debut:'',heure_fin:''});renderIvList();};
  },50);

  S.formFn=function(){
    var body={
      date_intervention:document.getElementById('crf-date').value,
      observations:document.getElementById('crf-obs').value,
      actions_realisees:document.getElementById('crf-act').value,
      mesures:document.getElementById('crf-mes').value,
      recommandations:document.getElementById('crf-rec').value,
      conclusion:document.getElementById('crf-ccl').value,
      intervenants:ivList.filter(function(iv){return iv.utilisateur_id;})
    };
    if(cr&&cr.id)body.cr_id=cr.id;
    api('/api/comptes_rendus/'+intervId,{method:'POST',body:body},function(err){
      if(err){toast('Erreur : '+err.message,'err');return;}
      closeModal();toast('Compte rendu enregistré ✓','ok');
      openIntervPanel(intervId);
    });
  };
}

    if(!nom||!em||!pw){toast('Nom, email et mot de passe requis','err');return;}
    api('/api/utilisateurs',{method:'POST',body:{nom:nom,email:em,password:pw,role:document.getElementById('uf-rl').value}},function(err){
      if(err){toast('Erreur : '+err.message,'err');return;}
      closeModal();toast('Utilisateur créé ✓','ok');
      api('/api/utilisateurs',{},function(e,d){if(!e)S.utilisateurs=d;renderUtilisateurs();});
    });
  };
}

function openUserEdit(id){
  var u=S.utilisateurs.find(function(x){return x.id===id;})||{};
  openModal('Modifier utilisateur',buildUserForm(u));
  S.formFn=function(){
    var body={nom:document.getElementById('uf-nom').value,email:document.getElementById('uf-em').value,role:document.getElementById('uf-rl').value,actif:parseInt(document.getElementById('uf-act').value)};
    var pw=document.getElementById('uf-pw').value;if(pw)body.password=pw;
    api('/api/utilisateurs/'+id,{method:'PATCH',body:body},function(err){
      if(err){toast('Erreur','err');return;}
      closeModal();toast('Utilisateur mis à jour ✓','ok');
      api('/api/utilisateurs',{},function(e,d){if(!e)S.utilisateurs=d;renderUtilisateurs();});
    });
  };
}

// ══════════════════════════════════════════════════════════
// PARAMÈTRES
// ══════════════════════════════════════════════════════════
function renderParametres(){
  var h='<div style="max-width:600px">';
  h+='<div class="ss"><div class="sst">Compte connecté</div>';
  h+='<div class="sr"><span class="sri">👤</span><span class="srl">Utilisateur</span><span class="srv">'+esc(S.user.nom)+'</span></div>';
  h+='<div class="sr"><span class="sri">🎭</span><span class="srl">Rôle</span><span class="srv">'+role_label(S.user.role)+'</span></div>';
  h+='<div class="sr"><span class="sri">📧</span><span class="srl">Email</span><span class="srv">'+esc(S.user.email)+'</span></div>';
  h+='</div>';
  h+='<div class="ss"><div class="sst">Serveur</div>';
  h+='<div class="sr"><span class="sri">🔗</span><span class="srl">URL</span><span class="srv" style="font-size:11px">'+API+'</span></div>';
  h+='<div class="sr"><span class="sri">📡</span><span class="srl">Connexion</span><span class="srv">'+(S.online?'🟢 En ligne':'🔴 Hors ligne')+'</span></div>';
  h+='<div class="sr" id="sr-health"><span class="sri">🏥</span><span class="srl">Vérifier le serveur</span><span class="sra">›</span></div>';
  h+='</div>';
  h+='<div class="ss"><div class="sst">Email / Notifications</div>';
  h+='<div class="sr" id="sr-smtp"><span class="sri">📧</span><span class="srl">Configurer SMTP</span><span class="sra">›</span></div>';
  h+='</div>';
  h+='<div class="ss"><div class="sst">Données</div>';
  h+='<div class="sr" id="sr-sync"><span class="sri">↻</span><span class="srl">Actualiser les données</span><span class="sra">›</span></div>';
  h+='<div class="sr" id="sr-export"><span class="sri">📤</span><span class="srl">Exporter (Excel)</span><span class="sra">›</span></div>';
  h+='</div>';
  h+='<div class="ss"><div class="sst">Session</div>';
  h+='<div class="sr" id="sr-logout"><span class="sri">🚪</span><span class="srl" style="color:var(--red)">Déconnexion</span><span class="sra">›</span></div>';
  h+='</div></div>';
  document.getElementById('mc').innerHTML=h;
  document.getElementById('sr-health').onclick=function(){api('/health',{},function(err,r){toast(err?'Serveur inaccessible':('OK — '+r.time),err?'err':'ok');});};
  document.getElementById('sr-smtp').onclick=openSMTPModal;
  document.getElementById('sr-sync').onclick=function(){toast('Actualisation...');loadRef(function(){toast('Actualisé ✓','ok');});};
  document.getElementById('sr-export').onclick=function(){window.open(API+'/api/export/excel','_blank');};
  document.getElementById('sr-logout').onclick=function(){if(!confirm('Se déconnecter ?'))return;S.user=null;S.token=null;document.getElementById('app').classList.remove('on');document.getElementById('login').style.display='flex';};
}

function openSMTPModal(){
  api('/api/smtp',{},function(err,cfg){
    cfg=cfg||{};
    var h='<div class="fg2">';
    h+='<div class="fg full"><label>Activer les emails</label><select id="sm-en"><option value="1"'+(cfg.enabled?' selected':'')+'>Oui</option><option value="0"'+(!cfg.enabled?' selected':'')+'>Non</option></select></div>';
    h+='<div class="fg"><label>Serveur SMTP</label><input id="sm-host" value="'+esc(cfg.host||'')+'" placeholder="smtp.gmail.com"></div>';
    h+='<div class="fg"><label>Port</label><input id="sm-port" value="'+(cfg.port||587)+'"></div>';
    h+='<div class="fg"><label>Identifiant</label><input id="sm-user" value="'+esc(cfg.username||'')+'"></div>';
    h+='<div class="fg"><label>Mot de passe</label><input type="password" id="sm-pw" placeholder="Laisser vide = inchangé"></div>';
    h+='<div class="fg"><label>TLS</label><select id="sm-tls"><option value="1"'+(cfg.use_tls?' selected':'')+'>Oui</option><option value="0">Non</option></select></div>';
    h+='<div class="fg"><label>Email expéditeur</label><input id="sm-from" value="'+esc(cfg.sender_email||'')+'"></div>';
    h+='<div class="fg"><label>Nom expéditeur</label><input id="sm-name" value="'+esc(cfg.sender_name||'SOCOM GMAO')+'"></div>';
    h+='<div class="fg full"><label>Email de test</label><div style="display:flex;gap:8px"><input id="sm-test" placeholder="test@exemple.fr" style="flex:1;border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;outline:none"><button class="btn bo sm" id="sm-test-btn">Tester</button></div></div>';
    h+='</div>';
    openModal('Configuration SMTP',h);
    document.getElementById('sm-test-btn').onclick=function(){
      var to=document.getElementById('sm-test').value.trim();
      if(!to){toast('Email requis','err');return;}
      api('/api/smtp/test',{method:'POST',body:{to:to}},function(e,r){toast(e?('Erreur : '+e.message):(r.ok?'Email envoyé ✓':'Échec'),e||!r.ok?'err':'ok');});
    };
    S.formFn=function(){
      var body={enabled:document.getElementById('sm-en').value==='1',host:document.getElementById('sm-host').value,port:parseInt(document.getElementById('sm-port').value)||587,username:document.getElementById('sm-user').value,use_tls:document.getElementById('sm-tls').value==='1',sender_email:document.getElementById('sm-from').value,sender_name:document.getElementById('sm-name').value};
      var pw=document.getElementById('sm-pw').value;if(pw)body.password=pw;
      api('/api/smtp',{method:'POST',body:body},function(e){if(e){toast('Erreur','err');return;}closeModal();toast('SMTP configuré ✓','ok');});
    };
  });
}

function openAdd(){
  var fns={projets:openNewProjet,equipements:openNewEquip,pieces:openNewPiece,interventions:openNewInterv,clients:openNewClient,equipes:openNewEquipe,utilisateurs:openNewUser};
  if(fns[S.page])fns[S.page]();

// ══════════════════════════════════════════════════════════
// PANEL / MODAL / TOAST
// ══════════════════════════════════════════════════════════
function di(label,val){return '<div class="di"><div class="dl">'+esc(label)+'</div><div class="dv">'+esc(val||'--')+'</div></div>';}

function openPanel(title){
  document.getElementById('spt').textContent=title;
  document.getElementById('spb').innerHTML='<div class="ld"><div class="spin"></div></div>';
  document.getElementById('spf').innerHTML='';
  document.getElementById('sp').classList.add('on');
  document.getElementById('pov').classList.add('on');
}
function closePanel(){document.getElementById('sp').classList.remove('on');document.getElementById('pov').classList.remove('on');}
function openModal(title,body){
  document.getElementById('mott').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mov').classList.add('on');
}
function closeModal(){document.getElementById('mov').classList.remove('on');}

document.getElementById('sp-close').onclick=closePanel;
document.getElementById('pov').onclick=closePanel;
document.getElementById('m-cancel').onclick=closeModal;
document.getElementById('m-save').onclick=function(){if(S.formFn)S.formFn();};
document.getElementById('mov').onclick=function(e){if(e.target===document.getElementById('mov'))closeModal();};
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closePanel();closeModal();}});

var toastTmr;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast on '+(type||'');
  clearTimeout(toastTmr);toastTmr=setTimeout(function(){el.classList.remove('on');},3500);
}

// ══════════════════════════════════════════════════════════
// ONLINE
// ══════════════════════════════════════════════════════════
function updateOnlineUI(){
  document.getElementById('odot').className='odot'+(S.online?'':' off');
  document.getElementById('olbl').textContent=S.online?'En ligne':'Hors ligne';
}
window.addEventListener('online',function(){S.online=true;updateOnlineUI();toast('Connexion rétablie','ok');});
window.addEventListener('offline',function(){S.online=false;updateOnlineUI();toast('Hors ligne','warn');});

})();
</script>

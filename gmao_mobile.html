<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>GMAO Terrain</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{
  --acc:#3b82f6;--acc2:#2563eb;--acc-l:#dbeafe;
  --bg:#f1f5f9;--white:#fff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--red:#ef4444;--red-l:#fee2e2;
  --orange:#f59e0b;--orange-l:#fef3c7;
  --green:#22c55e;--green-l:#dcfce7;
  --purple:#8b5cf6;--purple-l:#ede9fe;
  --teal:#14b8a6;--teal-l:#ccfbf1;
  --hh:58px;--bh:68px;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#1e293b,#1e3a5f);padding:24px;position:fixed;inset:0;z-index:999}
.lbox{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.lhead{text-align:center;margin-bottom:28px}
.lico{width:60px;height:60px;background:var(--acc);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px}
.lhead h1{font-size:20px;font-weight:800}
.lhead p{font-size:12px;color:var(--muted);margin-top:3px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.lf input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;outline:none;font-size:16px;-webkit-appearance:none;font-family:inherit}
.lf input:focus{border-color:var(--acc)}
.lbtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
.lbtn:active{opacity:.8}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
/* APP */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
#app.on{display:flex}
/* HEADER */
.hdr{height:var(--hh);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10}
.hbk{background:none;border:none;font-size:28px;cursor:pointer;color:var(--acc);padding:0 8px 0 0;display:none;font-weight:300;font-family:inherit;line-height:1}
.hbk.on{display:block}
.htitle{font-size:17px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.opill{background:var(--orange);color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:800;display:none}
.opill.on{display:block}
.sbtn-sync{background:var(--acc-l);color:var(--acc2);border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
/* CONTENT */
.mc{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(var(--bh) + 20px);-webkit-overflow-scrolling:touch}
/* BOTTOM NAV */
.bnav{height:var(--bh);background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);position:fixed;bottom:0;left:0;right:0;z-index:10;box-shadow:0 -1px 10px rgba(0,0,0,.06)}
.bni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 40px;cursor:pointer;border:none;background:none;color:var(--text);font-size:12px;font-weight:700;position:relative;font-family:inherit;border-radius:10px;transition:.15s}
.bni:active{background:var(--bg)}
.bni .ic{font-size:28px;line-height:1}
.bni.on{color:var(--acc)}
.bni .bb{position:absolute;top:4px;right:calc(50% - 20px);background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center}
/* BADGES */
.bx{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap}
.ok{background:var(--green-l);color:#166534}.warn{background:var(--orange-l);color:#92400e}
.danger{background:var(--red-l);color:#991b1b}.info{background:var(--acc-l);color:#1e40af}
.neutral{background:var(--border);color:var(--muted)}.teal{background:var(--teal-l);color:#0f766e}
.purple_{background:var(--purple-l);color:#5b21b6}
/* CARDS */
.card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);cursor:pointer;-webkit-user-select:none;user-select:none}
.card:active{transform:scale(.98);background:#f8fafc}
.ctop{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.cico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cm{background:var(--teal-l)}.cd{background:var(--purple-l)}
.cinfo{flex:1;min-width:0}
.cnum{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.ctit{font-size:15px;font-weight:700;line-height:1.3}
.csub{font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.cdate{font-size:11px;color:var(--muted)}
.cpend{font-size:10px;color:var(--orange);font-weight:700;background:var(--orange-l);padding:2px 8px;border-radius:8px}
/* DETAIL CARDS */
.dc{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.dct{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f1f5f9}
.dr:last-child{border-bottom:none}
.dl{font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0;min-width:110px}
.dv{font-size:13px;font-weight:600;text-align:right;word-break:break-word}
/* ACTION BUTTONS */
.abar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.abtn{padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.abtn:active{transform:scale(.97)}
.a-go{background:var(--orange);color:#fff}
.a-ok{background:var(--green);color:#fff}
.a-no{background:var(--red);color:#fff}
.a-cr{background:var(--acc);color:#fff}
.a-rd{background:var(--border);color:var(--text)}
/* CR SECTIONS */
.crsec{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.crst{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;outline:none;font-size:15px;font-family:inherit;-webkit-appearance:none;background:#fff;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{min-height:90px;resize:none}
.btn-f{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:8px;font-family:inherit;display:block}
.btn-f:active{transform:scale(.98)}
.btn-p{background:var(--acc);color:#fff}
.btn-n{background:var(--border);color:var(--text)}
.btn-d{background:var(--red-l);color:var(--red)}
/* PHOTOS */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pthumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:2px solid var(--border)}
.padd{aspect-ratio:1;border-radius:8px;border:2px dashed var(--acc-l);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;background:var(--bg);flex-direction:column;gap:4px;font-family:inherit}
.padd span{font-size:10px;font-weight:700;color:var(--acc)}
.padd:active{background:var(--border)}
.pwrap{position:relative}
.pdel{position:absolute;top:3px;right:3px;background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:inherit}
/* INTERVENANTS */
.ivrow{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.ivhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ivtit{font-size:13px;font-weight:700}
.ivdel{background:var(--red-l);color:var(--red);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.ivg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ivg .fg{margin-bottom:0}
.ivg .fg input{font-size:13px;padding:8px 10px}
/* SYNC BAR */
.sbar{background:var(--orange-l);border:1px solid var(--orange);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stxt{flex:1;font-size:12px;font-weight:600;color:#92400e}
.snow{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
/* MISC */
.slbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}
.es{text-align:center;padding:48px 20px;color:var(--muted)}
.es-ico{font-size:44px;display:block;margin-bottom:10px;opacity:.4}
.es p{font-size:15px;font-weight:600}
.ld{display:flex;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted)}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* PHOTO VIEWER */
.pv{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:none;align-items:center;justify-content:center}
.pv.on{display:flex}
.pv img{max-width:100%;max-height:88vh;border-radius:8px}
.pvc{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:50%;width:38px;height:38px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
/* SIDEBAR MENU */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;opacity:0;transition:opacity .25s}
.sb-overlay.on{display:block;opacity:1}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:#1e293b;z-index:51;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.sidebar.on{transform:translateX(0)}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-head img{height:30px;width:auto;object-fit:contain;background:#fff;border-radius:6px;padding:2px 6px}
.sb-head-title{color:#fff;font-size:14px;font-weight:800}
.sb-head-sub{color:#64748b;font-size:10px}
.sb-user{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.sb-un{color:#cbd5e1;font-size:12px;font-weight:600}
.sb-ur{color:#64748b;font-size:10px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-sec{display:block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#334155;padding:8px 8px 4px;margin-top:6px}
.sni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sni:active{background:rgba(255,255,255,.05)}
.sni.on{background:rgba(59,130,246,.2);color:#93c5fd}
.sni .sic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sni .sbb{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 6px}
.sb-bot{padding:8px;border-top:1px solid rgba(255,255,255,.08)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bh) + 12px);left:16px;right:16px;background:#1e293b;color:#fff;border-radius:12px;padding:13px 18px;font-size:13px;font-weight:600;z-index:400;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;text-align:center}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{background:#16a34a}.toast.err{background:var(--red)}.toast.warn{background:var(--orange)}
</style>
</head>

(function(){
'use strict';

// ── SIDEBAR MENU ─────────────────────────────────────────
function openSidebar() {

if ('serviceWorker' in navigator) {

// ── INDEXEDDB ───────────────────────────────────────────
var DB_NAME = 'gmao-final-v1';
var idb = null;

function openIDB() {
  return new Promise(function(res, rej) {
    var req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      // interventions : keyPath = id (nombre entier)
      if (!db.objectStoreNames.contains('interventions'))
        db.createObjectStore('interventions', {keyPath: 'id'});
      // pending : autoIncrement
      if (!db.objectStoreNames.contains('pending'))
        db.createObjectStore('pending', {keyPath: 'id', autoIncrement: true});
      // cache général : keyPath = key (string)
      if (!db.objectStoreNames.contains('cache'))
        db.createObjectStore('cache', {keyPath: 'key'});
    };
    req.onsuccess = function(e) { res(e.target.result); };
    req.onerror   = function(e) { rej(e); };
  });
}

// Cache général (auth, utilisateurs, equips)
function cacheGet(key) {
  return new Promise(function(res) {
    try {
      var tx  = idb.transaction('cache', 'readonly');
      var req = tx.objectStore('cache').get(key);
      req.onsuccess = function() { res(req.result ? req.result.val : null); };
      req.onerror   = function() { res(null); };
    } catch(e) { res(null); }
  });
}
function cacheSet(key, val) {
  try {
    var tx = idb.transaction('cache', 'readwrite');
    tx.objectStore('cache').put({key: key, val: val});
  } catch(e) {}
}

// Interventions
function ivGetAll() {
  return new Promise(function(res) {
    try {
      var tx  = idb.transaction('interventions', 'readonly');
      var req = tx.objectStore('interventions').getAll();
      req.onsuccess = function() { res(req.result || []); };
      req.onerror   = function() { res([]); };
    } catch(e) { res([]); }
  });
}
function ivPut(iv) {
  // Vérification : iv doit avoir un id entier
  if (!iv || typeof iv.id !== 'number') return;
  try {
    var tx = idb.transaction('interventions', 'readwrite');
    tx.objectStore('interventions').put(iv);
  } catch(e) { console.warn('[IDB ivPut]', e); }
}
function ivClear() {
  return new Promise(function(res) {
    try {
      var tx  = idb.transaction('interventions', 'readwrite');
      var req = tx.objectStore('interventions').clear();
      req.onsuccess = function() { res(); };
      req.onerror   = function() { res(); };
    } catch(e) { res(); }
  });
}

// Pending
function pendGetAll() {
  return new Promise(function(res) {
    try {
      var tx  = idb.transaction('pending', 'readonly');
      var req = tx.objectStore('pending').getAll();
      req.onsuccess = function() { res(req.result || []); };
      req.onerror   = function() { res([]); };
    } catch(e) { res([]); }
  });
}
function pendAdd(action) {
  return new Promise(function(res, rej) {
    try {
      var tx  = idb.transaction('pending', 'readwrite');
      var req = tx.objectStore('pending').add(action);
      req.onsuccess = function() { res(req.result); };
      req.onerror   = function(e) { rej(e); };
    } catch(e) { rej(e); }
  });
}
function pendDel(id) {
  return new Promise(function(res) {
    try {
      var tx  = idb.transaction('pending', 'readwrite');
      var req = tx.objectStore('pending').delete(id);
      req.onsuccess = function() { res(); };
      req.onerror   = function() { res(); };
    } catch(e) { res(); }
  });
}

// ── ÉTAT ────────────────────────────────────────────────
var API = window.location.origin;
var S = {
  user: null, token: null, online: navigator.onLine,
  page: 'today', prevPage: null,
  ivs: [], pending: [], users: [], equips: [],
  curId: null, crPhotos: [], crIvs: [], flt: '', equipes: []
};

function isAdmin()   { return S.user && S.user.role === 'admin'; }
function isManager() { return S.user && (S.user.role === 'admin' || S.user.role === 'manager'); }

// ── UTILITAIRES ─────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today() { return new Date().toISOString().split('T')[0]; }
function fd(d) {
  if (!d) return '--';
  try { var p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  catch(e) { return d; }
}
function toInt(v) {
  if (v === null || v === undefined || v === '' || v === 0) return null;
  var n = parseInt(v, 10);
  return isNaN(n) ? null : n;
}

function bstat(s) {
  var cls = {A_PLANIFIER:'info',PLANIFIEE:'info',EN_COURS:'warn',TERMINEE:'ok',ANNULEE:'neutral'};
  var lbl = {A_PLANIFIER:'A planifier',PLANIFIEE:'Planifiee',EN_COURS:'En cours',TERMINEE:'Terminee',ANNULEE:'Annulee'};
  return '<span class="bx '+(cls[s]||'neutral')+'">'+(lbl[s]||s||'--')+'</span>';
}
function btype(t) {
  return t === 'MAINTENANCE'
    ? '<span class="bx teal">Maintenance</span>'
    : '<span class="bx purple_">Depannage</span>';
}
function drow(l, v) {
  return '<div class="dr"><span class="dl">'+esc(l)+'</span><span class="dv">'+esc(v||'--')+'</span></div>';
}

// ── API ─────────────────────────────────────────────────
function api(path, opts, cb) {
  var h = {'Content-Type': 'application/json'};
  if (S.token) h['Authorization'] = 'Bearer ' + S.token;
  var fo = Object.assign({}, opts || {}, {headers: h});
  if (fo.body) fo.body = JSON.stringify(fo.body);
  fetch(API + path, fo)
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.error || 'HTTP ' + r.status); });
      return r.json();
    })
    .then(function(d) { if (cb) cb(null, d); })
    .catch(function(e) { if (cb) cb(e); });
}

function apiP(path, method, body) {
  return new Promise(function(res, rej) {
    var h = {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token};
    fetch(API + path, {method: method || 'GET', headers: h, body: body ? JSON.stringify(body) : undefined})
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(res).catch(rej);
  });
}

// ── AUTH ─────────────────────────────────────────────────
document.getElementById('lbtn').onclick = doLogin;
document.getElementById('lp').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };

function doLogin() {
  var em = document.getElementById('lu').value.trim();
  var pw = document.getElementById('lp').value.trim();
  if (!em || !pw) { document.getElementById('lerr').textContent = 'Email et mot de passe requis'; return; }
  var btn = document.getElementById('lbtn');
  btn.disabled = true; btn.textContent = 'Connexion...';
  document.getElementById('lerr').textContent = '';

  if (!S.online) {
    cacheGet('auth').then(function(saved) {
      btn.disabled = false; btn.textContent = 'Se connecter';
      if (saved && saved.email === em) { S.user = saved.user.user || saved.user; S.token = saved.token; startApp(); }
      else document.getElementById('lerr').textContent = 'Connexion impossible hors ligne';
    });
    return;
  }

  api('/api/login', {method: 'POST', body: {email: em, password: pw}}, function(err, user) {
    btn.disabled = false; btn.textContent = 'Se connecter';
    if (err) { document.getElementById('lerr').textContent = err.message || 'Identifiants incorrects'; return; }
    S.user = user.user || user; S.token = user.token || (user.user ? user.token : null);
    cacheSet('auth', {email: em, user: S.user, token: S.token});
    startApp();
  });
}

// ── APP ──────────────────────────────────────────────────
function startApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  // Remplir sidebar avec infos user
  // Remplir sidebar avec infos user
  var su = S.user;
  if (su) {
    var nm = su.nom || su.email || '?';
    var av = document.getElementById('sb-av');
    var un = document.getElementById('sb-un');
    var ur = document.getElementById('sb-ur');
    if (av) av.textContent = nm.charAt(0).toUpperCase();
    if (un) un.textContent = nm;
    if (ur) ur.textContent = su.role || '';
    // Masquer menus selon rôle
    if (su.role === 'technicien') {
      ['sb-clients','sb-projets','sb-equipes','sb-users','sb-gammes','sb-techniques',
       'sb-pieces','sb-interventions','sb-pending','sb-parametres','sb-pieces-menu','sb-pieces-nav'].forEach(function(id){
        var el=document.getElementById(id); if(el)el.style.display='none';
      });
    } else if (su.role === 'manager') {
      ['sb-users'].forEach(function(id){
        var el=document.getElementById(id); if(el)el.style.display='none';
      });
    }
  }
  updateOnline();
  loadAll(function() { navTo('today'); });
  loadPending();
}

function loadAll(done) {
  var cnt = 0, tot = 2;
  function chk() { if (++cnt >= tot && done) done(); }

  if (S.online) {
    api('/api/utilisateurs', {}, function(e, d) { if (!e && d) { S.users = d; cacheSet('users', d); } chk(); });
    api('/api/interventions', {}, function(e, d) {
      if (!e && d) {
        S.ivs = d;
        ivClear().then(function() { d.forEach(function(iv) { if (typeof iv.id === 'number') ivPut(iv); }); updateBtBadge(); });
      }
      chk();
    });
    api('/api/equipements', {}, function(e, d) { if (!e && d) { S.equips = d; cacheSet('equips', d); } });
    api('/api/equipes', {}, function(e, d) { if (!e && d) { S.equipes = d; cacheSet('equipes', d); } });
    api('/api/gammes', {}, function(e, d) { if (!e && d) { S.gammes = d; cacheSet('gammes', d); } });
  } else {
    cacheGet('users').then(function(d) { if (d) S.users = d; chk(); });
    ivGetAll().then(function(d) { S.ivs = d || []; updateBtBadge(); chk(); });
    cacheGet('equips').then(function(d) { if (d) S.equips = d; });
    cacheGet('equipes').then(function(d) { if (d) S.equipes = d; });
    cacheGet('gammes').then(function(d) { if (d) S.gammes = d; });
  }
}

function loadPending() {
  pendGetAll().then(function(d) { S.pending = d || []; updatePendBadge(); });
}

function updateBtBadge() {
  var n = S.ivs.filter(function(i) { return i.statut !== 'TERMINEE' && i.statut !== 'ANNULEE'; }).length;
  ['bb-bt','sbb-bt'].forEach(function(id){ var el=document.getElementById(id); if(el){el.textContent=n;el.style.display=n>0?'block':'none';} });
}
function updatePendBadge() {
  var n = S.pending.length;
  ['bb-pend','sbb-pend'].forEach(function(id){ var el=document.getElementById(id); if(el){el.textContent=n;el.style.display=n>0?'block':'none';} });
}

// ── NAVIGATION ───────────────────────────────────────────
var TITLES = {
  'today': "Aujourd'hui", 'mes-bt': 'Mes interventions',
  'pending': 'A synchroniser', 'profil': 'Mon profil',
  'detail': 'Intervention', 'cr': 'Compte rendu', 'new-bt': 'Nouveau BT',

function navTo(page) {
  var isDetail = ['detail','cr','new-bt'].indexOf(page) >= 0;
  document.querySelectorAll('.bni[data-p]').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.sni[data-sp]').forEach(function(b){ b.classList.remove('on'); });

  S.page = page;
  render();

function render() {
  var fns = {
    'today':        renderToday,
    'mes-bt':       renderMesBT,
    'pending':      renderPending,
    'profil':       renderProfil,
    'detail':       renderDetail,

// ── PAGES SUPPLEMENTAIRES MOBILE ────────────────────────
function renderSimplePage(title, apiPath, renderFn) {
  document.getElementById('mc').innerHTML = '<div class="ld"><div class="spin"></div></div>';
  api(apiPath, {}, function(err, data) {
    if (err) { document.getElementById('mc').innerHTML = '<div class="es"><span class="es-ico">&#9888;</span><p>Erreur de chargement</p></div>'; return; }
    renderFn(data || []);
  });
}

function listCard(title, sub, badge) {
  return '<div class="card" style="cursor:default">'
    +'<div class="ctop"><div class="cinfo">'
    +'<div class="ctit">'+esc(title)+'</div>'
    +(sub?'<div class="csub">'+esc(sub)+'</div>':'')
    +'</div>'+(badge?'<span class="bx info">'+esc(badge)+'</span>':'')+'</div></div>';
}

function renderClientsM() {
  renderSimplePage('Clients', '/api/clients', function(data) {
    var h = data.length ? data.map(function(c){ return listCard(c.societe, (c.email||'')+(c.telephone?' · '+c.telephone:''), null); }).join('') : '<div class="es"><span class="es-ico">&#127970;</span><p>Aucun client</p></div>';
    document.getElementById('mc').innerHTML = h;
  });
}

function renderProjetsM() {
  renderSimplePage('Projets', '/api/projets', function(data) {
    var h = data.length ? data.map(function(p){ return listCard(p.nom, p.client_nom+' · '+(p.manager_nom||'--'), p.statut.replace(/_/g,' ')); }).join('') : '<div class="es"><span class="es-ico">&#128193;</span><p>Aucun projet</p></div>';
    document.getElementById('mc').innerHTML = h;
  });
}

function renderEquipementsM(flt) {
  flt = flt || '';
  document.getElementById('mc').innerHTML = '<div class="ld"><div class="spin"></div></div>';
  api('/api/equipements', {}, function(err, data) {
    if (err) { document.getElementById('mc').innerHTML = '<div class="es"><p>Erreur</p></div>'; return; }
    var all = data || [];
    var filtered = flt ? all.filter(function(e){
      return [e.designation,e.projet_nom,e.type_technique,e.localisation,e.marque,e.modele].join(' ').toLowerCase().indexOf(flt.toLowerCase()) >= 0;
    }) : all;
    var h = '';
    h += '<div style="display:flex;gap:8px;margin-bottom:10px"><input id="eq-search-m" type="text" placeholder="Rechercher un équipement..." value="'+esc(flt)+'" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit"><button id="eq-search-btn" style="background:var(--acc);color:#fff;border:none;border-radius:8px;padding:0 14px;font-size:18px;cursor:pointer">🔍</button></div>';
    h += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+filtered.length+' équipement(s)</div>';
    h += '<div id="eq-cards-m">';
    if(!filtered.length){
      h += '<div class="es"><span class="es-ico">&#9881;</span><p>Aucun équipement</p></div>';
    } else {
      filtered.forEach(function(e){
        var crit = e.criticite==='CRITIQUE'?'danger':e.criticite==='A_SURVEILLER'?'warn':'ok';
        h += '<div class="dc eq-card" data-eq-id="'+e.id+'" style="margin-bottom:10px;cursor:pointer">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center">';

        h += '<span class="bx '+crit+'">'+esc(e.criticite||'OK')+'</span></div>';
        h += drow('Projet', e.projet_nom||'--');
        h += drow('Type', e.type_technique.replace(/_/g,' '));
        if(e.localisation) h += drow('Localisation', e.localisation);
        h += '</div>';
      });
    }
    h += '</div>';
    document.getElementById('mc').innerHTML = h;
    var inp = document.getElementById('eq-search-m');
    var btn=document.getElementById('eq-search-btn');
    if(btn) btn.onclick=function(){renderEquipementsM(inp?inp.value:'');};
    if(inp) inp.onkeydown=function(e){if(e.key==='Enter')renderEquipementsM(this.value);};
    attachEqCardsMobile(all);
  });
}


function attachEqCardsMobile(all) {

      openEquipementMobile(eid, all);

function openEquipementMobile(eid, all) {
  var eq = all ? all.find(function(e){return e.id===eid;}) : null;
  // Recharger depuis API pour avoir toutes les infos
  api('/api/equipements/'+eid, {}, function(err, e) {

    document.getElementById('htitle').textContent = e.designation;
    document.getElementById('hbk').classList.add('on');
    var old_page = S.page; S.page = 'eq-detail';
    document.getElementById('hbk').onclick = function(){
      S.page = old_page;
      document.getElementById('hbk').classList.remove('on');
      document.getElementById('htitle').textContent = 'Equipements';
      renderEquipementsM();
    };
    var h = '<div class="dc">';

    h += '<span style="font-size:16px;font-weight:800">'+esc(e.designation)+'</span>';

    h += '<span class="bx '+crit+'">'+esc(e.criticite||'OK')+'</span></div>';
    h += drow('Projet', e.projet_nom||'--');
    h += drow('Type technique', e.type_technique.replace(/_/g,' '));
    h += drow('Localisation', e.localisation||'--');
    h += drow('Marque', e.marque||'--');
    h += drow('Modèle', e.modele||'--');
    h += drow('Puissance', e.puissance||'--');
    h += drow('N° de série', e.numero_serie||'--');
    h += drow('I/O', e.in_out||'--');
    h += drow('Mise en service', e.date_mise_en_service||'--');
    h += drow('Statut', e.statut||'--');

    if(e.gammes && e.gammes.length){
      h += '<div class="dc" style="margin-top:10px"><div class="crst">Gammes ('+e.gammes.length+')</div>';

        h += '<div style="padding:6px 0;border-bottom:1px solid var(--border)"><b>'+esc(g.nom)+'</b> — '+esc(g.periodicite.replace(/_/g,' '))+'</div>';
      });

    if(e.pieces && e.pieces.length){
      h += '<div class="dc" style="margin-top:10px"><div class="crst">Pièces ('+e.pieces.length+')</div>';

        var ps=p.statut==='A_REMPLACER'?'danger':p.statut==='A_SURVEILLER'?'warn':'ok';
        h += '<div style="padding:8px 0;border-bottom:1px solid var(--border)">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
        h += '<span style="font-weight:700;font-size:13px">'+esc(p.type_piece.replace(/_/g,' '))+'</span>';
        h += '<span class="bx '+ps+'" style="font-size:10px">'+esc(p.statut.replace(/_/g,' '))+'</span></div>';
        if(p.quantite>1) h += drow('Quantité', p.quantite);
        if(p.reference) h += drow('Référence', p.reference);
        if(p.date_installation) h += drow('Installation', p.date_installation);
        if(p.duree_vie_estimee) h += drow('Durée de vie', p.duree_vie_estimee+' ans');

        if(p.commentaire) h += drow('Commentaire', p.commentaire);

      });

    }

  });
}

function card(i) {
  var ico = i.type === 'MAINTENANCE' ? '&#128295;' : '&#9889;';
  var cls = i.type === 'MAINTENANCE' ? 'cm' : 'cd';
  var pnd = S.pending.filter(function(p){ return p.interv_id === i.id; }).length;
  return '<div class="card" data-id="'+i.id+'">'
    +'<div class="ctop"><div class="cico '+cls+'">'+ico+'</div>'
    +'<div class="cinfo"><div class="cnum">'+esc(i.numero)+'</div>'
    +'<div class="ctit">'+esc(i.equip_nom||'--')+'</div>'
    +'<div class="csub">'+esc(i.projet_nom||'--')+(i.localisation?' · '+esc(i.localisation):'')+'</div>'
    +'</div></div>'
    +'<div class="cbot"><div style="display:flex;gap:6px;flex-wrap:wrap">'+bstat(i.statut)+' '+btype(i.type)+'</div>'
    +(pnd>0?'<span class="cpend">&#11014; '+pnd+' en attente</span>':'<span class="cdate">'+fd(i.date_prevue)+'</span>')
    +'</div></div>';
}

// ── DETAIL ───────────────────────────────────────────────
function renderDetail() {
  document.getElementById('mc').innerHTML = '<div class="ld"><div class="spin"></div></div>';
  if (S.online) {
    api('/api/interventions/' + S.curId, {}, function(err, full) {
      if (!err && full && typeof full.id === 'number') {
        S.ivs = S.ivs.map(function(x) { return x.id === full.id ? full : x; });
        ivPut(full);
      }
      showDetail(full || S.ivs.find(function(x){ return x.id === S.curId; }) || {});
    });
  } else {
    showDetail(S.ivs.find(function(x){ return x.id === S.curId; }) || {});
  }
}

function showDetail(i) {
  var crs       = i.comptes_rendus || [];
  var cr        = crs.length > 0 ? crs[0] : null; // dernier CR pour affichage
  var canModify = isManager();
  var canCreate = true; // tout le monde peut créer un nouveau CR

  // ── Boutons d'action ──
  var h = '<div class="abar">';
  if (i.statut === 'A_PLANIFIER' || i.statut === 'PLANIFIEE')
    h += '<button class="abtn a-go" data-ns="EN_COURS">&#9654; Demarrer</button>';
  if (i.statut === 'EN_COURS')
    h += '<button class="abtn a-ok" data-ns="TERMINEE">&#10003; Terminer</button>';
  if (i.statut !== 'TERMINEE' && i.statut !== 'ANNULEE' && isManager())
    h += '<button class="abtn a-no" data-ns="ANNULEE">&#10005; Annuler</button>';
  if (isManager())
    h += '<button class="abtn" style="background:var(--red);color:#fff" id="btn-del-bt">&#128465; Supprimer</button>';

  if (canCreate)
    h += '<button class="abtn a-cr" id="btn-cr-new">&#128221; Creer CR</button>';
  else if (canModify)
    h += '<button class="abtn a-cr" id="btn-cr-edit">&#128221; Modifier CR</button>';

  h += '</div>';

  // ── Infos ──
  h += '<div class="dc"><div class="dct">Intervention</div>';
  h += drow('Reference', i.numero);
  h += drow('Type', i.type === 'MAINTENANCE' ? 'Maintenance' : 'Depannage');
  h += drow('Statut', i.statut ? i.statut.replace(/_/g,' ') : null);
  h += drow('Date prevue', fd(i.date_prevue));
  h += drow('Date realisation', fd(i.date_realisation));
  h += '</div>';

  h += '<div class="dc"><div class="dct">Equipement</div>';
  h += drow('Designation', i.equip_nom);
  h += drow('Type', i.type_technique ? i.type_technique.replace(/_/g,' ') : null);
  h += drow('Projet', i.projet_nom);
  h += drow('Localisation', i.localisation);
  h += drow('Equipe', i.equipe_nom);
  h += '</div>';

  if (i.description)
    h += '<div class="dc"><div class="dct">Description</div><p style="font-size:14px;line-height:1.6">'+esc(i.description)+'</p></div>';

  // ── Comptes rendus (liste) ──
  h += '<div class="dc"><div class="dct">Comptes rendus ('+crs.length+')</div>';
  if (!crs.length) {
    h += '<p style="color:var(--muted);font-size:13px;margin-bottom:8px">Aucun compte rendu</p>';
  }
  crs.forEach(function(crItem, cidx) {
    h += '<div class="crsec" style="margin-bottom:10px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<span style="font-size:12px;font-weight:800;color:var(--acc)">CR-'+String(crItem.id).padStart(5,'0')+' — '+fd(crItem.date_intervention)+'</span>';
    if (canModify) h += '<button class="abtn a-cr" style="font-size:11px;padding:5px 10px" data-edit-cr="'+cidx+'">&#9998; Modifier</button>';
    h += '</div>';
    if (crItem.observations)      h += '<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Observations :</strong> '+esc(crItem.observations)+'</p>';
    if (crItem.actions_realisees) h += '<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Actions :</strong> '+esc(crItem.actions_realisees)+'</p>';
    if (crItem.mesures)           h += '<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Mesures :</strong> '+esc(crItem.mesures)+'</p>';
    if (crItem.recommandations)   h += '<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Recommandations :</strong> '+esc(crItem.recommandations)+'</p>';
    if (crItem.conclusion)        h += '<p style="font-size:12px;line-height:1.5;margin-bottom:4px"><strong>Conclusion :</strong> '+esc(crItem.conclusion)+'</p>';
    if (crItem.total_heures)      h += '<p style="font-size:11px;color:var(--muted)">Total : '+crItem.total_heures+'h</p>';
    if (crItem.intervenants && crItem.intervenants.length) {
      h += '<div style="margin-top:6px">';
      crItem.intervenants.forEach(function(iv) {
        h += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">';
        h += '<span style="font-weight:600">'+esc(iv.nom)+'</span>';
        h += '<span style="color:var(--muted)">'+fd(iv.date)+' '+(iv.heure_debut||'')+'-'+(iv.heure_fin||'')+' ('+iv.total_heures+'h)</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    if (crItem.photos) {
      try {
        var photos = typeof crItem.photos==='string' ? JSON.parse(crItem.photos) : crItem.photos;
        if (photos && photos.length) {
          window._pvPhotos = photos;
          h += '<div class="pgrid" style="margin-top:8px">';
          photos.forEach(function(p, pidx) { h += '<img class="pthumb" src="'+p.data+'" data-pv="'+pidx+'">'; });
          h += '</div>';
        }
      } catch(e) {}
    }
    h += '</div>';
  });
  h += '<button class="btn-f btn-p" id="btn-cr-new-bottom" style="margin-top:8px">+ Nouveau compte rendu</button>';
  h += '</div>';
  document.getElementById('mc').innerHTML = h;

  // Events statut
  document.querySelectorAll('[data-ns]').forEach(function(btn) {
    btn.onclick = function() { changeStatut(i.id, btn.dataset.ns); };
  });
  // Supprimer BT
  var btnDel = document.getElementById('btn-del-bt');
  if (btnDel) {
    btnDel.onclick = function() {
      if (!confirm('Supprimer ce bon ?')) return;
      api('/api/interventions/'+i.id, {method:'DELETE'}, function(err) {
        if (err) { toast('Erreur : '+err.message, 'err'); return; }
        toast('Bon supprime', 'ok');
        S.ivs = S.ivs.filter(function(x){ return x.id !== i.id; });
        navTo(S.prevPage || 'today');
      });
    };
  }

  // Boutons nouveau CR (haut et bas)
  function openNewCR() { S.crIvs = []; S.crPhotos = []; S.editCrId = null; S.editCrData = null; navTo('cr'); }
  var btnNew = document.getElementById('btn-cr-new');
  if (btnNew) btnNew.onclick = openNewCR;
  var btnNewBot = document.getElementById('btn-cr-new-bottom');
  if (btnNewBot) btnNewBot.onclick = openNewCR;

  // Boutons modifier CR existant
  document.querySelectorAll('[data-edit-cr]').forEach(function(btn) {
    btn.onclick = function() {
      var cidx = parseInt(btn.dataset.editCr, 10);
      var crItem = crs[cidx];
      S.crIvs = crItem && crItem.intervenants ? crItem.intervenants.map(function(iv) {
        return {uid: iv.utilisateur_id||'', nom: iv.nom||'', date: iv.date||today(), hd: iv.heure_debut||'', hf: iv.heure_fin||''};
      }) : [];
      S.crPhotos = [];
      S.editCrId = crItem ? crItem.id : null;
      S.editCrData = crItem || null;
      navTo('cr');
    };
  });

  // Photo viewer
  document.querySelectorAll('[data-pv]').forEach(function(img) {
    img.onclick = function() {
      var idx = parseInt(img.dataset.pv, 10);
      if (window._pvPhotos && window._pvPhotos[idx]) {
        document.getElementById('pv-img').src = window._pvPhotos[idx].data;
        document.getElementById('pv').classList.add('on');
      }
    };
  });
}

function changeStatut(id, ns) {
  // Vérif que id est bien un nombre
  if (typeof id !== 'number' || isNaN(id)) { toast('Erreur ID invalide', 'err'); return; }
  // Update local
  S.ivs = S.ivs.map(function(x) {
    if (x.id === id) { x.statut = ns; ivPut(x); return x; }
    return x;
  });
  if (S.online) {
    api('/api/interventions/'+id, {method:'PATCH', body:{statut:ns}}, function(err) {
      if (err) {
        toast('Erreur - action en attente', 'warn');
        pendAdd({type:'statut', interv_id:id, statut:ns, ts:Date.now()}).then(loadPending);
      } else {
        toast('Statut mis a jour', 'ok');
      }
      // Recharger le detail
      S.curId = id; renderDetail();
    });
  } else {
    pendAdd({type:'statut', interv_id:id, statut:ns, ts:Date.now()}).then(function(){
      loadPending(); toast('Hors ligne - action enregistree', 'warn');
      S.curId = id; renderDetail();
    });
  }
}

function renderIvList() {
  var el = document.getElementById('iv-list');
  if (!el) return;
  if (!S.crIvs.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;margin-bottom:12px">Aucun intervenant</p>';
    return;
  }
  el.innerHTML = S.crIvs.map(function(iv, i) {
    return '<div class="ivrow">'
      +'<div class="ivhd"><span class="ivtit">Intervenant '+(i+1)+'</span>'
      +'<button class="ivdel" data-del="'+i+'">&#10005; Supprimer</button></div>'
      +'<div class="fg"><label>Technicien</label><select class="iv-sel" data-idx="'+i+'">'
      +'<option value="">-- Selectionner --</option>'
      +S.users.map(function(u){
         return '<option value="'+u.id+'"'+(String(iv.uid)===String(u.id)?' selected':'')+'>'+esc(u.nom)+'</option>';
       }).join('')
      +'</select></div>'
      +'<div class="ivg">'
      +'<div class="fg"><label>Date</label><input type="date" class="iv-dt" data-idx="'+i+'" value="'+(iv.date||today())+'"></div>'
      +'<div class="fg"><label>Debut</label><input type="time" class="iv-hd" data-idx="'+i+'" value="'+(iv.hd||'')+'"></div>'
      +'<div class="fg"><label>Fin</label><input type="time" class="iv-hf" data-idx="'+i+'" value="'+(iv.hf||'')+'"></div>'
      +'</div></div>';
  }).join('');
  el.querySelectorAll('.iv-sel').forEach(function(s){ s.onchange = function(){ S.crIvs[parseInt(s.dataset.idx,10)].uid = s.value; }; });
  el.querySelectorAll('.iv-dt').forEach(function(s){  s.onchange = function(){ S.crIvs[parseInt(s.dataset.idx,10)].date = s.value; }; });
  el.querySelectorAll('.iv-hd').forEach(function(s){  s.onchange = function(){ S.crIvs[parseInt(s.dataset.idx,10)].hd = s.value; }; });
  el.querySelectorAll('.iv-hf').forEach(function(s){  s.onchange = function(){ S.crIvs[parseInt(s.dataset.idx,10)].hf = s.value; }; });
  el.querySelectorAll('.ivdel').forEach(function(btn){
    btn.onclick = function() { S.crIvs.splice(parseInt(btn.dataset.del,10),1); renderIvList(); };
  });
}

function renderPhotoGrid() {
  var el = document.getElementById('photo-grid');
  if (!el) return;
  var h = S.crPhotos.map(function(p,i){
    return '<div class="pwrap"><img class="pthumb" src="'+p.data+'"><button class="pdel" data-del="'+i+'">&#10005;</button></div>';
  }).join('');
  h += '<button class="padd" id="add-photo"><span style="font-size:28px">&#128247;</span><span>Photo</span></button>';
  el.innerHTML = h;
  document.getElementById('add-photo').onclick = function(){
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = function(){
      if (!inp.files[0]) return;
      var r = new FileReader();
      r.onload = function(e){ S.crPhotos.push({data:e.target.result, name:inp.files[0].name}); renderPhotoGrid(); };
      r.readAsDataURL(inp.files[0]);
    };
    inp.click();
  };
  el.querySelectorAll('.pdel').forEach(function(btn){
    btn.onclick = function(e){ e.stopPropagation(); S.crPhotos.splice(parseInt(btn.dataset.del,10),1); renderPhotoGrid(); };
  });
  el.querySelectorAll('.pthumb').forEach(function(img){
    img.onclick = function(){ document.getElementById('pv-img').src=img.src; document.getElementById('pv').classList.add('on'); };
  });
}

function saveCR() {
  var intervenants = S.crIvs
    .filter(function(iv){ return iv.uid || iv.nom; })
    .map(function(iv){
      var u = S.users.find(function(x){ return String(x.id) === String(iv.uid); });
      return {
        utilisateur_id: toInt(iv.uid),
        nom:            iv.nom || (u ? u.nom : ''),
        date:           iv.date || today(),
        heure_debut:    iv.hd || '',
        heure_fin:      iv.hf || ''
      };
    });

  var body = {
    date_intervention: document.getElementById('crd').value,
    observations:      document.getElementById('cro').value,
    actions_realisees: document.getElementById('cra').value,
    mesures:           document.getElementById('crm').value,
    recommandations:   document.getElementById('crr').value,
    conclusion:        document.getElementById('crc').value,
    photos:            S.crPhotos,
    intervenants:      intervenants
  };
  if (S.editCrId) body.cr_id = S.editCrId;

  if (S.online) {
    api('/api/comptes_rendus/'+S.curId, {method:'POST', body:body}, function(err){
      if (err) { toast('Erreur : '+err.message, 'err'); return; }
      toast('Compte rendu enregistre', 'ok');
      S.crIvs=[]; S.crPhotos=[];
      api('/api/interventions/'+S.curId, {}, function(e2, full){
        if (!e2 && full && typeof full.id === 'number') {
          S.ivs = S.ivs.map(function(x){ return x.id===full.id?full:x; });
          ivPut(full);
        }
        navTo('detail');
      });
    });
  } else {
    pendAdd({type:'cr', interv_id:S.curId, data:body, ts:Date.now()}).then(function(){
      loadPending();
      toast('Hors ligne - CR enregistre', 'warn');
      S.crIvs=[]; S.crPhotos=[];
      navTo('detail');
    });
  }
}

function renderNewBT() {
  if (S.online && !S.equips.length) {
    api('/api/equipements', {}, function(e,d){ if(!e&&d){S.equips=d;cacheSet('equips',d);} doNewBT(); });
  } else { doNewBT(); }
}

function doNewBT() {
  // Extraire les projets uniques depuis les équipements
  var projetsMap = {};
  S.equips.forEach(function(e){
    if (!projetsMap[e.projet_id]) projetsMap[e.projet_id] = {id:e.projet_id, nom:e.projet_nom||'--'};
  });
  var projets = Object.values(projetsMap).sort(function(a,b){return a.nom.localeCompare(b.nom);});

  var h = '<div class="fg"><label>Type *</label><select id="nbt-type" style="-webkit-appearance:none">';
  h += '<option value="MAINTENANCE">Maintenance</option><option value="DEPANNAGE">Depannage</option></select></div>';
  h += '<div class="fg"><label>Projet *</label><select id="nbt-proj" style="-webkit-appearance:none"><option value="">-- Selectionner --</option>';
  projets.forEach(function(p){ h += '<option value="'+p.id+'">'+esc(p.nom)+'</option>'; });
  h += '</select></div>';
  h += '<div class="fg"><label>Equipement *</label><select id="nbt-eq" style="-webkit-appearance:none"><option value="">-- Choisir un projet dabord --</option></select></div>';
  h += '<div class="fg"><label>Technicien</label><select id="nbt-tech" style="-webkit-appearance:none"><option value="">-- Aucun --</option>';
  (S.users||[]).filter(function(u){return u.role==='technicien'||u.role==='manager';}).forEach(function(u){ h += '<option value="'+u.id+'">'+esc(u.nom)+'</option>'; });
  h += '</select></div>';
  h += '<div class="fg"><label>Equipe</label><select id="nbt-equipe" style="-webkit-appearance:none"><option value="">-- Aucune --</option>';
  (S.equipes||[]).forEach(function(e){ h += '<option value="'+e.id+'">'+esc(e.nom)+'</option>'; });
  h += '</select></div>';
  h += '<div class="fg"><label>Date prevue</label><input type="date" id="nbt-date" value="'+today()+'">' + '</div>';
  h += '<div class="fg"><label>Description</label><textarea id="nbt-desc" placeholder="Description..."></textarea></div>';
  h += '<button class="btn-f btn-p" id="nbt-save">Creer le bon intervention</button>';
  h += '<button class="btn-f btn-n" id="nbt-cancel">Annuler</button>';
  document.getElementById('mc').innerHTML = h;

  document.getElementById('nbt-proj').onchange = function() {
    var pid = this.value;
    var sel = document.getElementById('nbt-eq');
    if (!pid) { sel.innerHTML = '<option value="">-- Choisir un projet dabord --</option>'; return; }
    sel.innerHTML = '<option value="">-- Selectionner --</option>';
    S.equips.filter(function(e){ return String(e.projet_id) === String(pid); })
      .forEach(function(e){ sel.innerHTML += '<option value="'+e.id+'">'+esc(e.designation)+'</option>'; });
  };

  document.getElementById('nbt-cancel').onclick = function(){ navTo(S.prevPage||'today'); };
  document.getElementById('nbt-save').onclick = function(){
    var proj = document.getElementById('nbt-proj').value;
    var eq   = document.getElementById('nbt-eq').value;
    if (!proj){ toast('Projet requis', 'err'); return; }
    if (!eq){   toast('Equipement requis', 'err'); return; }
    api('/api/interventions', {method:'POST', body:{
      type:          document.getElementById('nbt-type').value,
      equipement_id: parseInt(eq, 10),
      technicien_id: document.getElementById('nbt-tech').value || null,
      equipe_id:     document.getElementById('nbt-equipe').value || null,
      date_prevue:   document.getElementById('nbt-date').value || null,
      description:   document.getElementById('nbt-desc').value,
      statut:        'A_PLANIFIER'
    }}, function(err, res){
      if (err){ toast('Erreur : '+err.message, 'err'); return; }
      toast('BT cree : '+res.numero, 'ok');
      loadAll(function(){ navTo('mes-bt'); });
    });
  };
}

// ── PENDING ──────────────────────────────────────────────
function renderPending() {
  if (!S.pending.length) {
    document.getElementById('mc').innerHTML = '<div class="es"><span class="es-ico">&#10003;</span><p>Tout est synchronise</p></div>';
    return;
  }
  var h = '<div class="sbar"><span style="font-size:18px">&#11014;</span>'
    +'<span class="stxt">'+S.pending.length+' en attente</span>'
    +(S.online?'<button class="snow" onclick="doSync()">Synchroniser</button>':'<span style="font-size:11px;color:#92400e">Hors ligne</span>')
    +'</div>';
  S.pending.forEach(function(p){
    h += '<div class="card" style="cursor:default"><div class="ctop">'
      +'<div class="cico '+(p.type==='cr'?'cm':'cd')+'">'+(p.type==='cr'?'&#128221;':'&#9889;')+'</div>'
      +'<div class="cinfo"><div class="ctit">'+(p.type==='cr'?'Compte rendu':'Statut -> '+p.statut)+'</div>'
      +'<div class="csub">Intervention #'+p.interv_id+' · '+new Date(p.ts).toLocaleString('fr-FR')+'</div>'
      +'</div></div></div>';
  });
  document.getElementById('mc').innerHTML = h;
}

async function doSync() {
  if (!S.online){ toast('Pas de connexion', 'err'); return; }
  if (!S.pending.length){ toast('Rien a synchroniser', 'ok'); loadAll(function(){render();}); return; }
  var btn = document.getElementById('sync-btn');
  if (btn) btn.style.opacity = '.5';
  toast('Synchronisation...', 'warn');
  var ok=0, err=0, list = await pendGetAll();
  for (var p of list) {
    try {
      if (p.type === 'statut') await apiP('/api/interventions/'+p.interv_id, 'PATCH', {statut:p.statut});
      else if (p.type === 'cr') await apiP('/api/comptes_rendus/'+p.interv_id, 'POST', p.data);
      await pendDel(p.id); ok++;
    } catch(e) { err++; }
  }
  if (btn) btn.style.opacity = '1';
  await loadPending();
  loadAll(function(){ render(); toast(ok+' sync'+(err?' · '+err+' err':''), err===0?'ok':'warn'); });
}


// ── GAMMES MOBILE ────────────────────────────────────────
var PERIODICITES_M = [("QUOTIDIEN", "Quotidien (Tous les jours)"), ("HEBDOMADAIRE", "Hebdomadaire (Toutes les semaines)"), ("BIMENSUEL", "Bimensuel (Deux fois par mois)"), ("MENSUEL", "Mensuel (Tous les mois)"), ("BIMESTRIEL", "Bimestriel (Tous les deux mois)"), ("TRIMESTRIEL", "Trimestriel (Tous les trois mois)"), ("QUADRIMESTRIEL", "Quadrimestriel (Tous les quatre mois)"), ("SEMESTRIEL", "Semestriel (Tous les six mois)"), ("ANNUEL", "Annuel (Tous les ans)"), ("BISANNUEL", "Bisannuel / Biennal (Tous les deux ans)"), ("TRIENNAL", "Triennal (Tous les trois ans)"), ("QUADRIENNAL", "Quadriennal (Tous les quatre ans)"), ("QUINQUENNAL", "Quinquennal (Tous les cinq ans)")];

function renderGammesM() {
  document.getElementById('mc').innerHTML = '<div class="ld"><div class="spin"></div></div>';
  api('/api/gammes', {}, function(err, data) {
    if (err) { document.getElementById('mc').innerHTML = '<div class="es"><span class="es-ico">&#9888;</span><p>Erreur</p></div>'; return; }
    S.gammes = data || [];
    var canEdit = isManager();
    var h = '';
    if (canEdit) h += '<button class="btn-f btn-p" id="btn-new-gamme" style="margin-bottom:14px">+ Nouvelle gamme</button>';
    if (!S.gammes.length) {
      h += '<div class="es"><span class="es-ico">&#128221;</span><p>Aucune gamme</p></div>';
    } else {
      S.gammes.forEach(function(g) {
        h += '<div class="dc" style="margin-bottom:12px">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h += '<span style="font-size:15px;font-weight:800">'+esc(g.nom)+'</span>';
        if (canEdit) h += '<div style="display:flex;gap:6px"><button class="abtn a-cr" style="font-size:11px;padding:5px 10px" data-edit-gm="'+g.id+'">&#9998;</button><button class="abtn a-no" style="font-size:11px;padding:5px 10px" data-del-gm="'+g.id+'">&#10005;</button></div>';
        h += '</div>';
        h += drow('Periodicite', (g.periodicite||'').replace(/_/g,' '));
        h += drow('Temps', g.temps||'--');
        if (g.operations && g.operations.length) {
          h += '<div style="margin-top:8px"><div class="crst">Operations ('+g.operations.length+')</div>';
          g.operations.forEach(function(op, i) {
            h += '<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">'+(i+1)+'. '+esc(op.description)+'</div>';
          });
          h += '</div>';
        }
        h += '</div>';
      });
    }
    document.getElementById('mc').innerHTML = h;
    var btnNew = document.getElementById('btn-new-gamme');
    if (btnNew) btnNew.onclick = function() { openGammeFormM(null); };
    document.querySelectorAll('[data-edit-gm]').forEach(function(btn) {
      btn.onclick = function() {
        var g = S.gammes.find(function(x){ return x.id==btn.dataset.editGm; });
        if (g) openGammeFormM(g);
      };
    });
    document.querySelectorAll('[data-del-gm]').forEach(function(btn) {
      btn.onclick = function() {
        if (!confirm('Supprimer cette gamme ?')) return;
        api('/api/gammes/'+btn.dataset.delGm, {method:'DELETE'}, function(err) {
          if (err) { toast('Erreur', 'err'); return; }
          toast('Gamme supprimee', 'ok');
          renderGammesM();
        });
      };
    });
  });
}

function openGammeFormM(g) {
  g = g || {};
  var ops = g.operations || [];
  var h = '';
  h += '<div class="fg"><label>Nom *</label><input type="text" id="gm-nom" value="'+esc(g.nom||'')+'"></div>';
  h += '<div class="fg"><label>Periodicite *</label><select id="gm-per" style="-webkit-appearance:none">';
  PERIODICITES_M.forEach(function(p) {
    h += '<option value="'+p[0]+'"'+(g.periodicite===p[0]?' selected':'')+'>'+esc(p[1])+'</option>';
  });
  h += '</select></div>';
  h += '<div class="fg"><label>Temps (ex: 01h30)</label><input type="text" id="gm-temps" value="'+esc(g.temps||'00h00')+'" placeholder="00h00"></div>';
  h += '<div class="slbl">Operations</div>';
  h += '<div id="gm-ops-list">';
  ops.forEach(function(op, i) {
    h += '<div class="ivrow" style="margin-bottom:8px"><div class="ivhd"><span class="ivtit">Operation '+(i+1)+'</span><button class="ivdel gm-del-op">&#10005;</button></div><div class="fg" style="margin-bottom:0"><input class="gm-op-inp" value="'+esc(op.description||'')+'" placeholder="Description..."></div></div>';
  });
  h += '</div>';
  h += '<button class="btn-f btn-n" id="gm-add-op" style="margin-bottom:14px">+ Ajouter operation</button>';
  h += '<button class="btn-f btn-p" id="gm-save">Enregistrer</button>';
  h += '<button class="btn-f btn-n" id="gm-cancel">Annuler</button>';
  document.getElementById('mc').innerHTML = h;
  document.getElementById('htitle').textContent = g.id ? 'Modifier gamme' : 'Nouvelle gamme';

  function attachDelOps() {
    document.querySelectorAll('.gm-del-op').forEach(function(btn) {
      btn.onclick = function() { btn.closest('.ivrow').remove(); };
    });
  }
  attachDelOps();

  document.getElementById('gm-add-op').onclick = function() {
    var list = document.getElementById('gm-ops-list');
    var n = list.querySelectorAll('.ivrow').length + 1;
    var div = document.createElement('div');
    div.className = 'ivrow';
    div.style.marginBottom = '8px';
    div.innerHTML = '<div class="ivhd"><span class="ivtit">Operation '+n+'</span><button class="ivdel gm-del-op">&#10005;</button></div><div class="fg" style="margin-bottom:0"><input class="gm-op-inp" placeholder="Description..."></div>';
    list.appendChild(div);
    attachDelOps();
  };

  document.getElementById('gm-cancel').onclick = function() { renderGammesM(); };
  document.getElementById('gm-save').onclick = function() {
    var nom = document.getElementById('gm-nom').value.trim();
    if (!nom) { toast('Nom requis', 'err'); return; }
    var ops = [];
    document.querySelectorAll('.gm-op-inp').forEach(function(inp) {
      if (inp.value.trim()) ops.push({description: inp.value.trim()});
    });
    var body = {
      nom: nom,
      periodicite: document.getElementById('gm-per').value,
      temps: document.getElementById('gm-temps').value.trim() || '00h00',
      operations: ops
    };
    var url = g.id ? '/api/gammes/'+g.id : '/api/gammes';
    var method = g.id ? 'PATCH' : 'POST';
    api(url, {method:method, body:body}, function(err) {
      if (err) { toast('Erreur : '+err.message, 'err'); return; }
      toast(g.id ? 'Gamme modifiee' : 'Gamme creee', 'ok');
      api('/api/gammes', {}, function(e, d) { if (!e && d) { S.gammes = d; cacheSet('gammes', d); } });
      renderGammesM();
    });
  };
}

// ── PROFIL ───────────────────────────────────────────────
function renderProfil() {
  if (!S.user){ navTo('today'); return; }
  var su = S.user;
  var nm    = su.nom || su.email || '?';
  var total = S.ivs.length;
  var term  = S.ivs.filter(function(i){ return i.statut==='TERMINEE'; }).length;
  var enc   = S.ivs.filter(function(i){ return i.statut==='EN_COURS'; }).length;

  var h = '<div class="dc" style="text-align:center;padding:28px 18px">'
    +'<div style="width:70px;height:70px;background:var(--acc);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin-bottom:14px">'+esc(nm.charAt(0).toUpperCase())+'</div>'
    +'<div style="font-size:20px;font-weight:800">'+esc(nm)+'</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:4px">'+esc(su.email||'')+'</div>'
    +'<div style="margin-top:10px"><span class="bx info">'+esc(su.role||'')+'</span></div>'
    +'</div>';

  h += '<div class="dc"><div class="dct">Statistiques</div>';
  h += drow('Total interventions', total);
  h += drow('Terminees', term);
  h += drow('En cours', enc);
  h += drow('En attente sync', S.pending.length);
  h += '</div>';

  h += '<div class="dc"><div class="dct">Connexion</div>';
  h += '<div class="dr"><span class="dl">Statut</span><span class="dv">' + (S.online ? '<span style="color:#22c55e">&#9679;</span> En ligne' : '<span style="color:#ef4444">&#9679;</span> Hors ligne') + '</span></div>';
  h += drow('Serveur', API);
  h += '</div>';

  h += '<button class="btn-f btn-n" id="prof-sync">&#8645; Synchroniser maintenant</button>';
  h += '<button class="btn-f btn-d" id="prof-logout" style="margin-bottom:80px">&#128682; Deconnexion</button>';

  document.getElementById('mc').innerHTML = h;
  document.getElementById('prof-sync').onclick = function(){ doSync(); };
  document.getElementById('prof-logout').onclick = function(){
    if (!confirm('Se deconnecter ?')) return;
    S.user=null; S.token=null;
    cacheSet('auth', null);
    document.getElementById('app').classList.remove('on');
    document.getElementById('login').style.display = 'flex';
  };
}

// ── ONLINE ───────────────────────────────────────────────
function updateOnline() {
  var el = document.getElementById('opill');
  if (el) el.classList.toggle('on', !S.online);
}
window.addEventListener('online',  function(){ S.online=true;  updateOnline(); toast('Connexion retablie','ok'); setTimeout(doSync,1000); });
window.addEventListener('offline', function(){ S.online=false; updateOnline(); toast('Hors ligne','warn'); });

// ── PHOTO VIEWER ─────────────────────────────────────────
document.getElementById('pvc').onclick = function(){ document.getElementById('pv').classList.remove('on'); };

// ── TOAST ────────────────────────────────────────────────
var toastT;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast on ' + (type||'');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ el.classList.remove('on'); }, 3500);
}

openIDB().then(function(db){
  idb = db;
  cacheGet('auth').then(function(saved){
    if (saved && saved.token){ S.user=saved.user; S.token=saved.token; startApp(); }
  });
}).catch(function(e){ console.error('[IDB]', e); });

})();

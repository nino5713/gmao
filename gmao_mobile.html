<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SOCOM GMAO">
<meta name="theme-color" content="#0F1E3D" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0A1730" media="(prefers-color-scheme: dark)">
<title>SOCOM GMAO</title>
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/icons/socom-apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
:root {
  --navy-900: #0A1730;
  --navy-800: #0F1E3D;
  --navy-700: #162B4D;
  --navy-600: #1E3A5F;

  --accent: #3B82F6;
  --accent-hover: #2563EB;
  --accent-light: #DBEAFE;
  --accent-dark: #1E40AF;

  --danger: #DC2626;
  --danger-light: #FEE2E2;
  --danger-dark: #991B1B;
  --success: #10B981;
  --success-light: #D1FAE5;
  --success-dark: #065F46;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --warning-dark: #92400E;
  --purple: #8B5CF6;
  --purple-light: #F3E8FF;
  --purple-dark: #6B21A8;

  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --surface-2: #F1F5F9;
  --border: #E2E8F0;
  --border-light: #F1F5F9;
  --text: #0F172A;
  --text-muted: #64748B;
  --text-faint: #94A3B8;

  --nav-bg: #0F1E3D;
  --nav-border: rgba(255,255,255,0.08);
  --nav-inactive: #94A3B8;
  --nav-active: #60A5FA;

  --hdr-bg: #0F1E3D;
  --hdr-text: #FFFFFF;
  --hdr-muted: #94A3B8;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 64px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0A1730;
    --surface: #0F1E3D;
    --surface-2: #162B4D;
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.05);
    --text: #F1F5F9;
    --text-muted: #94A3B8;
    --text-faint: #64748B;
    --nav-bg: #0A1730;
    --accent-light: rgba(59,130,246,0.15);
    --accent-dark: #93C5FD;
    --danger-light: rgba(220,38,38,0.15);
    --danger-dark: #FCA5A5;
    --success-light: rgba(16,185,129,0.15);
    --success-dark: #6EE7B7;
    --warning-light: rgba(245,158,11,0.15);
    --warning-dark: #FCD34D;
    --purple-light: rgba(139,92,246,0.15);
    --purple-dark: #C4B5FD;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; }
button { cursor: pointer; }
::-webkit-scrollbar { width: 0; }

/* ───── LOGIN ───── */
#login {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background: linear-gradient(160deg, var(--navy-800) 0%, var(--navy-600) 100%);
}
.lbox { width: 100%; max-width: 380px; }
.llogo {
  display: flex; justify-content: center; margin-bottom: 36px;
}
.llogo img { width: 180px; height: auto; }
.lf { margin-bottom: 16px; }
.lf label {
  display: block; color: #CBD5E1;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  margin-bottom: 6px;
}
.lf input {
  width: 100%; height: 48px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 0 16px;
  color: #fff; font-size: 16px;
  outline: none;
  -webkit-appearance: none;
}
.lf input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }
.lf input::placeholder { color: #64748B; }
.lbtn {
  width: 100%; height: 48px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600;
  margin-top: 8px;
  transition: background 0.15s;
}
.lbtn:active { background: var(--accent-hover); transform: scale(0.99); }
.lerr {
  min-height: 20px; margin-top: 12px;
  text-align: center;
  color: #FCA5A5; font-size: 13px;
}

/* ───── APP ───── */
#app { display: none; height: 100vh; height: 100dvh; flex-direction: column; background: var(--bg); }
#app.on { display: flex; }

/* ───── HEADER ───── */
.hdr {
  background: var(--hdr-bg);
  color: var(--hdr-text);
  padding: env(safe-area-inset-top, 0px) 16px 14px;
  flex-shrink: 0;
  z-index: 20;
}
.hdr-inner {
  padding-top: 12px;
  display: flex; align-items: center; gap: 12px; min-height: 52px;
}
.hdr-back {
  background: none; border: none; color: var(--hdr-text);
  font-size: 28px; line-height: 1; padding: 0 4px 0 0;
  display: none; font-weight: 300;
}
.hdr-back.on { display: block; }
.hdr-logo { height: 22px; width: auto; flex-shrink: 0; }
.hdr-title { flex: 1; font-size: 17px; font-weight: 600; }
.hdr-sub { font-size: 12px; color: var(--hdr-muted); margin-top: 2px; }
.hdr-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.hdr-btn {
  background: rgba(255,255,255,0.08);
  border: none; color: var(--hdr-text);
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.hdr-btn:active { background: rgba(255,255,255,0.16); }

/* ───── CONTENT ───── */
.mc {
  flex: 1; overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}

/* ───── BOTTOM NAV ───── */
.bnav {
  flex-shrink: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--nav-bg);
  border-top: 0.5px solid var(--nav-border);
  display: grid; grid-template-columns: repeat(4, 1fr);
  z-index: 10;
}
.bn {
  background: none; border: none;
  color: var(--nav-inactive);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px;
  font-size: 10px; font-weight: 500;
}
.bn .ic { font-size: 22px; line-height: 1; }
.bn.on { color: var(--nav-active); }
.bn:active { background: rgba(255,255,255,0.05); }

/* ───── HOME ───── */
.home-hello { margin: 0 0 16px; }
.home-hello .who { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
.home-hello .dt { font-size: 13px; color: var(--text-muted); margin-top: 2px; text-transform: capitalize; }
.home-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.kpi {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.kpi:active { transform: scale(0.97); }
.kpi .lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.kpi .val { font-size: 28px; font-weight: 600; margin-top: 4px; letter-spacing: -0.02em; }
.kpi.ac .lbl { color: var(--accent); }
.kpi.dg .lbl { color: var(--danger); }

.sect-title {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin: 0 4px 10px;
}

.action-big {
  background: var(--danger); color: #fff;
  border-radius: var(--radius);
  padding: 16px; border: none;
  display: flex; align-items: center; gap: 14px;
  width: 100%;
  margin-bottom: 10px;
  transition: transform 0.1s;
}
.action-big:active { transform: scale(0.98); }
.action-big .bic {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.18);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 600;
  flex-shrink: 0;
}
.action-big .btxt { text-align: left; flex: 1; }
.action-big .btxt .t1 { font-size: 15px; font-weight: 600; }
.action-big .btxt .t2 { font-size: 12px; opacity: 0.85; margin-top: 2px; }

.action-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 20px;
}
.action-sm {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 6px;
  align-items: flex-start;
  color: var(--text);
  transition: transform 0.1s;
}
.action-sm:active { transform: scale(0.97); }
.action-sm .bic {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.action-sm .t1 { font-size: 13px; font-weight: 600; }
.action-sm .t2 { font-size: 11px; color: var(--text-muted); }

/* ───── LISTS ───── */
.chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.chip {
  background: var(--surface-2); color: var(--text-muted);
  border: none; border-radius: 100px;
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  white-space: nowrap;
}
.chip.on { background: var(--navy-800); color: #fff; }
@media (prefers-color-scheme: dark) {
  .chip.on { background: var(--accent); color: #fff; }
}

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-left: 3px solid var(--text-faint);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: transform 0.1s;
}
.card:active { transform: scale(0.99); }
.card.dep { border-left-color: var(--danger); }
.card.mnt { border-left-color: var(--accent); }
.card.inc { border-left-color: var(--success); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-num { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }
.tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 6px;
  white-space: nowrap;
}
.tag.dep { background: var(--danger-light); color: var(--danger-dark); }
.tag.mnt { background: var(--accent-light); color: var(--accent-dark); }
.tag.inc { background: var(--success-light); color: var(--success-dark); }
.tag.plan { background: var(--surface-2); color: var(--text-muted); }
.tag.ann { background: var(--warning-light); color: var(--warning-dark); }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.card-foot { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.card-foot.late { color: var(--danger); font-weight: 500; }

.empty {
  text-align: center; padding: 40px 16px;
  color: var(--text-muted); font-size: 13px;
}
.empty .ic { font-size: 36px; opacity: 0.4; margin-bottom: 8px; }

/* ───── LOADER ───── */
.ld {
  padding: 40px 16px; text-align: center;
  color: var(--text-muted); font-size: 13px;
}
.spin {
  display: inline-block; width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: sp 0.8s linear infinite;
  margin-bottom: 8px;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* ───── DETAIL ───── */
.det-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.det-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.det-sub { font-size: 13px; color: var(--text-muted); }
.det-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border-light);
  font-size: 13px;
  gap: 12px;
}
.det-row:last-child { border-bottom: none; }
.det-row .lbl { color: var(--text-muted); flex-shrink: 0; }
.det-row .val { text-align: right; font-weight: 500; word-break: break-word; }

.btn-row { display: flex; gap: 8px; margin-bottom: 14px; }
.btn {
  flex: 1; height: 44px; border-radius: 10px;
  border: none; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn.primary { background: var(--accent); color: #fff; }
.btn.success { background: var(--success); color: #fff; }
.btn.danger { background: var(--danger); color: #fff; }
.btn.ghost { background: var(--surface-2); color: var(--text); }
.btn:active { transform: scale(0.98); }

/* ───── FORM (new dep) ───── */
.fg { margin-bottom: 14px; }
.fg label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.fg input, .fg select, .fg textarea {
  width: 100%; min-height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 14px;
  color: var(--text); font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}
.fg textarea { padding: 12px 14px; min-height: 100px; resize: vertical; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }

/* ───── PLANNING ───── */
.wk-days {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  margin-bottom: 16px;
}
.wk-day {
  background: var(--surface-2); border-radius: 10px;
  padding: 8px 0; text-align: center;
  border: 0.5px solid transparent;
}
.wk-day .d { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.wk-day .n { font-size: 14px; font-weight: 600; margin-top: 2px; }
.wk-day.on { background: var(--navy-800); color: #fff; }
.wk-day.on .d { color: rgba(255,255,255,0.7); }
.wk-day.on .n { color: #fff; }
.wk-day.wknd { opacity: 0.55; }
@media (prefers-color-scheme: dark) { .wk-day.on { background: var(--accent); } }

.slot { display: flex; gap: 10px; margin-bottom: 8px; }
.slot-time { width: 48px; flex-shrink: 0; text-align: right; }
.slot-time .t { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.slot-body {
  flex: 1;
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.slot-body.dep { background: var(--danger-light); border-left-color: var(--danger); }
.slot-body.dep .t1, .slot-body.dep .t2 { color: var(--danger-dark); }
.slot-body.pur { background: var(--purple-light); border-left-color: var(--purple); }
.slot-body.pur .t1, .slot-body.pur .t2 { color: var(--purple-dark); }
.slot-body .t1 { font-size: 13px; font-weight: 600; color: var(--accent-dark); line-height: 1.3; }
.slot-body .t2 { font-size: 11px; color: var(--accent-dark); opacity: 0.85; margin-top: 2px; }

.day-sep {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  margin: 16px 4px 8px; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ───── ASTREINTE ───── */
.ast-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.ast-ava {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.ast-ava.c1 { background: var(--accent-light); color: var(--accent-dark); }
.ast-ava.c2 { background: var(--purple-light); color: var(--purple-dark); }
.ast-ava.c3 { background: var(--warning-light); color: var(--warning-dark); }
.ast-ava.c4 { background: var(--success-light); color: var(--success-dark); }
.ast-ava.c5 { background: var(--danger-light); color: var(--danger-dark); }
.ast-info { flex: 1; min-width: 0; }
.ast-spec { font-size: 10px; color: var(--text-muted); letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
.ast-name { font-size: 14px; font-weight: 600; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ast-call, .ast-empty {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  text-decoration: none;
  font-size: 18px;
  border: none;
}
.ast-call { background: var(--success); color: #fff; }
.ast-call:active { background: var(--success-dark); }
.ast-empty { background: var(--surface-2); color: var(--text-faint); }

/* ───── TOAST ───── */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 16px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--navy-800); color: #fff;
  padding: 12px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  z-index: 100; opacity: 0;
  transition: transform 0.25s, opacity 0.25s;
  max-width: calc(100% - 32px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--danger); }
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="llogo">
      <img src="/icons/socom-icon-192.png" alt="SOCOM" style="width:80px;height:80px;border-radius:20px;">
    </div>
    <!-- Formulaire de connexion -->
    <div id="login-form">
      <div class="lf">
        <label>Email</label>
        <input type="email" id="li-em" autocomplete="email" placeholder="vous@socom.lu">
      </div>
      <div class="lf">
        <label>Mot de passe</label>
        <input type="password" id="li-pw" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="lbtn" id="li-btn">Se connecter</button>
      <div style="text-align:center;margin-top:14px">
        <a href="#" id="forgot-link" style="font-size:13px;color:var(--accent);text-decoration:none;font-weight:500">Mot de passe oublié ?</a>
      </div>
      <div class="lerr" id="li-err"></div>
    </div>
    <!-- Formulaire de demande de reset -->
    <div id="forgot-form" style="display:none">
      <h2 style="font-size:18px;font-weight:700;margin:0 0 6px 0">Mot de passe oublié</h2>
      <p style="font-size:13px;color:var(--text-muted);margin:0 0 16px 0">Entrez votre email, vous recevrez un lien pour réinitialiser votre mot de passe.</p>
      <div class="lf">
        <label>Email</label>
        <input type="email" id="fg-em" autocomplete="email" placeholder="vous@socom.lu">
      </div>
      <button class="lbtn" id="fg-btn">Envoyer le lien</button>
      <div style="text-align:center;margin-top:14px">
        <a href="#" id="back-to-login" style="font-size:13px;color:var(--accent);text-decoration:none;font-weight:500">‹ Retour à la connexion</a>
      </div>
      <div class="lerr" id="fg-err"></div>
    </div>
    <!-- Formulaire de définition du nouveau mot de passe (après clic sur lien email) -->
    <div id="reset-form" style="display:none">
      <h2 style="font-size:18px;font-weight:700;margin:0 0 6px 0">Nouveau mot de passe</h2>
      <p style="font-size:13px;color:var(--text-muted);margin:0 0 16px 0">Choisissez votre nouveau mot de passe (8 caractères minimum).</p>
      <div class="lf">
        <label>Nouveau mot de passe</label>
        <input type="password" id="rs-pw1" autocomplete="new-password" placeholder="••••••••">
      </div>
      <div class="lf">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="rs-pw2" autocomplete="new-password" placeholder="••••••••">
      </div>
      <button class="lbtn" id="rs-btn">Définir le mot de passe</button>
      <div class="lerr" id="rs-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <header class="hdr">

function showSafetyBriefing(onConfirm){
  // Évite double ouverture
  if(document.getElementById('safety-briefing-overlay')) return;
  var ov = document.createElement('div');
  ov.id = 'safety-briefing-overlay';
  ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML = (
    '<div style="background:#fff;border-radius:14px;max-width:560px;width:100%;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,0.3);text-align:center">'
      +'<div style="font-size:17px;font-weight:700;color:#1E3A8A;margin-bottom:14px">⚠ Briefing sécurité</div>'
      +'<p style="color:#475569;font-size:13px;margin:0 0 16px">Avant de renseigner le compte-rendu, merci de prendre connaissance des risques et EPI spécifiques.</p>'
      +'<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:14px;margin-bottom:18px">'
        +'<img src="'+window.SAFETY_LOGO_SRC+'" alt="PPSS et EPI spécifiques" style="max-width:100%;height:auto;display:block;margin:0 auto">'
      +'</div>'
      +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:18px;user-select:none;text-align:left">'
        +'<input type="checkbox" id="safety-ck" style="width:18px;height:18px;cursor:pointer;flex-shrink:0">'
        +'<span style="font-size:14px;color:#0F172A;font-weight:600">J\'ai pris connaissance des risques</span>'
      +'</label>'
      +'<div style="display:flex;gap:10px;justify-content:flex-end">'
        +'<button type="button" id="safety-cancel" style="padding:10px 18px;border-radius:8px;border:1px solid #CBD5E1;background:#fff;color:#475569;font-weight:600;cursor:pointer">Annuler</button>'
        +'<button type="button" id="safety-ok" disabled style="padding:10px 18px;border-radius:8px;border:0;background:#CBD5E1;color:#fff;font-weight:700;cursor:not-allowed">Je valide</button>'
      +'</div>'
    +'</div>'
  );
  document.body.appendChild(ov);
  var ck = document.getElementById('safety-ck');
  var btnOk = document.getElementById('safety-ok');
  var btnCancel = document.getElementById('safety-cancel');
  ck.addEventListener('change', function(){
    if(ck.checked){
      btnOk.disabled = false;
      btnOk.style.background = '#1E3A8A';
      btnOk.style.cursor = 'pointer';
    } else {
      btnOk.disabled = true;
      btnOk.style.background = '#CBD5E1';
      btnOk.style.cursor = 'not-allowed';
    }
  });
  btnCancel.onclick = function(){ document.body.removeChild(ov); };
  btnOk.onclick = function(){
    if(!ck.checked) return;
    document.body.removeChild(ov);
    if(typeof onConfirm==='function') onConfirm();
  };
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast on' + (err ? ' err' : '');
  clearTimeout(t._to);
  t._to = setTimeout(function(){ t.className = 'toast' + (err ? ' err' : ''); }, 2400);
}
function fmtDate(s) {
  if (!s) return '—';
  var d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}
function fmtDateLong(s) {
  if (!s) return '—';
  var d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function isLate(dp, statut) {
  if (!dp || statut === 'TERMINEE' || statut === 'ANNULEE') return false;
  return dp < todayISO();
}

function api(path, opts, cb) {
  opts = opts || {};
  var init = { method: opts.method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) init.headers.Authorization = 'Bearer ' + TOKEN;
  if (opts.body) init.body = JSON.stringify(opts.body);
  fetch(API + path, init)
    .then(function(r){
      if (r.status === 401) { logout(); return null; }
      return r.json().then(function(j){ return { ok: r.ok, data: j }; });
    })
    .then(function(res){
      if (!res) return;
      if (!res.ok) { cb(res.data && res.data.error || 'Erreur', null); return; }
      cb(null, res.data);
    })
    .catch(function(e){ cb(e.message || 'Erreur réseau', null); });
}

function login() {
  var em = document.getElementById('li-em').value.trim();
  var pw = document.getElementById('li-pw').value;
  var err = document.getElementById('li-err');
  var btn = document.getElementById('li-btn');
  err.textContent = '';
  if (!em || !pw) { err.textContent = 'Email et mot de passe requis'; return; }
  btn.disabled = true; btn.textContent = 'Connexion...';
  api('/api/login', { method: 'POST', body: { email: em, password: pw } }, function(e, d) {
    btn.disabled = false; btn.textContent = 'Se connecter';
    if (e) { err.textContent = e; return; }
    TOKEN = d.token; USER = d.user;
    localStorage.setItem('gmao_tok', TOKEN);
    localStorage.setItem('gmao_user', JSON.stringify(USER));
    showApp();
  });
}
function logout() {
  TOKEN = ''; USER = null;
  PLAN_TECH_ID = null;
  PLAN_TECHS_CACHE = null;
  localStorage.removeItem('gmao_tok');
  localStorage.removeItem('gmao_user');
  document.getElementById('app').classList.remove('on');

function ivTypeInfo(iv) {
  var type = (iv.type || '').toUpperCase();
  if (type === 'DEPANNAGE') return { cls: 'dep', tag: 'Dépannage', tagCls: 'dep' };
  return { cls: 'mnt', tag: 'Maintenance', tagCls: 'mnt' };
}

function cardIv(iv) {
  var info = ivTypeInfo(iv);
  var cls = info.cls;
  var tag = info.tag;
  var tagCls = info.tagCls;
  if (iv.statut === 'EN_COURS') { cls = 'inc'; tag = 'En cours'; tagCls = 'inc'; }
  else if (iv.statut === 'TERMINEE') { tag = 'Terminé'; tagCls = 'inc'; }
  else if (iv.statut === 'ANNULEE') { tag = 'Annulé'; tagCls = 'ann'; }
  var foot = '';
  if (isLate(iv.date_prevue, iv.statut)) {
    var days = Math.floor((new Date(todayISO()) - new Date(iv.date_prevue)) / 86400000);
    foot = '<div class="card-foot late">En retard · ' + days + 'j</div>';
  } else if (iv.date_prevue) {
    foot = '<div class="card-foot">' + esc(fmtDate(iv.date_prevue)) + (iv.heure_prevue ? ' · ' + esc(iv.heure_prevue) : '') + '</div>';
  }
  return '<div class="card ' + cls + '" data-iv="' + iv.id + '">' +
    '<div class="card-top"><div class="card-num">' + esc(iv.numero || ('#' + iv.id)) + '</div>' +
    '<div class="tag ' + tagCls + '">' + tag + '</div></div>' +
    '<div class="card-title">' + esc(iv.equip_nom || iv.designation || '—') + '</div>' +
    '<div class="card-sub">' + esc(iv.projet_nom || '') + (iv.type_technique ? ' · ' + esc(iv.type_technique) : '') + '</div>' +
    foot + '</div>';
}

var BONS_FILTER = 'all';
function renderBons() {
  var mc = document.getElementById('mc');
  api('/api/interventions', {}, function(e, d) {
    if (e) { mc.innerHTML = '<div class="empty"><div class="ic">⚠</div>' + esc(e) + '</div>'; return; }
    var all = (d || []).filter(function(iv){ return isMine(iv) && iv.statut !== 'TERMINEE' && iv.statut !== 'ANNULEE'; });
    var tDo = all.filter(function(iv){ return iv.statut === 'PLANIFIEE'; });
    var inC = all.filter(function(iv){ return iv.statut === 'EN_COURS'; });
    var todoAll = all.filter(function(iv){ return iv.statut === 'PLANIFIEE' || iv.statut === 'EN_COURS'; });
    var late = all.filter(function(iv){ return isLate(iv.date_prevue, iv.statut); });
    var list;
    if (BONS_FILTER === 'todo') list = tDo;
    else if (BONS_FILTER === 'inc') list = inC;
    else if (BONS_FILTER === 'todo_all') list = todoAll;
    else if (BONS_FILTER === 'late') list = late;
    else list = all;
    var h = '<div class="chips">' +
      chip('all', 'Tous', all.length) +
      chip('todo_all', 'À réaliser', todoAll.length) +
      chip('todo', 'À faire', tDo.length) +
      chip('inc', 'En cours', inC.length) +
      chip('late', 'En retard', late.length) +
      '</div>';
    if (!list.length) {
      h += '<div class="empty"><div class="ic">✓</div>Aucun bon dans cette vue</div>';
    } else {
      list.sort(function(a,b){ return (a.date_prevue || '9999') > (b.date_prevue || '9999') ? 1 : -1; });
      list.forEach(function(iv){ h += cardIv(iv); });
    }
    mc.innerHTML = h;
    mc.querySelectorAll('.chip').forEach(function(c){
      c.onclick = function(){ BONS_FILTER = c.dataset.f; renderBons(); };
    });
    mc.querySelectorAll('.card[data-iv]').forEach(function(c){
      c.onclick = function(){ goSub('iv', parseInt(c.dataset.iv)); };
    });
  });
}
function chip(f, label, n) {
  return '<button class="chip ' + (BONS_FILTER === f ? 'on' : '') + '" data-f="' + f + '">' + esc(label) + ' · ' + n + '</button>';
}

    var e2 = document.getElementById('btn-end');
    if (e2) e2.onclick = function(){
      if (confirm('Marquer cette intervention comme terminée ?')) endIv(iv.id);

  });

function calcHeures(hd, hf) {
  if (!hd || !hf) return 0;
  var p1 = hd.split(':'), p2 = hf.split(':');
  if (p1.length < 2 || p2.length < 2) return 0;
  var m1 = parseInt(p1[0]) * 60 + parseInt(p1[1]);
  var m2 = parseInt(p2[0]) * 60 + parseInt(p2[1]);
  var diff = (m2 - m1) / 60;
  return Math.max(0, Math.round(diff * 100) / 100);
}

function saveCR(iid) {
  var date = document.getElementById('cr-date').value;
  var obs = document.getElementById('cr-obs').value.trim();
  if (!obs) { toast('Observations requises', true); return; }

  // Ne garder que les intervenants avec un utilisateur sélectionné, et calculer heures
  var ivs = CR_IVS.filter(function(iv){ return iv.utilisateur_id; }).map(function(iv){
    return {
      utilisateur_id: parseInt(iv.utilisateur_id),
      nom: iv.nom,
      date: iv.date,
      heure_debut: iv.heure_debut,
      heure_fin: iv.heure_fin,
      total_heures: calcHeures(iv.heure_debut, iv.heure_fin)
    };
  });

  var btn = document.getElementById('cr-save');
  btn.disabled = true; btn.textContent = 'Enregistrement...';
  var body = {
    date_intervention: date,
    observations: obs,
    intervenants: ivs,
    total_heures: ivs.reduce(function(s, iv){ return s + (iv.total_heures || 0); }, 0)
  };
  api('/api/comptes_rendus/' + iid, { method: 'POST', body: body }, function(e) {
    btn.disabled = false; btn.textContent = 'Enregistrer le compte rendu';
    if (e) { toast(e, true); return; }
    toast('Compte rendu enregistré ✓', false);
    STATE.subpage = 'iv'; STATE.ctx = iid;
    render();
  });
}

      var pid = selProj.value;
      if (!pid) {
        selEq.innerHTML = '<option value="">— Choisir d\'abord un projet —</option>';
        selEq.disabled = true;
        return;
      }
      selEq.innerHTML = '<option value="">Chargement...</option>';

        if (er) { selEq.innerHTML = '<option value="">Erreur</option>'; return; }

/* ───── PLANNING ───── */
var PLAN_OFFSET = 0;
var PLAN_TECH_ID = null;      // id du tech dont on affiche le planning (null = moi)
var PLAN_TECHS_CACHE = null;  // liste des techs visibles pour admin/manager (chargée 1x)
function renderPlanning() {
  var mc = document.getElementById('mc');
  var isAdminOrManager = USER && (USER.role === 'admin' || USER.role === 'manager');
  // Charger la liste des techs visibles (une seule fois) pour admin/manager
  function ensureTechs(cb) {
    if (!isAdminOrManager) { cb([]); return; }
    if (PLAN_TECHS_CACHE) { cb(PLAN_TECHS_CACHE); return; }
    api('/api/utilisateurs', {}, function(e, users) {
      if (e) { PLAN_TECHS_CACHE = []; cb([]); return; }
      var all = (users || []).filter(function(u){ return u.role === 'technicien' || u.role === 'manager'; });
      if (USER.role === 'manager') {
        // Manager : seulement son équipe + lui-même
        all = all.filter(function(u){ return u.id == USER.id || u.manager_id == USER.id; });
      }
      PLAN_TECHS_CACHE = all;
      cb(all);
    });
  }
  ensureTechs(function(techs){
    var base = new Date();
    base.setDate(base.getDate() + PLAN_OFFSET * 7);
    var dow = base.getDay() || 7;
    var mon = new Date(base); mon.setDate(base.getDate() - (dow - 1));
    var days = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(mon); d.setDate(mon.getDate() + i);
      days.push({
        iso: d.toISOString().slice(0,10),
        lbl: d.toLocaleDateString('fr-FR', { weekday: 'short' }).slice(0,3),
        num: d.getDate(),
        isToday: d.toISOString().slice(0,10) === todayISO(),
        isWknd: i >= 5
      });
    }
    var debut = days[0].iso, fin = days[6].iso;
    // Construire l'URL avec optionnellement ?technicien_id=X
    var url = '/api/planning/me?debut=' + debut + '&fin=' + fin;
    if (isAdminOrManager && PLAN_TECH_ID && PLAN_TECH_ID != USER.id) {
      url += '&technicien_id=' + PLAN_TECH_ID;
    }
    api(url, {}, function(e, items) {
    if (e) { mc.innerHTML = '<div class="empty">' + esc(e) + '</div>'; return; }
    var list = items || [];
    list.sort(function(a,b){
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return (a.heure_debut || '') < (b.heure_debut || '') ? -1 : 1;
    });
    var h = '';
    // Sélecteur de technicien (admin/manager seulement)
    if (isAdminOrManager && techs.length > 0) {
      var currentTid = PLAN_TECH_ID || USER.id;
      h += '<div style="margin-bottom:10px">';
      h += '<label style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px">Planning de</label>';
      h += '<select id="pl-tech-sel" style="width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:14px;font-weight:600">';
      // Option "Moi"
      h += '<option value="">👤 Moi (' + esc(USER.nom || '') + ')</option>';
      techs.forEach(function(t){
        if (t.id == USER.id) return; // déjà dans "Moi"
        h += '<option value="' + t.id + '"' + (currentTid == t.id ? ' selected' : '') + '>' + esc(t.nom) + '</option>';
      });
      h += '</select></div>';
    }
    h += '<div class="wk-days">';
    days.forEach(function(d){
      h += '<div class="wk-day ' + (d.isToday ? 'on' : '') + ' ' + (d.isWknd ? 'wknd' : '') + '">';
      h += '<div class="d">' + esc(d.lbl) + '</div><div class="n">' + d.num + '</div></div>';
    });
    h += '</div>';
    h += '<div style="display:flex;gap:6px;margin-bottom:10px">';
    h += '<button class="btn ghost" id="pl-prev" style="flex:1;height:36px;flex-shrink:0">‹ Précédent</button>';
    h += '<button class="btn ghost" id="pl-tod" style="flex:1;height:36px;flex-shrink:0">Cette semaine</button>';
    h += '<button class="btn ghost" id="pl-next" style="flex:1;height:36px;flex-shrink:0">Suivant ›</button>';
    h += '</div>';
    h += '<button class="btn primary" id="pl-add-occ" style="width:100%;height:40px;margin-bottom:16px">+ Nouvelle occupation (congés, formation...)</button>';
    if (!list.length) {
      h += '<div class="empty"><div class="ic">◎</div>Aucune intervention prévue cette semaine</div>';
    } else {
      var byDay = {};
      list.forEach(function(it){ (byDay[it.date] = byDay[it.date] || []).push(it); });
      days.forEach(function(d){
        var dayItems = byDay[d.iso];
        if (!dayItems) return;
        h += '<div class="day-sep">' + esc(d.lbl) + ' ' + d.num + (d.isToday ? ' · Aujourd\'hui' : '') + '</div>';
        dayItems.forEach(function(it){
          var horaire = it.heure_debut || '—';
          if (it.heure_fin) horaire += ' → ' + it.heure_fin;
          if (it.source === 'occupation') {
            // Occupation : affichage avec couleur du type
            var color = it.type_couleur || '#64748b';
            h += '<div class="slot">';
            h += '<div class="slot-time"><div class="t">' + esc(horaire) + '</div></div>';
            h += '<div class="slot-body" data-occ="' + it.occupation_id + '" style="cursor:pointer;border-left:3px solid ' + color + ';background:' + color + '15">';
            h += '<div class="t1" style="color:' + color + '">' + esc(it.type_occupation || 'Occupation') + '</div>';
            h += '<div class="t2">';
            h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:' + color + '"></span>Occupation</span>';
            if (it.total_heures) h += ' · ' + it.total_heures + ' h';
            h += '</div>';
            if (it.numero_projet) h += '<div class="t2" style="margin-top:2px;font-weight:600;color:' + color + '"><code>' + esc(it.numero_projet) + '</code></div>';
            if (it.nom_chantier) h += '<div class="t2" style="margin-top:2px;font-weight:600">' + esc(it.nom_chantier) + '</div>';
            if (it.notes) h += '<div class="t2" style="margin-top:4px;font-style:italic">' + esc(it.notes) + '</div>';
            if (it.accompagnants_noms && it.accompagnants_noms.length) {
              h += '<div class="t2" style="margin-top:4px;color:' + color + ';font-weight:500">👥 ' + esc(it.accompagnants_noms.join(', ')) + '</div>';
            }
            h += '</div></div>';
          } else if (it.source === 'cr') {
            // Compte-rendu (MAINTENANCE ou DEPANNAGE) : affiche à la place du bon
            console.log('[planning mobile CR]', it.cr_numero, 'parent=', it.numero, 'date=', it.date);
            var isDep = (it.type === 'DEPANNAGE');
            var crColor = isDep ? '#EA580C' : '#059669';    // orange pour dep, vert pour maintenance
            var crBg = isDep ? '#FFEDD5' : '#D1FAE5';
            var crIcon = isDep ? '🛠' : '✅';
            var crLabel = isDep ? 'Dépannage' : 'Maintenance';
            var crNum = it.cr_numero || '';
            h += '<div class="slot">';
            h += '<div class="slot-time"><div class="t">' + esc(horaire) + '</div></div>';
            h += '<div class="slot-body" data-iv="' + it.intervention_id + '" style="cursor:pointer;border-left:3px solid ' + crColor + ';background:' + crBg + '">';
            h += '<div class="t1" style="color:' + crColor + ';font-weight:700">' + crIcon + ' ' + esc(crNum || 'CR') + '</div>';
            h += '<div class="t2">' + esc(it.equip_nom || '—') + (it.projet_nom ? ' · ' + esc(it.projet_nom) : '') + '</div>';
            // Ligne descriptif : libellé + numéro bon parent + numéro CR
            var descLigne = crLabel;
            if (it.numero) descLigne += ' ' + it.numero;
            if (crNum) descLigne += ' · ' + crNum;
            h += '<div class="t2" style="margin-top:2px">' + esc(descLigne) + '</div>';
            h += '</div></div>';
          } else {
            // Intervention
            var info = ivTypeInfo({type: it.type});
            h += '<div class="slot">';
            h += '<div class="slot-time"><div class="t">' + esc(horaire) + '</div></div>';
            h += '<div class="slot-body ' + info.cls + '" data-iv="' + it.intervention_id + '" style="cursor:pointer">';
            h += '<div class="t1">' + esc(it.equip_nom || '—') + '</div>';
            h += '<div class="t2">' + esc(it.projet_nom || '') + ' · ' + esc(info.tag);
            if (it.numero) h += ' · ' + esc(it.numero);
            h += '</div>';
            if (it.notes) h += '<div class="t2" style="margin-top:4px;font-style:italic">' + esc(it.notes) + '</div>';
            h += '</div></div>';
          }
        });
      });
    }
    h += '<div style="height:40px"></div>';
    mc.innerHTML = h;
    // Handler select technicien
    var techSel = document.getElementById('pl-tech-sel');
    if (techSel) {
      techSel.onchange = function(){
        PLAN_TECH_ID = this.value ? parseInt(this.value) : null;
        renderPlanning();
      };
    }
    document.getElementById('pl-prev').onclick = function(){ PLAN_OFFSET--; renderPlanning(); };
    document.getElementById('pl-next').onclick = function(){ PLAN_OFFSET++; renderPlanning(); };
    document.getElementById('pl-tod').onclick = function(){ PLAN_OFFSET = 0; renderPlanning(); };
    document.getElementById('pl-add-occ').onclick = function(){ openOccupationForm(); };
    document.querySelectorAll('.slot-body[data-iv]').forEach(function(el){
      el.onclick = function(){ goSub('iv', parseInt(el.dataset.iv)); };
    });
    document.querySelectorAll('.slot-body[data-occ]').forEach(function(el){
      el.onclick = function(){ openOccupationForm(parseInt(el.dataset.occ)); };
    });
    }); // end api callback
  }); // end ensureTechs
}

            var ids = occTechList.filter(function(t){ return t; });
            // Dédoublonner
            var seen = {}; ids = ids.filter(function(t){ if (seen[t]) return false; seen[t]=1; return true; });
            if (!ids.length) { toast('Au moins un technicien requis', 'err'); return; }
            body.technicien_ids = ids;
          }
        }
        // Si type=Offre, valider et joindre N° projet + nom chantier
        if (isOffreType(type_id)) {
          var np = (document.getElementById('occ-proj').value || '').trim().toUpperCase();
          if (!np) { toast('N° de projet requis pour Offre', 'err'); return; }
          if (!/^P\d{5}$/.test(np)) { toast('Format : P + 5 chiffres (ex: P00042)', 'err'); return; }
          body.numero_projet = np;
          var nc = (document.getElementById('occ-chantier').value || '').trim();
          if (!nc) { toast('Nom du chantier requis pour Offre', 'err'); return; }
          body.nom_chantier = nc;
        } else {
          body.numero_projet = '';
          body.nom_chantier = '';
        }
        // Accompagnants (optionnel, informatif)
        var accIds = (occAccList || []).filter(function(x){return x;}).map(function(x){return parseInt(x);});
        // Dédoublonner
        var seenA = {}; accIds = accIds.filter(function(x){if(seenA[x])return false;seenA[x]=1;return true;});
        body.accompagnants_ids = accIds;
        if (occId) {
          api('/api/occupations/' + occId, { method: 'PATCH', body: body }, function(err){
            if (err) { toast('Erreur : ' + err, 'err'); return; }
            toast('Occupation mise à jour ✓', 'ok');
            STATE.subpage = null; STATE.ctx = null; document.getElementById('h-back').classList.remove('on'); render();
          });
        } else {
          api('/api/occupations', { method: 'POST', body: body }, function(err, resp){
            if (err) { toast('Erreur : ' + err, 'err'); return; }
            var nb = (resp && resp.count) || (body.technicien_ids ? body.technicien_ids.length : 1);
            toast(nb > 1 ? nb + ' occupations créées ✓' : 'Occupation créée ✓', 'ok');
            STATE.subpage = null; STATE.ctx = null; document.getElementById('h-back').classList.remove('on'); render();
          });
        }
      };
      if (occId) {
        document.getElementById('occ-del').onclick = function(){
          if (!confirm('Supprimer cette occupation ?')) return;
          api('/api/occupations/' + occId, { method: 'DELETE' }, function(err){
            if (err) { toast('Erreur : ' + err, 'err'); return; }
            toast('Supprimée ✓', 'ok');
            STATE.subpage = null; STATE.ctx = null; document.getElementById('h-back').classList.remove('on'); render();
          });
        };
      }
    }
    if (occId) {
      api('/api/occupations?debut=2000-01-01&fin=2100-12-31', {}, function(err, list){
        var occ = (list || []).find(function(o){ return o.id == occId; });
        buildForm(occ || {});
      });
    } else {
      buildForm({});
    }
    }); // end loadTechsIfNeeded
  });
}

/* ───── ASTREINTE ───── */
function renderAstreinte() {
  var mc = document.getElementById('mc');
  api('/api/astreinte/planning/today', {}, function(e, d) {
    if (e) { mc.innerHTML = '<div class="empty">' + esc(e) + '</div>'; return; }
    api('/api/astreinte/techniciens', {}, function(e2, techs) {
      var gsmMap = {};
      (techs || []).forEach(function(t){ gsmMap[t.nom.trim()] = t.gsm || ''; });
      var dateStr = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      var h = '<div style="font-size:13px;color:var(--text-muted);margin:0 4px 14px;text-transform:capitalize">' + esc(dateStr) + '</div>';
      var rows = (d || []).filter(function(r){ return r.technicien && r.technicien !== '/'; });
      if (!rows.length) {
        h += '<div class="empty"><div class="ic">◎</div>Aucune astreinte pour aujourd\'hui</div>';
      } else {
        rows.forEach(function(r, i){
          var name = (r.technicien || '').trim();
          var parts = name.split(/\s+/);
          var ini = ((parts[0] || '')[0] || '') + ((parts[1] || '')[0] || '');
          ini = ini.toUpperCase() || '?';
          var gsm = gsmMap[name] || '';
          var gsmT = gsm.replace(/\s/g, '');
          if (gsmT && gsmT[0] !== '+') gsmT = '+352' + gsmT;
          var colorIdx = (i % 5) + 1;
          h += '<div class="ast-card">';
          h += '<div class="ast-ava c' + colorIdx + '">' + esc(ini) + '</div>';
          h += '<div class="ast-info">';
          h += '<div class="ast-spec">' + esc(r.specialite_nom || '') + '</div>';
          h += '<div class="ast-name">' + esc(name) + '</div>';
          h += '</div>';
          if (gsmT) {
            h += '<a class="ast-call" href="tel:' + esc(gsmT) + '" title="Appeler">☏</a>';
          } else {
            h += '<div class="ast-empty">—</div>';
          }
          h += '</div>';
        });
      }
      mc.innerHTML = h;
    });
  });
}

/* ───── INIT ───── */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('li-btn').onclick = login;
  document.getElementById('li-pw').addEventListener('keydown', function(e){ if (e.key === 'Enter') login(); });
  document.getElementById('li-em').addEventListener('keydown', function(e){ if (e.key === 'Enter') document.getElementById('li-pw').focus(); });
  // Mot de passe oublié : bascule vers le formulaire de reset
  document.getElementById('forgot-link').onclick = function(e){
    e.preventDefault();
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('forgot-form').style.display = '';
    document.getElementById('li-err').textContent = '';
    document.getElementById('fg-err').textContent = '';
    // Pré-remplir avec l'email saisi s'il existe
    var em = document.getElementById('li-em').value.trim();
    if (em) document.getElementById('fg-em').value = em;
    setTimeout(function(){ document.getElementById('fg-em').focus(); }, 50);
  };
  // Retour au login
  document.getElementById('back-to-login').onclick = function(e){
    e.preventDefault();
    document.getElementById('forgot-form').style.display = 'none';
    document.getElementById('login-form').style.display = '';
    document.getElementById('fg-err').textContent = '';
  };
  // Envoi demande de reset
  var fgBtn = document.getElementById('fg-btn');
  fgBtn.onclick = function(){
    var em = document.getElementById('fg-em').value.trim();
    var err = document.getElementById('fg-err');
    err.textContent = '';
    if (!em) { err.textContent = 'Email requis'; return; }
    fgBtn.disabled = true; fgBtn.textContent = 'Envoi...';
    api('/api/reset-password', { method: 'POST', body: { email: em } }, function(e){
      fgBtn.disabled = false; fgBtn.textContent = 'Envoyer le lien';
      if (e) { err.textContent = typeof e === 'string' ? e : (e.message || 'Erreur'); return; }
      err.style.color = '#22c55e';
      err.textContent = '✓ Si cet email existe, un lien de réinitialisation a été envoyé.';
    });
  };
  document.getElementById('fg-em').addEventListener('keydown', function(e){ if (e.key === 'Enter') fgBtn.click(); });

  // ── RESET PASSWORD : si URL contient ?reset_token=... afficher le form reset ──
  var urlParams = new URLSearchParams(window.location.search);
  var resetTok = urlParams.get('reset_token');
  if (resetTok) {
    // Afficher directement le formulaire de nouveau mot de passe
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('forgot-form').style.display = 'none';
    document.getElementById('reset-form').style.display = '';
    // Forcer l'affichage de la zone de login (si l'app était ouverte avec un token expiré)
    document.getElementById('app').classList.remove('on');
    document.getElementById('login').style.display = 'flex';
    setTimeout(function(){ document.getElementById('rs-pw1').focus(); }, 100);
  }
  var rsBtn = document.getElementById('rs-btn');
  rsBtn.onclick = function(){
    // Re-lire le token depuis l'URL à chaque clic (pas capturé dans closure)
    var params = new URLSearchParams(window.location.search);
    var tok = params.get('reset_token') || resetTok;
    console.log('[RESET] token URL:', tok ? tok.substring(0,12)+'…' : '(vide)', 'len:', tok ? tok.length : 0);
    var pw1 = document.getElementById('rs-pw1').value;
    var pw2 = document.getElementById('rs-pw2').value;
    var err = document.getElementById('rs-err');
    err.style.color = '';
    err.textContent = '';
    if (!tok) { err.textContent = 'Lien de réinitialisation invalide ou expiré. Demandez un nouveau lien.'; return; }
    if (!pw1 || !pw2) { err.textContent = 'Les deux champs sont requis'; return; }
    if (pw1.length < 8) { err.textContent = 'Mot de passe trop court (8 caractères minimum)'; return; }
    if (pw1 !== pw2) { err.textContent = 'Les mots de passe ne correspondent pas'; return; }
    rsBtn.disabled = true; rsBtn.textContent = 'Enregistrement...';
    api('/api/reset-password/confirm', { method: 'POST', body: { token: tok, password: pw1 } }, function(e){
      rsBtn.disabled = false; rsBtn.textContent = 'Définir le mot de passe';
      if (e) { err.textContent = typeof e === 'string' ? e : (e.message || 'Erreur'); return; }
      err.style.color = '#22c55e';
      err.textContent = '✓ Mot de passe mis à jour. Redirection...';
      // Nettoyer l'URL et basculer sur le login
      setTimeout(function(){
        window.history.replaceState({}, document.title, '/mobile');
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('login-form').style.display = '';
        document.getElementById('rs-pw1').value = '';
        document.getElementById('rs-pw2').value = '';
      }, 1500);
    });
  };
  document.getElementById('rs-pw1').addEventListener('keydown', function(e){ if (e.key === 'Enter') document.getElementById('rs-pw2').focus(); });
  document.getElementById('rs-pw2').addEventListener('keydown', function(e){ if (e.key === 'Enter') rsBtn.click(); });

  document.getElementById('h-back').onclick = goBack;
  document.getElementById('h-refresh').onclick = function(){ render(); toast('Actualisé', false); };
  document.getElementById('h-logout').onclick = function(){
    if (confirm('Se déconnecter ?')) logout();
  };
  document.querySelectorAll('.bn').forEach(function(b){ b.onclick = function(){ nav(b.dataset.p); }; });
  if (TOKEN && USER) showApp();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      // Vérifier les mises à jour à chaque ouverture
      reg.update();
      // Détecter qu'un nouveau SW est installé et attend
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Une nouvelle version est prête — on recharge la page pour l'appliquer
            toast('Nouvelle version — mise à jour...', false);
            setTimeout(function() { window.location.reload(); }, 800);
          }
        });
      });
      // Si le SW actif change (nouveau SW prend le contrôle), reload aussi
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }).catch(function(){});
    // Vérifier les MàJ toutes les 5 minutes tant que l'app est ouverte
    setInterval(function() {
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg) reg.update();
      });
    }, 5 * 60 * 1000);
  }
});
</script>

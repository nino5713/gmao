<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1e293b">
<title>GMAO Terrain</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{
  --acc:#3b82f6; --acc2:#2563eb; --acc-l:#dbeafe;
  --bg:#f1f5f9; --white:#fff; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --red:#ef4444; --red-l:#fee2e2;
  --orange:#f59e0b; --orange-l:#fef3c7;
  --green:#22c55e; --green-l:#dcfce7;
  --purple:#8b5cf6; --purple-l:#ede9fe;
  --teal:#14b8a6; --teal-l:#ccfbf1;
  --hh:60px; --bh:65px; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

/* ─── LOGIN ─────────────────────────────── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#1e293b,#1e3a5f);padding:24px;position:fixed;inset:0;z-index:999}
.lbox{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.lhead{text-align:center;margin-bottom:28px}
.lico{width:60px;height:60px;background:var(--acc);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;box-shadow:0 8px 20px rgba(59,130,246,.4)}
.lhead h1{font-size:20px;font-weight:800}
.lhead p{font-size:12px;color:var(--muted);margin-top:3px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.lf input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;outline:none;font-size:16px;transition:.2s}
.lf input:focus{border-color:var(--acc)}
.lbtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}

/* ─── APP ───────────────────────────────── */
#app{display:none;flex:1;flex-direction:column;overflow:hidden}
#app.on{display:flex}

/* ─── HEADER ────────────────────────────── */
.hdr{height:var(--hh);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:20}
.hdr-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px 8px 4px 0;display:none}
.hdr-back.on{display:block}
.hdr-title{font-size:17px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-btn{background:var(--acc-l);color:var(--acc2);border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.sync-btn.syncing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.offline-badge{background:var(--orange);color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:800;display:none}
.offline-badge.on{display:block}
.pending-badge{background:var(--red);color:#fff;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:800}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;transition:.15s;flex-shrink:0}
.menu-btn:active{background:var(--bg)}

/* ─── DRAWER MENU ────────────────────────── */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:15;display:none;opacity:0;transition:opacity .25s}
.drawer-ov.on{display:block;opacity:1}
.drawer{position:fixed;top:var(--hh);left:0;right:0;background:#fff;z-index:16;transform:translateY(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);border-bottom:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.12);max-height:calc(100vh - var(--hh));overflow-y:auto}
.drawer.on{transform:translateY(0)}
.drawer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.dni{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 8px;background:#fff;cursor:pointer;transition:.15s;border:none;font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);text-align:center}
.dni:active{background:var(--bg)}.dni.on{background:var(--acc-l);color:var(--acc2)}
.dni .dic{font-size:26px}
.drawer-sync{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;background:#fff}
.drawer-sync-lbl{flex:1;font-size:13px;font-weight:600;color:var(--muted)}

/* ─── MAIN CONTENT ──────────────────────── */
.mc{flex:1;overflow-y:auto;padding:16px;padding-bottom:20px;width:100%;max-width:100vw}

/* ─── BOTTOM NAV (masqué - remplacé par drawer) ── */
.bnav{display:none}
.bni{display:none}

/* ─── CARDS ─────────────────────────────── */
.card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);cursor:pointer;transition:.15s;-webkit-user-select:none;user-select:none}
.card:active{transform:scale(.98);background:#f8fafc}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.card-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-ico.maintenance{background:var(--teal-l)}
.card-ico.depannage{background:var(--purple-l)}
.card-main{flex:1;min-width:0}
.card-num{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.card-title{font-size:15px;font-weight:700;line-height:1.3}
.card-sub{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.card-date{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.card-pending{font-size:10px;color:var(--orange);font-weight:700;background:var(--orange-l);padding:2px 8px;border-radius:8px}

/* ─── BADGES ─────────────────────────────── */
.bx{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap}
.bx-ok{background:var(--green-l);color:#166534}
.bx-warn{background:var(--orange-l);color:#92400e}
.bx-danger{background:var(--red-l);color:#991b1b}
.bx-info{background:var(--acc-l);color:#1e40af}
.bx-neutral{background:var(--border);color:var(--muted)}
.bx-purple{background:var(--purple-l);color:#5b21b6}
.bx-teal{background:var(--teal-l);color:#0f766e}

/* ─── DETAIL VIEW ───────────────────────── */
.detail-card{background:#fff;border-radius:var(--r);padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.detail-title{font-size:13px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f1f5f9}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0;min-width:110px}
.detail-value{font-size:13px;font-weight:600;text-align:right;word-break:break-word}

/* ─── STATUS BUTTONS ────────────────────── */
.status-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.status-bar::-webkit-scrollbar{display:none}
.sbtn{flex-shrink:0;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:.15s}
.sbtn:active{transform:scale(.97)}
.sbtn-start{background:var(--orange);color:#fff}
.sbtn-done{background:var(--green);color:#fff}
.sbtn-cancel{background:var(--red);color:#fff}
.sbtn-cr{background:var(--acc);color:#fff}
.sbtn-outline{background:transparent;color:var(--acc);border:2px solid var(--acc)}

/* ─── FORMS ─────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;outline:none;font-size:15px;font-family:inherit;transition:.2s;background:#fff;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{min-height:100px;resize:none}
.btn-full{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:.15s;margin-top:6px}
.btn-full:active{transform:scale(.98)}
.btn-primary{background:var(--acc);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}

/* ─── PHOTOS ─────────────────────────────── */
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:2px solid var(--border)}
.photo-add{aspect-ratio:1;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;background:var(--bg);transition:.15s}
.photo-add:active{background:var(--border)}
.photo-del{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-wrap{position:relative}

/* ─── INTERVENANTS ───────────────────────── */
.iv-row{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.iv-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.iv-del{background:var(--red-l);color:var(--red);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}

/* ─── MODAL ─────────────────────────────── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.mov.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}

/* ─── PHOTO VIEWER ───────────────────────── */
.photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
.photo-viewer.on{display:flex}
.photo-viewer img{max-width:100%;max-height:85vh;border-radius:8px}
.photo-viewer-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer}

/* ─── EMPTY STATE ────────────────────────── */
.es{text-align:center;padding:48px 20px;color:var(--muted)}
.es-ico{font-size:48px;display:block;margin-bottom:12px;opacity:.4}
.es p{font-size:15px;font-weight:600}
.es small{font-size:12px;margin-top:6px;display:block}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:calc(var(--bh) + 12px);left:16px;right:16px;background:#1e293b;color:#fff;border-radius:12px;padding:13px 18px;font-size:13px;font-weight:600;z-index:400;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;text-align:center}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{background:#16a34a}.toast.err{background:var(--red)}.toast.warn{background:var(--orange)}

/* ─── SYNC STATUS ────────────────────────── */
.sync-status{background:var(--orange-l);border:1px solid var(--orange);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sync-status.hidden{display:none}
.sync-status-text{flex:1;font-size:12px;font-weight:600;color:var(--orange)}
.sync-now{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}

/* ─── SECTION TITLE ──────────────────────── */
.section-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}

/* ─── LOADING ────────────────────────────── */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lhead">
      <div class="lico">🔧</div>
      <h1>GMAO Terrain</h1>
      <p>Application technicien</p>
    </div>
    <div class="lf"><label>Email</label><input type="email" id="lu" placeholder="technicien@gmao.fr" autocomplete="email" inputmode="email"></div>
    <div class="lf"><label>Mot de passe</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="lbtn" id="lbtn">Se connecter</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- DRAWER OVERLAY -->
  <div class="drawer-ov" id="drawer-ov"></div>

  <!-- DRAWER MENU -->
  <div class="drawer" id="drawer">
    <div class="drawer-grid">
      <button class="dni on" data-p="today"><span class="dic">📅</span>Aujourd'hui</button>
      <button class="dni" data-p="interventions"><span class="dic">📋</span>Mes BT<span id="bb-bts" style="display:none;background:var(--red);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;margin-left:4px"></span></button>
      <button class="dni" data-p="pending"><span class="dic">⬆️</span>À sync<span id="bb-sync" style="display:none;background:var(--red);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;margin-left:4px"></span></button>
      <button class="dni" data-p="profil"><span class="dic">👤</span>Profil</button>
    </div>
    <div class="drawer-sync">
      <span class="offline-badge" id="offline-badge" style="display:none">HORS LIGNE</span>
      <span class="drawer-sync-lbl" id="drawer-sync-lbl">Connecté</span>
      <button class="sync-btn" id="sync-btn">⇅ Sync<span id="pending-count"></span></button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="hdr">
    <button class="hdr-back" id="hdr-back">‹</button>
    <div class="hdr-title" id="hdr-title">Aujourd'hui</div>
    <div class="hdr-right">
      <button class="menu-btn" id="menu-btn">☰</button>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="mc" id="mc"></div>

  <!-- BOTTOM NAV (masqué) -->
  <nav class="bnav"></nav>
</div>

<!-- PHOTO VIEWER -->
<div class="photo-viewer" id="photo-viewer">
  <button class="photo-viewer-close" id="pv-close">✕</button>
  <img id="pv-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ══════════════════════════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(function(reg) {
    console.log('[SW] Enregistré', reg.scope);
  }).catch(function(e) {
    console.warn('[SW] Erreur:', e);
  });
}

// ══════════════════════════════════════════════════════════
// INDEXEDDB
// ══════════════════════════════════════════════════════════
var DB_NAME = 'gmao_offline', DB_VERSION = 1;
var idb = null;

function openIDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('interventions'))
        db.createObjectStore('interventions', {keyPath:'id'});
      if (!db.objectStoreNames.contains('pending'))
        db.createObjectStore('pending', {keyPath:'id', autoIncrement:true});
      if (!db.objectStoreNames.contains('auth'))
        db.createObjectStore('auth', {keyPath:'key'});
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e); };
  });
}

function idbGet(store, key) {
  return new Promise(function(resolve, reject) {
    var tx = idb.transaction(store, 'readonly');
    var req = tx.objectStore(store).get(key);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = reject;
  });
}

function idbPut(store, val) {
  return new Promise(function(resolve, reject) {
    var tx = idb.transaction(store, 'readwrite');
    var req = tx.objectStore(store).put(val);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = reject;
  });
}

function idbGetAll(store) {
  return new Promise(function(resolve, reject) {
    var tx = idb.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = reject;
  });
}

function idbDelete(store, key) {
  return new Promise(function(resolve, reject) {
    var tx = idb.transaction(store, 'readwrite');
    var req = tx.objectStore(store).delete(key);
    req.onsuccess = function() { resolve(); };
    req.onerror = reject;
  });
}

function idbClear(store) {
  return new Promise(function(resolve, reject) {
    var tx = idb.transaction(store, 'readwrite');
    var req = tx.objectStore(store).clear();
    req.onsuccess = function() { resolve(); };
    req.onerror = reject;
  });
}

// ══════════════════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════════════════
var API = window.location.origin;
var S = {
  user: null, token: null, online: navigator.onLine,
  page: 'today', prevPage: null,
  interventions: [],
  pending: [], // actions à synchroniser
  currentInterv: null
};

// ══════════════════════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toISOString().split('T')[0]; }
function fdate(d) {
  if (!d) return '--';
  try { var p = d.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  catch(e) { return d; }
}
function ftime() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function bstat(s) {
  var m = {
    'A_PLANIFIER':'bx-info', 'PLANIFIEE':'bx-info',
    'EN_COURS':'bx-warn', 'TERMINEE':'bx-ok', 'ANNULEE':'bx-neutral'
  };
  var labels = {
    'A_PLANIFIER':'À planifier','PLANIFIEE':'Planifiée',
    'EN_COURS':'En cours','TERMINEE':'Terminée','ANNULEE':'Annulée'
  };
  return '<span class="bx '+(m[s]||'bx-neutral')+'">'+(labels[s]||s)+'</span>';
}

function btype(t) {
  return t === 'MAINTENANCE'
    ? '<span class="bx bx-teal">Maintenance</span>'
    : '<span class="bx bx-purple">Dépannage</span>';
}

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
function apiCall(path, opts, cb) {
  var h = {'Content-Type': 'application/json'};
  if (S.token) h['Authorization'] = 'Bearer ' + S.token;
  var fo = Object.assign({}, opts || {}, {headers: h});
  if (fo.body) fo.body = JSON.stringify(fo.body);
  fetch(API + path, fo)
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.error || 'HTTP '+r.status); });
      return r.json();
    })
    .then(function(d) { if (cb) cb(null, d); })
    .catch(function(e) { if (cb) cb(e); });
}

// ══════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════
document.getElementById('lbtn').onclick = doLogin;
document.getElementById('lp').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };

function doLogin() {
  var em = document.getElementById('lu').value.trim();
  var pw = document.getElementById('lp').value.trim();
  if (!em || !pw) { document.getElementById('lerr').textContent = 'Email et mot de passe requis'; return; }
  var btn = document.getElementById('lbtn');
  btn.disabled = true; btn.textContent = 'Connexion...';
  document.getElementById('lerr').textContent = '';

  if (!S.online) {
    // Connexion offline depuis cache
    idbGet('auth', 'user').then(function(saved) {
      btn.disabled = false; btn.textContent = 'Se connecter';
      if (saved && saved.email === em) {
        S.user = saved.user; S.token = saved.token;
        startApp();
      } else {
        document.getElementById('lerr').textContent = 'Connexion impossible hors ligne. Connectez-vous d\'abord en ligne.';
      }
    });
    return;
  }

  apiCall('/api/login', {method:'POST', body:{email:em, password:pw}}, function(err, user) {
    btn.disabled = false; btn.textContent = 'Se connecter';
    if (err) { document.getElementById('lerr').textContent = err.message || 'Identifiants incorrects'; return; }
    S.user = user; S.token = user.token;
    // Sauvegarder pour connexion offline
    idbPut('auth', {key:'user', email:em, user:user, token:user.token});
    startApp();
  });
}

// ══════════════════════════════════════════════════════════
// APP START
// ══════════════════════════════════════════════════════════
function startApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  updateOnlineUI();
  loadInterventions(function() {
    navTo('today');
  });
  loadPending();
}

function loadInterventions(done) {
  if (S.online) {
    apiCall('/api/interventions?technicien=me', {}, function(err, data) {
      if (!err && data) {
        S.interventions = data;
        // Mettre en cache
        idbClear('interventions').then(function() {
          var promises = data.map(function(iv) { return idbPut('interventions', iv); });
          return Promise.all(promises);
        }).then(function() {
          if (done) done();
        });
      } else {
        // Fallback sur le cache
        loadFromCache(done);
      }
    });
  } else {
    loadFromCache(done);
  }
}

function loadFromCache(done) {
  idbGetAll('interventions').then(function(data) {
    S.interventions = data || [];
    if (done) done();
  });
}

function loadPending() {
  idbGetAll('pending').then(function(data) {
    S.pending = data || [];
    updatePendingBadge();
  });
}

function updatePendingBadge() {
  var n = S.pending.length;
  var bb = document.getElementById('bb-sync');
  bb.textContent = n; bb.style.display = n > 0 ? 'block' : 'none';
}

function renderToday() {

    h += '<div class="sync-status"><span style="font-size:20px">⬆️</span><span class="sync-status-text">'+S.pending.length+' action(s) en attente de synchronisation</span><button class="sync-now" onclick="doSync()">Sync</button></div>';
  }

  if (enCours.length > 0) {
    h += '<div class="section-lbl">En cours ('+enCours.length+')</div>';
    enCours.forEach(function(i) { h += ivCard(i, true); });

  h += '<div class="section-lbl">Planifiées aujourd\'hui ('+todayIv.length+')</div>';

S.fltIv = '';

function ivCard(i, highlight) {
  var ico = i.type === 'MAINTENANCE' ? '🔧' : '⚡';
  var icoCls = i.type === 'MAINTENANCE' ? 'maintenance' : 'depannage';
  var pending = S.pending.filter(function(p) { return p.interv_id === i.id; }).length;
  return '<div class="card'+(highlight?' card-active':'')+'" data-id="'+i.id+'">'+
    '<div class="card-header">'+
    '<div class="card-ico '+icoCls+'">'+ico+'</div>'+
    '<div class="card-main">'+
    '<div class="card-num">'+esc(i.numero)+'</div>'+
    '<div class="card-title">'+esc(i.equip_nom||i.designation||'--')+'</div>'+
    '<div class="card-sub">'+esc(i.projet_nom||'--')+(i.localisation?' · '+esc(i.localisation):'')+'</div>'+
    '</div>'+
    '</div>'+
    '<div class="card-footer">'+
    '<div style="display:flex;gap:6px;align-items:center">'+bstat(i.statut)+' '+btype(i.type)+'</div>'+
    (pending > 0 ? '<span class="card-pending">⬆️ '+pending+' en attente</span>' : '<span class="card-date">📅 '+fdate(i.date_prevue)+'</span>')+
    '</div>'+
    '</div>';
}

function attachIvCardEvents() {
  document.querySelectorAll('.card[data-id]').forEach(function(card) {

      var id = parseInt(card.dataset.id);

      navTo('interv_detail');
    };

}

// ══════════════════════════════════════════════════════════
function renderIntervDetail() {
  var i = S.currentInterv;
  if (!i) { navTo('today'); return; }

  var h = '';

  // Statut bar
  h += '<div class="status-bar">';
  if (i.statut === 'A_PLANIFIER' || i.statut === 'PLANIFIEE') {
    h += '<button class="sbtn sbtn-start" data-ns="EN_COURS">▶ Démarrer</button>';
  }
  if (i.statut === 'EN_COURS') {
    h += '<button class="sbtn sbtn-done" data-ns="TERMINEE">✓ Terminer</button>';
    h += '<button class="sbtn sbtn-cr" data-cr="1">📝 Compte rendu</button>';
  }
  if (i.statut !== 'TERMINEE' && i.statut !== 'ANNULEE') {
    h += '<button class="sbtn sbtn-cancel" data-ns="ANNULEE">✕ Annuler</button>';
  }
  if (i.statut === 'TERMINEE') {
    h += '<button class="sbtn sbtn-cr" data-cr="1">📝 Voir / Modifier CR</button>';
  }
  h += '</div>';

  // Infos principales
  h += '<div class="detail-card">';
  h += '<div class="detail-title">Informations</div>';
  h += dr('Référence', i.numero);
  h += dr('Type', i.type === 'MAINTENANCE' ? 'Maintenance' : 'Dépannage');
  h += dr('Statut', i.statut.replace(/_/g,' '));
  h += dr('Date prévue', fdate(i.date_prevue));
  h += dr('Date réalisation', fdate(i.date_realisation));
  h += '</div>';

  // Équipement
  h += '<div class="detail-card">';
  h += '<div class="detail-title">Équipement</div>';
  h += dr('Désignation', i.equip_nom || i.designation);
  h += dr('Type technique', (i.type_technique||'--').replace(/_/g,' '));
  h += dr('Localisation', i.localisation);
  h += dr('Projet', i.projet_nom);
  h += '</div>';

  // Description
  if (i.description) {
    h += '<div class="detail-card">';
    h += '<div class="detail-title">Description</div>';
    h += '<p style="font-size:14px;line-height:1.6;color:var(--text)">'+esc(i.description)+'</p>';
    h += '</div>';
  }

  // Compte rendu existant
  if (i.compte_rendu) {
    var cr = i.compte_rendu;
    h += '<div class="detail-card">';
    h += '<div class="detail-title">Compte rendu</div>';
    if (cr.observations) { h += '<p style="font-size:13px;margin-bottom:8px;color:var(--muted);font-weight:600">Observations</p><p style="font-size:14px;line-height:1.5;margin-bottom:14px">'+esc(cr.observations)+'</p>'; }
    if (cr.actions_realisees) { h += '<p style="font-size:13px;margin-bottom:8px;color:var(--muted);font-weight:600">Actions réalisées</p><p style="font-size:14px;line-height:1.5">'+esc(cr.actions_realisees)+'</p>'; }
    h += '</div>';
  }

  document.getElementById('mc').innerHTML = h;

  // Events statut
  document.querySelectorAll('[data-ns]').forEach(function(btn) {
    btn.onclick = function() { updateStatut(i.id, btn.dataset.ns); };
  });
  document.querySelectorAll('[data-cr]').forEach(function(btn) {
    btn.onclick = function() {
      // Charger le CR si online
      if (S.online) {
        apiCall('/api/comptes_rendus/'+i.id, {}, function(err, cr) {
          if (!err) S.currentInterv.compte_rendu = cr;
          navTo('cr_form');
        });
      } else {
        navTo('cr_form');
      }
    };
  });
}

function dr(label, val) {
  return '<div class="detail-row"><span class="detail-label">'+esc(label)+'</span><span class="detail-value">'+esc(val||'--')+'</span></div>';
}

function updateStatut(id, newStatut) {
  var action = {type:'statut', interv_id:id, statut:newStatut, ts:Date.now()};
  // Optimistic update local
  var iv = S.interventions.find(function(x) { return x.id === id; });
  if (iv) {
    iv.statut = newStatut;
    idbPut('interventions', iv);
  }

  if (S.online) {
    apiCall('/api/interventions/'+id, {method:'PATCH', body:{statut:newStatut}}, function(err) {
      if (err) {
        toast('Erreur — action mise en attente', 'warn');
        queueAction(action);
      } else {
        toast('Statut mis à jour ✓', 'ok');
        if (S.currentInterv) S.currentInterv.statut = newStatut;
        renderIntervDetail();
      }
    });
  } else {
    queueAction(action);
    toast('Hors ligne — action enregistrée', 'warn');
    if (S.currentInterv) S.currentInterv.statut = newStatut;
    renderIntervDetail();
  }
}

  h += '<div class="fg"><label>Recommandations</label><textarea id="crf-rec" placeholder="Travaux à prévoir...">'+esc(cr.recommandations||'')+'</textarea></div>';
  h += '<div class="fg"><label>Conclusion</label><textarea id="crf-ccl" placeholder="Conclusion générale...">'+esc(cr.conclusion||'')+'</textarea></div>';

function renderIvList() {
  if (!S.crIntervenants.length) return '<p style="color:var(--muted);font-size:13px;margin-bottom:14px">Aucun intervenant ajouté</p>';
  return S.crIntervenants.map(function(iv, i) {
    return '<div class="iv-row"><div class="iv-row-head"><span style="font-size:13px;font-weight:700">Intervenant '+(i+1)+'</span><button class="iv-del" data-del="'+i+'">✕ Supprimer</button></div>'+
      '<div class="fg"><label>Technicien</label><input class="iv-nom" data-idx="'+i+'" value="'+esc(iv.nom||'')+'" placeholder="Nom du technicien" style="font-size:14px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;width:100%"></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
      '<div class="fg"><label>Date</label><input type="date" class="iv-date" data-idx="'+i+'" value="'+(iv.date||today())+'" style="font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px"></div>'+
      '<div class="fg"><label>Début</label><input type="time" class="iv-hd" data-idx="'+i+'" value="'+(iv.hd||'')+'" style="font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px"></div>'+
      '<div class="fg"><label>Fin</label><input type="time" class="iv-hf" data-idx="'+i+'" value="'+(iv.hf||'')+'" style="font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px"></div>'+
      '</div></div>';
  }).join('');
}

function attachIvFormEvents() {
  document.querySelectorAll('.iv-nom').forEach(function(el) { el.oninput = function() { S.crIntervenants[parseInt(el.dataset.idx)].nom = el.value; }; });
  document.querySelectorAll('.iv-date').forEach(function(el) { el.onchange = function() { S.crIntervenants[parseInt(el.dataset.idx)].date = el.value; }; });
  document.querySelectorAll('.iv-hd').forEach(function(el) { el.onchange = function() { S.crIntervenants[parseInt(el.dataset.idx)].hd = el.value; }; });
  document.querySelectorAll('.iv-hf').forEach(function(el) { el.onchange = function() { S.crIntervenants[parseInt(el.dataset.idx)].hf = el.value; }; });
  document.querySelectorAll('.iv-del').forEach(function(btn) {
    btn.onclick = function() {
      S.crIntervenants.splice(parseInt(btn.dataset.del), 1);
      document.getElementById('crf-iv-list').innerHTML = renderIvList();
      attachIvFormEvents();
    };
  });
}

function renderPhotosGrid() {
  var h = S.crPhotos.map(function(p, i) {
    return '<div class="photo-wrap"><img class="photo-thumb" src="'+p.data+'" data-idx="'+i+'"><button class="photo-del" data-del="'+i+'">✕</button></div>';
  }).join('');
  h += '<div class="photo-add" id="photo-add-btn">📷</div>';
  return h;
}

function attachPhotoEvents() {
  document.getElementById('photo-add-btn').onclick = function() {
    var input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
    input.onchange = function() {
      if (!input.files[0]) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        S.crPhotos.push({data: e.target.result, name: input.files[0].name});
        document.getElementById('photos-grid').innerHTML = renderPhotosGrid();
        attachPhotoEvents();
      };
      reader.readAsDataURL(input.files[0]);
    };
    input.click();
  };

  document.querySelectorAll('.photo-thumb[data-idx]').forEach(function(img) {
    img.onclick = function() { viewPhoto(img.src); };
  });

  document.querySelectorAll('.photo-del').forEach(function(btn) {
    btn.onclick = function(e) {
      e.stopPropagation();
      S.crPhotos.splice(parseInt(btn.dataset.del), 1);
      document.getElementById('photos-grid').innerHTML = renderPhotosGrid();
      attachPhotoEvents();
    };
  });
}

function viewPhoto(src) {
  document.getElementById('pv-img').src = src;
  document.getElementById('photo-viewer').classList.add('on');
}

document.getElementById('pv-close').onclick = function() {
  document.getElementById('photo-viewer').classList.remove('on');
};

function saveCR() {
  var i = S.currentInterv;
  var body = {
    date_intervention: document.getElementById('crf-date').value,
    observations:      document.getElementById('crf-obs').value,
    actions_realisees: document.getElementById('crf-act').value,
    mesures:           document.getElementById('crf-mes').value,
    recommandations:   document.getElementById('crf-rec').value,
    conclusion:        document.getElementById('crf-ccl').value,
    intervenants:      S.crIntervenants.filter(function(iv) { return iv.nom; }).map(function(iv) {
      return {utilisateur_id: iv.uid || null, nom: iv.nom, date: iv.date, heure_debut: iv.hd, heure_fin: iv.hf};
    }),
    photos: S.crPhotos
  };

  if (S.online) {
    apiCall('/api/comptes_rendus/'+i.id, {method:'POST', body:body}, function(err) {
      if (err) {
        toast('Erreur — CR mis en attente', 'warn');
        queueAction({type:'cr', interv_id:i.id, data:body, ts:Date.now()});
      } else {
        toast('Compte rendu enregistré ✓', 'ok');
        S.crIntervenants = []; S.crPhotos = [];
        // Recharger l'intervention
        apiCall('/api/interventions/'+i.id, {}, function(e, updated) {
          if (!e) {
            S.currentInterv = updated;
            var idx = S.interventions.findIndex(function(x) { return x.id === i.id; });
            if (idx >= 0) S.interventions[idx] = updated;
            idbPut('interventions', updated);
          }
          navTo('interv_detail');
        });
      }
    });
  } else {
    queueAction({type:'cr', interv_id:i.id, data:body, ts:Date.now()});
    toast('Hors ligne — CR enregistré localement ✓', 'warn');
    S.crIntervenants = []; S.crPhotos = [];
    navTo('interv_detail');
  }
}

// ══════════════════════════════════════════════════════════
// PENDING
// ══════════════════════════════════════════════════════════
function queueAction(action) {
  idbPut('pending', action).then(function() {
    loadPending();
  });
}

function renderPending() {
  var h = '';
  if (!S.pending.length) {
    h = '<div class="es"><span class="es-ico">✅</span><p>Tout est synchronisé</p><small>Aucune action en attente</small></div>';
    document.getElementById('mc').innerHTML = h;
    return;
  }

  h += '<div class="sync-status"><span style="font-size:20px">⬆️</span><span class="sync-status-text">'+S.pending.length+' action(s) en attente</span>'+(S.online?'<button class="sync-now" onclick="doSync()">Synchroniser</button>':'<span style="color:var(--orange);font-size:11px">Hors ligne</span>')+'</div>';

  S.pending.forEach(function(p) {
    var label = p.type === 'cr' ? 'Compte rendu' : 'Statut → '+p.statut;
    var ts = new Date(p.ts).toLocaleString('fr-FR');
    h += '<div class="card" style="cursor:default"><div class="card-header"><div class="card-ico '+(p.type==='cr'?'maintenance':'depannage')+'">'+( p.type==='cr'?'📝':'⚡')+'</div><div class="card-main"><div class="card-title">'+esc(label)+'</div><div class="card-sub">Intervention #'+p.interv_id+'</div></div></div><div style="font-size:11px;color:var(--muted)">En attente depuis '+ts+'</div></div>';
  });

  document.getElementById('mc').innerHTML = h;
}

async function doSync() {
  if (!S.online) { toast('Pas de connexion', 'err'); return; }
  if (!S.pending.length) { toast('Rien à synchroniser', 'ok'); return; }

  var btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  toast('Synchronisation...', 'warn');

  var success = 0, errors = 0;

  for (var p of S.pending) {
    try {
      if (p.type === 'statut') {
        await fetchPromise('/api/interventions/'+p.interv_id, 'PATCH', {statut: p.statut});
      } else if (p.type === 'cr') {
        await fetchPromise('/api/comptes_rendus/'+p.interv_id, 'POST', p.data);
      }
      await idbDelete('pending', p.id);
      success++;
    } catch(e) {
      errors++;
    }
  }

  await loadPending();
  btn.classList.remove('syncing');

  // Recharger les interventions
  loadInterventions(function() {
    renderPage();
    if (errors === 0) {
      toast(success+' action(s) synchronisée(s) ✓', 'ok');
    } else {
      toast(success+' OK, '+errors+' erreur(s)', 'warn');
    }
  });
}

function fetchPromise(path, method, body) {
  return new Promise(function(resolve, reject) {
    var h = {'Content-Type':'application/json', 'Authorization':'Bearer '+S.token};
    fetch(API+path, {method:method, headers:h, body:JSON.stringify(body)})
      .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(resolve).catch(reject);
  });
}

// ══════════════════════════════════════════════════════════
// PROFIL
// ══════════════════════════════════════════════════════════
function renderProfil() {
  if (!S.user) return;
  var h = '<div class="detail-card" style="text-align:center;padding:28px 18px">';
  h += '<div style="width:70px;height:70px;background:var(--acc);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 14px">'+esc(S.user.nom.charAt(0).toUpperCase())+'</div>';
  h += '<div style="font-size:20px;font-weight:800">'+esc(S.user.nom)+'</div>';
  h += '<div style="font-size:13px;color:var(--muted);margin-top:4px">'+esc(S.user.email)+'</div>';
  h += '<div style="margin-top:10px"><span class="bx bx-info">Technicien</span></div>';
  h += '</div>';

  h += '<div class="detail-card">';
  h += '<div class="detail-title">Statistiques</div>';
  var total = S.interventions.length;
  var terminees = S.interventions.filter(function(i) { return i.statut === 'TERMINEE'; }).length;
  var enCours = S.interventions.filter(function(i) { return i.statut === 'EN_COURS'; }).length;
  h += dr('Total interventions', total);
  h += dr('Terminées', terminees);
  h += dr('En cours', enCours);
  h += dr('En attente sync', S.pending.length);
  h += '</div>';

  h += '<div class="detail-card">';
  h += '<div class="detail-title">Connexion</div>';
  h += dr('Statut', S.online ? '🟢 En ligne' : '🔴 Hors ligne');
  h += dr('Serveur', API);
  h += '</div>';

  h += '<button class="btn-full btn-secondary" onclick="doSync()" style="margin-bottom:10px">⇅ Synchroniser maintenant</button>';
  h += '<button class="btn-full btn-secondary" style="background:var(--red-l);color:var(--red)" onclick="doLogout()">🚪 Déconnexion</button>';

  document.getElementById('mc').innerHTML = h;
}

function doLogout() {
  if (!confirm('Se déconnecter ?')) return;
  S.user = null; S.token = null;
  idbDelete('auth', 'user');
  document.getElementById('app').classList.remove('on');
  document.getElementById('login').style.display = 'flex';
}

// ══════════════════════════════════════════════════════════
// ONLINE / OFFLINE
// ══════════════════════════════════════════════════════════
function updateOnlineUI() {
  var badge = document.getElementById('offline-badge');
  var lbl = document.getElementById('drawer-sync-lbl');
  if (!S.online) {
    badge.style.display = 'block';
    if (lbl) lbl.textContent = 'Hors ligne';
  } else {
    badge.style.display = 'none';
    if (lbl) lbl.textContent = 'Connecté';
  }
}

window.addEventListener('online', function() {
  S.online = true;
  updateOnlineUI();
  toast('Connexion rétablie — synchronisation...', 'ok');
  // Sync auto
  setTimeout(doSync, 1000);
});

window.addEventListener('offline', function() {
  S.online = false;
  updateOnlineUI();
  toast('Connexion perdue — mode hors ligne', 'warn');
});

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
var toastTmr;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast on ' + (type||'');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function() { el.classList.remove('on'); }, 3500);
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
openIDB().then(function(db) {
  idb = db;
  // Tentative de reconnexion auto depuis cache
  idbGet('auth', 'user').then(function(saved) {
    if (saved && saved.token) {
      S.user = saved.user; S.token = saved.token;
      startApp();
    }
  });
}).catch(function(e) {
  console.error('[IDB] Erreur:', e);
});

})();
</script>

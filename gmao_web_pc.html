<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOCOM GMAO — Web</title>
<style>
/* ════════════════ RESET & VARIABLES ════════════════ */
:root {
  --sidebar:    #1f2b35;
  --sidebar2:   #243344;
  --acc:        #2563eb;
  --acc2:       #1d4ed8;
  --acc-light:  #dbeafe;
  --bg:         #f1f5f9;
  --white:      #ffffff;
  --text:       #0f172a;
  --text2:      #334155;
  --muted:      #64748b;
  --border:     #e2e8f0;
  --red:        #dc2626;
  --red-light:  #fee2e2;
  --orange:     #f59e0b;
  --orange-light:#fef3c7;
  --green:      #16a34a;
  --green-light:#dcfce7;
  --radius:     10px;
  --shadow:     0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:  0 4px 24px rgba(0,0,0,.12);
  --sidebar-w:  240px;
  --header-h:   56px;
  --transition: .18s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ════════════════ LOGIN ════════════════ */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1f2b35 0%,#243344 50%,#1a3a5c 100%);position:fixed;inset:0;z-index:1000}
.login-box{background:var(--white);border-radius:20px;padding:40px 44px;width:400px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.login-header{text-align:center;margin-bottom:32px}
.login-logo{width:56px;height:56px;background:var(--acc);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;box-shadow:0 8px 20px rgba(37,99,235,.35)}
.login-header h1{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.login-header p{font-size:13px;color:var(--muted);margin-top:4px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.login-field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--text);outline:none;transition:var(--transition)}
.login-field input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.login-btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:700;transition:var(--transition);margin-top:4px}
.login-btn:hover{background:var(--acc2)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:500}

/* ════════════════ LAYOUT ════════════════ */
#app{display:none;flex:1;overflow:hidden}
#app.active{display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.3px}
.sidebar-logo p{color:#6b8194;font-size:11px;margin-top:2px}
.sidebar-user{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{color:#d0dde8;font-size:13px;font-weight:600;line-height:1.2}
.user-role{color:#6b8194;font-size:11px}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-section-title{color:#4a6278;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:#8aa4b8;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:#d0dde8}
.nav-item.active{background:rgba(37,99,235,.25);color:#93c5fd}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px}
.sidebar-bottom{padding:10px 8px 16px;border-top:1px solid rgba(255,255,255,.08)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.main-header{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.header-title{font-size:17px;font-weight:800;color:var(--text);flex:1}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-header{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:700;border:none;display:flex;align-items:center;gap:6px;transition:var(--transition)}
.btn-header.primary{background:var(--acc);color:#fff}
.btn-header.primary:hover{background:var(--acc2)}
.btn-header.secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-header.secondary:hover{background:var(--border)}
.online-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Content */
.main-content{flex:1;overflow-y:auto;padding:24px}

/* Pages */
.page{display:none}
.page.active{display:block}

/* ════════════════ CARDS / STAT ════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;border:1px solid var(--border)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border)}
.stat-card.blue::before{background:var(--acc)}
.stat-card.orange::before{background:var(--orange)}
.stat-card.red::before{background:var(--red)}
.stat-card.green::before{background:var(--green)}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.stat-icon{font-size:24px}
.stat-trend{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
.stat-trend.up{background:var(--green-light);color:var(--green)}
.stat-value{font-size:32px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted);font-weight:600}

/* ════════════════ TABLE ════════════════ */
.table-container{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:800;color:var(--text);flex:1}
.search-input{border:1.5px solid var(--border);border-radius:7px;padding:7px 12px 7px 34px;font-size:13px;color:var(--text);outline:none;transition:var(--transition);background:var(--bg);min-width:200px}
.search-input:focus{border-color:var(--acc);background:#fff}
.search-wrap{position:relative}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg)}
.fc{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:var(--transition)}
.fc:hover{border-color:var(--acc);color:var(--acc)}
.fc.active{background:var(--acc);color:#fff;border-color:var(--acc)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;position:sticky;top:0}
tbody tr{transition:var(--transition);cursor:pointer}
tbody tr:hover{background:#f8fafc}
tbody tr.selected{background:var(--acc-light)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.table-scroll{overflow-x:auto;max-height:calc(100vh - 320px)}

/* ════════════════ BADGES ════════════════ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap;letter-spacing:.1px}
.b-urgent{background:var(--red-light);color:#991b1b}
.b-haute{background:var(--orange-light);color:#92400e}
.b-normale{background:var(--green-light);color:#166534}
.b-ouvert{background:var(--acc-light);color:#1e40af}
.b-encours{background:var(--orange-light);color:#92400e}
.b-termine{background:var(--green-light);color:#166534}
.b-planifie{background:var(--acc-light);color:#1e40af}
.b-realise{background:var(--green-light);color:#166534}
.b-depannage{background:#ede9fe;color:#5b21b6}
.b-preventif,.b-maintenance{background:#e0f2fe;color:#0369a1}

/* ════════════════ SIDE PANEL (DETAIL) ════════════════ */
.side-panel{position:fixed;right:0;top:0;bottom:0;width:480px;background:var(--white);box-shadow:-4px 0 32px rgba(0,0,0,.12);z-index:100;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border)}
.side-panel.open{transform:translateX(0)}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.panel-close{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;color:var(--muted);transition:var(--transition)}
.panel-close:hover{background:var(--border)}
.panel-title{font-size:16px;font-weight:800;color:var(--text);flex:1}
.panel-body{flex:1;overflow-y:auto;padding:20px 24px}
.panel-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:99;display:none}
.panel-overlay.active{display:block}

/* Detail rows */
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f1f5f9}
.detail-row:last-child{border-bottom:none}
.dl{font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0;min-width:130px}
.dv{font-size:13px;font-weight:600;color:var(--text);text-align:right;word-break:break-word}

/* ════════════════ MODAL (FORM) ════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px 32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-group textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

/* ════════════════ BUTTONS ════════════════ */
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;border:none;display:inline-flex;align-items:center;gap:6px;transition:var(--transition)}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--acc);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warning{background:var(--orange);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-outline{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ════════════════ PLANNING ════════════════ */
.planning-layout{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
.cal-wrap{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);position:sticky;top:0}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:15px;font-weight:800;color:var(--text)}
.cal-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;color:var(--text2);transition:var(--transition)}
.cal-btn:hover{background:var(--border)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:10px;font-weight:800;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;position:relative;transition:var(--transition);font-weight:500;color:var(--text)}
.cal-d:hover{background:var(--bg)}
.cal-d.today{background:var(--acc);color:#fff;font-weight:700}
.cal-d.has-events::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--orange);border-radius:50%}
.cal-d.today.has-events::after{background:#fff}
.cal-d.other-month{opacity:.3}
.cal-d.selected:not(.today){background:#e0f2fe;color:var(--acc)}

/* ════════════════ DASHBOARD ════════════════ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
.dash-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.dash-card-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:800;color:var(--text)}
.dash-card-body{padding:4px 0;max-height:300px;overflow-y:auto}
.dash-row{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.dash-row:hover{background:var(--bg)}
.dash-row:last-child{border-bottom:none}
.dash-row-main{flex:1;min-width:0}
.dash-row-title{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-row-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ════════════════ EMPTY / LOADING ════════════════ */
.empty-state{text-align:center;padding:56px 24px;color:var(--muted)}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;opacity:.5}
.empty-state p{font-size:15px;font-weight:600}
.empty-state small{font-size:13px;display:block;margin-top:4px;opacity:.7}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════ TOAST ════════════════ */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;z-index:500;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:360px;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warning{background:var(--orange)}

/* ════════════════ SKELETON ════════════════ */
.skel{background:linear-gradient(90deg,#f1f5f9 25%,#e8edf3 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;height:14px;margin:6px 0}
@keyframes shimmer{to{background-position:-200% 0}}

/* Responsive */
@media(max-width:1100px){
  :root{--sidebar-w:56px}
  .sidebar-logo p,.user-name,.user-role,.nav-item span:not(.nav-icon),.nav-section-title{display:none}
  .sidebar-logo{padding:14px;text-align:center}
  .sidebar-user{justify-content:center;padding:10px}
  .nav-item{justify-content:center;padding:10px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:800px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .planning-layout{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">🔧</div>
      <h1>SOCOM GMAO</h1>
      <p>Gestion de Maintenance Assistée par Ordinateur</p>
    </div>
    <div class="login-field">
      <label>Identifiant</label>
      <input type="text" id="l-user" autocomplete="username" placeholder="Nom d'utilisateur" autocapitalize="none">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="l-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="l-err"></div>
  </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>🔧 SOCOM GMAO</h1>
      <p>Maintenance Pro</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="s-avatar">?</div>
      <div>
        <div class="user-name" id="s-name">—</div>
        <div class="user-role" id="s-role">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <button class="nav-item active" onclick="navTo('dashboard',this)">
          <span class="nav-icon">🏠</span><span>Tableau de bord</span>
        </button>
        <button class="nav-item" onclick="navTo('bons_travail',this)">
          <span class="nav-icon">📋</span><span>Bons de travail</span>
          <span class="nav-badge" id="nb-bt" style="display:none"></span>
        </button>
        <button class="nav-item" onclick="navTo('planning',this)">
          <span class="nav-icon">📅</span><span>Planning</span>
        </button>
        <button class="nav-item" onclick="navTo('comptes_rendus',this)">
          <span class="nav-icon">📝</span><span>Comptes rendus</span>
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Données</div>
        <button class="nav-item" onclick="navTo('equipements',this)">
          <span class="nav-icon">⚙️</span><span>Équipements</span>
        </button>
        <button class="nav-item" onclick="navTo('projets',this)">
          <span class="nav-icon">📁</span><span>Projets</span>
        </button>
      </div>
      <div class="nav-section" id="admin-nav" style="display:none">
        <div class="nav-section-title">Administration</div>
        <button class="nav-item" onclick="navTo('utilisateurs',this)">
          <span class="nav-icon">👥</span><span>Utilisateurs</span>
        </button>
      </div>
    </nav>
    <div class="sidebar-bottom">

<script>
'use strict';

// ════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════
const API = window.location.origin;

let S = {
  user:        null,
  token:       null,
  online:      navigator.onLine,
  page:        'dashboard',
  bts:         [],
  planning:    [],
  crs:         [],
  equipements: [],
  projets:     [],
  techniciens: [],
  utilisateurs:[],
  btFilter:    '',
  btType:      '',
  btSearch:    '',
  calDate:     new Date(),
  calSelected: null,
  formAction:  null,
};

// ════════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json' };
  if (S.token) h['Authorization'] = `Bearer ${S.token}`;
  const res = await fetch(API + path, {
    ...opts,
    headers: { ...h, ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt || `HTTP ${res.status}`);
  }
  return res.json();
}

// ════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════
async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value.trim();
  if (!username || !password) { setLoginErr('Identifiants requis'); return; }
  const btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  setLoginErr('');
  try {
    const user = await api('/api/login', { method:'POST', body:{ username, password } });
    S.user  = user;
    S.token = user.token;
    startApp();
  } catch(e) {
    setLoginErr(e.message || 'Identifiants incorrects');
  } finally {
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}
function setLoginErr(msg) { document.getElementById('l-err').textContent = msg; }

function doLogout() {
  if (!confirm('Se déconnecter ?')) return;
  S.user = null; S.token = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
}

// ════════════════════════════════════════════════════
//  APP START
// ════════════════════════════════════════════════════
async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  const name = S.user.full_name || S.user.username;
  document.getElementById('s-name').textContent  = name;
  document.getElementById('s-role').textContent  = S.user.role || '';
  document.getElementById('s-avatar').textContent = name.charAt(0).toUpperCase();
  if (S.user.role === 'admin') document.getElementById('admin-nav').style.display = 'block';
  updateOnlineUI();
  await loadAllData();
  navTo('dashboard');
}

// ════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════
const PAGE_TITLES = {
  dashboard:     'Tableau de bord',
  bons_travail:  'Bons de travail',
  planning:      'Planning',
  comptes_rendus:'Comptes rendus',
  equipements:   'Équipements',
  projets:       'Projets',
  utilisateurs:  'Utilisateurs',
};

const ADD_PAGES = ['bons_travail','comptes_rendus'];

function navTo(page, navEl) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  S.page = page;
  document.getElementById('header-title').textContent = PAGE_TITLES[page] || page;
  const addBtn = document.getElementById('header-add-btn');
  addBtn.style.display = ADD_PAGES.includes(page) ? 'flex' : 'none';
  closePanel();
  const content = document.getElementById('main-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';
  const renderers = {
    dashboard:     renderDashboard,
    bons_travail:  renderBTs,
    planning:      renderPlanning,
    comptes_rendus:renderCRs,
    equipements:   renderEquipements,
    projets:       renderProjets,
    utilisateurs:  renderUtilisateurs,
  };
  if (renderers[page]) renderers[page]();
}

// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
async function loadAllData() {
  try {
    const [bts, planning, crs, equips, projets, techs] = await Promise.all([
      api('/api/bons_travail'),
      api('/api/planning'),
      api('/api/comptes_rendus'),
      api('/api/equipements'),
      api('/api/projets'),
      api('/api/techniciens'),
    ]);
    S.bts = bts; S.planning = planning; S.crs = crs;
    S.equipements = equips; S.projets = projets; S.techniciens = techs;
    // Badge BT urgents
    const urgent = bts.filter(b => b.priorite === 'Urgente' && b.statut !== 'Terminé').length;
    const badge = document.getElementById('nb-bt');
    badge.textContent = urgent;
    badge.style.display = urgent > 0 ? 'inline' : 'none';
  } catch(e) {
    showToast('Erreur chargement données : ' + e.message, 'error');
  }
}

async function syncAll() {
  showToast('Synchronisation…');
  try {
    await loadAllData();
    const renderers = {
      dashboard:renderDashboard, bons_travail:renderBTs,
      planning:renderPlanning, comptes_rendus:renderCRs,
      equipements:renderEquipements, projets:renderProjets,
    };
    if (renderers[S.page]) renderers[S.page]();
    showToast('Synchronisé ✓', 'success');
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

// ════════════════════════════════════════════════════
//  DASHBOARD

function navToNav(page) {

// ════════════════════════════════════════════════════

    (b.numero_bt||'').toLowerCase().includes(S.btSearch) ||
    (b.equipement||'').toLowerCase().includes(S.btSearch) ||

  const html = `
    <div class="table-container">

        <span class="table-title">Bons de travail (${data.length})</span>
        <div class="search-wrap">

        <span class="fc${S.btType==='Dépannage'?' active':''}" onclick="S.btType='Dépannage';S.btFilter='';renderBTs()">Dépannage</span>
        <span class="fc${S.btType==='Préventif'?' active':''}" onclick="S.btType='Préventif';S.btFilter='';renderBTs()">Préventif</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>N°</th>
              <th>Titre</th>
              <th>Type</th>
              <th>Priorité</th>
              <th>Statut</th>
              <th>Équipement</th>
              <th>Technicien</th>
              <th>Date prévue</th>

              <tr onclick="openBTPanel(${b.id})">

                <td style="font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.titre||'—'}</td>
                <td><span class="badge b-${(b.type_bt||'').toLowerCase().replace('é','e').replace('è','e')}">${b.type_bt||'—'}</span></td>
                <td><span class="badge b-${(b.priorite||'').toLowerCase().replace('é','e')}">${b.priorite||'—'}</span></td>
                <td><span class="badge b-${(b.statut||'').toLowerCase().replace(' ','')}">${b.statut||'—'}</span></td>
                <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${b.equipement||'—'}</td>
                <td style="color:var(--muted)">${b.technicien_username||'—'}</td>
                <td style="color:var(--muted)">${b.date_prevue||'—'}</td>

        </table>

  document.getElementById('main-content').innerHTML = html;
}

async function openBTPanel(id) {
  openPanel('Chargement…');
  try {
    const [bt, crs] = await Promise.all([
      api(`/api/bons_travail/${id}`),
      api(`/api/bons_travail/${id}/comptes_rendus`),
    ]);
    const prio = (bt.priorite||'').toLowerCase().replace('é','e');
    const stat = (bt.statut||'').toLowerCase().replace(' ','');
    document.getElementById('panel-title').textContent = bt.numero_bt || 'BT';
    document.getElementById('panel-body').innerHTML = `
      <div style="display:flex;gap:6px;margin-bottom:16px">
        <span class="badge b-${stat}">${bt.statut||''}</span>
        <span class="badge b-${prio}">${bt.priorite||''}</span>
        <span class="badge b-${(bt.type_bt||'').toLowerCase().replace('é','e').replace('è','e')}">${bt.type_bt||''}</span>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Informations générales</div>
        <div class="detail-row"><span class="dl">Titre</span><span class="dv">${bt.titre||'—'}</span></div>
        <div class="detail-row"><span class="dl">Équipement</span><span class="dv">${bt.equipement||'—'}</span></div>
        <div class="detail-row"><span class="dl">Projet</span><span class="dv">${bt.projet||'—'}</span></div>
        <div class="detail-row"><span class="dl">Technicien</span><span class="dv">${bt.technicien_username||'—'}</span></div>
        <div class="detail-row"><span class="dl">Date ouverture</span><span class="dv">${bt.date_ouverture||'—'}</span></div>
        <div class="detail-row"><span class="dl">Date prévue</span><span class="dv">${bt.date_prevue||'—'}</span></div>
        <div class="detail-row"><span class="dl">Heure prévue</span><span class="dv">${bt.heure_prevue||'—'}</span></div>
      </div>
      ${bt.description ? `
      <div class="detail-section">
        <div class="detail-section-title">Description</div>
        <p style="font-size:13px;line-height:1.6;color:var(--text2)">${bt.description}</p>
      </div>` : ''}
      ${bt.notes ? `
      <div class="detail-section">
        <div class="detail-section-title">Notes</div>
        <p style="font-size:13px;line-height:1.6;color:var(--text2)">${bt.notes}</p>
      </div>` : ''}
      <div class="detail-section">
        <div class="detail-section-title">Comptes rendus (${crs.length})</div>
        ${crs.map(cr=>`
          <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-weight:700;font-size:13px">${cr.numero_cr}</span>
              <span class="badge b-${(cr.statut||'').toLowerCase().replace(' ','')}">${cr.statut||''}</span>
            </div>
            <div style="font-size:12px;color:var(--muted)">${cr.date_intervention||''} · ${cr.heure_debut||''}→${cr.heure_fin||''}</div>
            ${cr.remarques ? `<div style="font-size:12px;margin-top:6px;color:var(--text2)">${cr.remarques}</div>` : ''}

        '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Aucun compte rendu</div>'}

      ${bt.statut !== 'Terminé'  ? `<button class="btn btn-success btn-sm" onclick="setBTStatus(${bt.id},'Terminé')">✓ Terminer</button>` : ''}
      <button class="btn btn-outline btn-sm" onclick="openCRFormFor(${bt.id})">+ Compte rendu</button>

  } catch(e) {
    document.getElementById('panel-body').innerHTML = `<div class="empty-state"><span class="empty-icon">⚠️</span><p>${e.message}</p></div>`;
  }
}

async function setBTStatus(id, statut) {
  try {
    await api(`/api/bons_travail/${id}`, { method:'PATCH', body:{ statut } });
    const bt = S.bts.find(b => b.id === id);
    if (bt) bt.statut = statut;
    showToast(`Statut mis à jour : ${statut}`, 'success');
    openBTPanel(id);
    renderBTs();
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

// ════════════════════════════════════════════════════
//  PLANNING
// ════════════════════════════════════════════════════
function renderPlanning() {
  document.getElementById('main-content').innerHTML = `
    <div class="planning-layout">
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-btn" onclick="calPrev()">‹</button>
          <span class="cal-month" id="cal-label">—</span>
          <button class="cal-btn" onclick="calNext()">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div>
        <div class="table-container">
          <div class="table-header">
            <span class="table-title" id="plan-day-title">Toutes les interventions</span>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr><th>Date</th><th>Heure</th><th>Équipement / Projet</th><th>Type</th><th>Technicien</th><th>Statut</th></tr>
              </thead>
              <tbody id="plan-list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;
  buildCal();
  renderPlanList(null);
}

function buildCal() {
  const d   = S.calDate;
  const yr  = d.getFullYear();
  const mo  = d.getMonth();
  const mois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('cal-label').textContent = `${mois[mo]} ${yr}`;

  const eventDays = new Set(S.planning.map(p => p.date_prevue));
  const today     = new Date();
  const firstDay  = new Date(yr, mo, 1).getDay();
  const daysInMo  = new Date(yr, mo + 1, 0).getDate();
  const offset    = (firstDay + 6) % 7;

  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  const dayH = ['L','M','M','J','V','S','D'];
  let html = dayH.map(h=>`<div class="cal-dh">${h}</div>`).join('');

  for (let i = 0; i < offset; i++) {
    const pd = new Date(yr, mo, -offset+i+1);
    html += `<div class="cal-d other-month">${pd.getDate()}</div>`;
  }
  for (let d2=1; d2<=daysInMo; d2++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d2).padStart(2,'0')}`;
    const isT = today.getDate()===d2&&today.getMonth()===mo&&today.getFullYear()===yr;
    const isS = S.calSelected===ds;
    const hasE= eventDays.has(ds);
    html += `<div class="cal-d${isT?' today':''}${isS?' selected':''}${hasE?' has-events':''}" onclick="selectDay('${ds}')">${d2}</div>`;
  }
  grid.innerHTML = html;
}

function selectDay(ds) {
  S.calSelected = ds;
  buildCal();
  renderPlanList(ds);
}
function calPrev() { S.calDate.setMonth(S.calDate.getMonth()-1); buildCal(); }
function calNext() { S.calDate.setMonth(S.calDate.getMonth()+1); buildCal(); }

function renderPlanList(dateStr) {
  const title = document.getElementById('plan-day-title');
  const body  = document.getElementById('plan-list');
  if (!body) return;
  let items = S.planning;
  if (dateStr) { items = items.filter(p=>p.date_prevue===dateStr); title.textContent=`Interventions du ${dateStr}`; }
  else title.textContent='Toutes les interventions';
  body.innerHTML = items.map(p=>`
    <tr>
      <td>${p.date_prevue||'—'}</td>
      <td>${p.heure_prevue||'—'}</td>
      <td style="font-weight:700">${p.equipement||p.projet||'—'}</td>
      <td><span class="badge b-maintenance">${p.type_intervention||'—'}</span></td>
      <td style="color:var(--muted)">${p.technicien_username||'—'}</td>
      <td><span class="badge b-${(p.statut||'').toLowerCase().replace(' ','')}">${p.statut||'—'}</span></td>
    </tr>`).join('') ||
  `<tr><td colspan="6"><div class="empty-state"><span class="empty-icon">📅</span><p>Aucune intervention${dateStr?' ce jour':''}</p></div></td></tr>`;
}

function filterEquip(q) {
  const q2 = q.toLowerCase();
  const body = document.getElementById('equip-body');
  if (!body) return;
  const filtered = S.equipements.filter(e => (e.nom||'').toLowerCase().includes(q2));
  body.innerHTML = filtered.map(e=>`<tr><td style="color:var(--muted)">${e.id}</td><td style="font-weight:700">${e.nom}</td></tr>`).join('');
}

//  TOAST
// ════════════════════════════════════════════════════
let toastTmr;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), 3500);
}
